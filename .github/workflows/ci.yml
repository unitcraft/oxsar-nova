name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/game-nova/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: projects/game-nova/backend/go.sum

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61
          working-directory: projects/game-nova/backend

      - name: Test
        env:
          DB_URL: ""
          JWT_SECRET: "ci-secret-for-tests-only"
        run: go test -race -count=1 ./...

      - name: Vet
        run: go vet ./...

      - name: Build
        run: |
          go build ./cmd/server
          go build ./cmd/worker

  frontend:
    name: Frontend (TS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/game-nova/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: projects/game-nova/frontend/package-lock.json

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Type-check & build
        run: npm run build

      - name: Test
        run: npm test -- --run

  openapi:
    name: OpenAPI lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npx --yes @redocly/cli lint projects/game-nova/api/openapi.yaml

  api-coverage:
    name: API coverage (UI → OpenAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/game-nova/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: projects/game-nova/frontend/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run api:coverage

  security:
    name: Security scans
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --no-banner

      - name: gosec
        uses: securego/gosec@master
        with:
          args: -severity medium ./projects/game-nova/backend/...

  e2e:
    name: E2E (Playwright in Docker)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend images (server + worker + testseed + migrate)
        uses: docker/bake-action@v5
        with:
          files: ./deploy/docker-compose.e2e.yml
          targets: backend worker testseed migrate
          set: |
            *.cache-from=type=gha,scope=backend
            *.cache-to=type=gha,scope=backend,mode=max
          load: true

      - name: Build frontend image
        uses: docker/bake-action@v5
        with:
          files: ./deploy/docker-compose.e2e.yml
          targets: frontend
          set: |
            frontend.cache-from=type=gha,scope=frontend
            frontend.cache-to=type=gha,scope=frontend,mode=max
          load: true

      - name: Build playwright image
        uses: docker/bake-action@v5
        with:
          files: ./deploy/docker-compose.e2e.yml
          targets: playwright
          set: |
            playwright.cache-from=type=gha,scope=playwright
            playwright.cache-to=type=gha,scope=playwright,mode=max
          load: true

      - name: Up E2E stack
        run: docker compose -f deploy/docker-compose.e2e.yml up -d

      - name: Wait for Playwright to finish
        id: pw
        run: |
          docker compose -f deploy/docker-compose.e2e.yml logs -f --no-log-prefix playwright &
          LOGS=$!
          STATUS=$(docker wait deploy-playwright-1 || echo 1)
          kill $LOGS 2>/dev/null || true
          echo "Playwright exit: $STATUS"
          exit $STATUS

      - name: Collect logs on failure
        if: failure()
        run: |
          docker compose -f deploy/docker-compose.e2e.yml logs --no-color backend worker frontend testseed > docker-logs.txt || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: projects/game-nova/frontend/playwright-report
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: projects/game-nova/frontend/test-results
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload docker logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs
          path: docker-logs.txt
          retention-days: 14
          if-no-files-found: ignore

      - name: Tear down
        if: always()
        run: docker compose -f deploy/docker-compose.e2e.yml down -v --remove-orphans

  cache-warm:
    name: Cache warm (docker buildx → gha)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Warm all images
        uses: docker/bake-action@v5
        with:
          files: ./deploy/docker-compose.e2e.yml
          targets: backend worker testseed migrate frontend playwright
          set: |
            *.cache-from=type=gha,scope=backend
            *.cache-from=type=gha,scope=frontend
            *.cache-from=type=gha,scope=playwright
            backend.cache-to=type=gha,scope=backend,mode=max
            worker.cache-to=type=gha,scope=backend,mode=max
            testseed.cache-to=type=gha,scope=backend,mode=max
            migrate.cache-to=type=gha,scope=backend,mode=max
            frontend.cache-to=type=gha,scope=frontend,mode=max
            playwright.cache-to=type=gha,scope=playwright,mode=max
