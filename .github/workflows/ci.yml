name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: backend/go.sum

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61
          working-directory: backend

      - name: Test
        env:
          DB_URL: ""
          JWT_SECRET: "ci-secret-for-tests-only"
        run: go test -race -count=1 ./...

      - name: Vet
        run: go vet ./...

      - name: Build
        run: |
          go build ./cmd/server
          go build ./cmd/worker

  frontend:
    name: Frontend (TS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Type-check & build
        run: npm run build

      - name: Test
        run: npm test -- --run

  openapi:
    name: OpenAPI lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npx --yes @redocly/cli lint api/openapi.yaml

  security:
    name: Security scans
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --no-banner

      - name: gosec
        uses: securego/gosec@master
        with:
          args: -severity medium ./backend/...
