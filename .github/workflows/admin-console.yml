name: Admin console

on:
  push:
    branches: [main]
    paths:
      - 'projects/admin-bff/**'
      - 'projects/admin-frontend/**'
      - 'deploy/Dockerfile.admin-*'
      - 'deploy/nginx.admin.conf'
      - '.github/workflows/admin-console.yml'
  pull_request:
    paths:
      - 'projects/admin-bff/**'
      - 'projects/admin-frontend/**'
      - 'deploy/Dockerfile.admin-*'
      - 'deploy/nginx.admin.conf'

permissions:
  contents: read

concurrency:
  group: admin-console-${{ github.ref }}
  cancel-in-progress: true

jobs:
  admin-bff:
    name: admin-bff (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/admin-bff
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: projects/admin-bff/go.sum
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -count=1 ./...
      - name: Build
        run: go build ./cmd/server

  admin-frontend:
    name: admin-frontend (TS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/admin-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: projects/admin-frontend/package-lock.json
      - name: Install
        run: npm ci --no-audit --no-fund
      - name: Type-check
        run: npm run typecheck
      - name: Test
        run: npm run test
      - name: Build
        run: npm run build
      - name: Bundle size guard
        run: |
          MAIN_KB=$(stat -c%s dist/assets/index-*.js | head -1 | awk '{print int($1/1024)}')
          echo "main bundle: ${MAIN_KB}KB (budget 300KB)"
          if [ "$MAIN_KB" -gt 300 ]; then
            echo "::error::main bundle exceeds 300KB budget"
            exit 1
          fi

  docker-build:
    name: Docker images
    runs-on: ubuntu-latest
    needs: [admin-bff, admin-frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build admin-bff image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.admin-bff
          push: false
          cache-from: type=gha,scope=admin-bff
          cache-to: type=gha,scope=admin-bff,mode=max
      - name: Build admin-frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.admin-frontend
          push: false
          cache-from: type=gha,scope=admin-frontend
          cache-to: type=gha,scope=admin-frontend,mode=max
