# Production nginx config для admin.oxsar-nova.ru (план 53 §Security).
#
# Делает три вещи:
#   1. Раздаёт статику admin-frontend (SPA fallback на index.html).
#   2. Проксирует /api/* и /auth/* на admin-bff (через cookie session).
#   3. Применяет security-headers и опциональный IP-allowlist.
#
# Подключается через nginx:alpine `templates/default.conf.template` —
# на старте контейнера envsubst подставит переменные ENV.
#
# Обязательные ENV:
#   BFF_UPSTREAM=http://admin-bff:9200
# Опциональные:
#   ALLOW_IPS_INCLUDE=/etc/nginx/admin-ips.conf  (geo-include, см. ниже)

# Connection upgrade map (нужен на верхнем уровне http{}).
# Не используется сейчас (нет WS), но оставлен на случай stream-API.

# IP-allowlist через geo-блок: 1 если IP в списке, иначе 0.
# Файл /etc/nginx/admin-ips.conf монтируется через volume и содержит
# строки вида:
#   1.2.3.4         1;       # офисный VPN
#   10.0.0.0/24     1;       # corporate range
geo $admin_allowed {
    default 0;
    include /etc/nginx/admin-ips.conf;  # NB: создать пустой файл если не используется
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # IP-allowlist проверяется внутри content-locations, чтобы /healthz
    # оставался доступным без whitelist (для k8s/docker probes).
    # Сама проверка — `if ($admin_allowed = 0)` блок в каждом content-location.

    # === Security headers (plan 53 §Security) ===
    # NB: nginx не наследует server-level add_header в location если в этой
    # location есть свой add_header. Решение — выносим headers в named
    # location и добавляем `include` в каждое содержательное место. Здесь
    # дублируем и на server-level (для locations без своих add_header) и
    # будем дублировать в /index.html.
    #
    # CSP: запрещаем всё что не из 'self'. connect-src — только локально (через
    # admin-bff на том же домене). frame-ancestors=none (запрет iframe).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    # HSTS preload (forever HTTPS) — установить ТОЛЬКО когда TLS работает.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # Запрещаем индексацию роботами (в дополнение к meta-тегу в index.html).
    add_header X-Robots-Tag "noindex, nofollow" always;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Статические ассеты с долгим кешом (vite добавляет hash в имя).
    location ~* \.(?:js|css|woff2?|png|svg|ico)$ {
        if ($admin_allowed = 0) { return 403 "ip not allowed"; }
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Проксируем admin-bff (auth + api). Headers: X-Forwarded-For/Proto
    # для корректной IP-логики в admin-bff (rate-limit и audit).
    location ~ ^/(auth|api)/ {
        if ($admin_allowed = 0) { return 403 "ip not allowed"; }
        proxy_pass ${BFF_UPSTREAM};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Cookies проходят прозрачно (admin_session HttpOnly).
        proxy_pass_request_headers on;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # SPA fallback: все прочие пути → index.html.
    # index.html НЕ кешируется — чтобы новый build всегда подгружался.
    location / {
        if ($admin_allowed = 0) { return 403 "ip not allowed"; }
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        if ($admin_allowed = 0) { return 403 "ip not allowed"; }
        # Дублируем server-level security-headers — иначе они не наследуются
        # (см. комментарий выше про nginx add_header inheritance).
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header X-Robots-Tag "noindex, nofollow" always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # Healthcheck для k8s/docker — отдаёт 200 без логирования и без
    # security-headers (быстрая проверка).
    location = /healthz {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
