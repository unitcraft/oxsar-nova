# Полный dev-стек: postgres, redis, migrator (one-shot), backend,
# worker, frontend. Запускается одной командой:
#
#   docker compose -f deploy/docker-compose.yml up --build
#
# Порты на хосте выбраны «нестандартные», чтобы не конфликтовать с
# другими проектами, часто использующими 5432/6379/8080. Внутри
# docker-сети сервисы находят друг друга по именам (postgres:5432,
# redis:6379, backend:8080), поэтому смена внешних портов не требует
# правок в коде.
#
# Доступ:
#   - UI:      http://localhost:5173
#   - API:     http://localhost:8081  (обычно через UI-прокси)
#   - pg:      localhost:5433 (oxsar/oxsar/oxsar)
#   - redis:   localhost:6380

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: oxsar
      POSTGRES_PASSWORD: oxsar
      POSTGRES_DB: oxsar
    ports: ["5433:5432"]
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oxsar"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6380:6379"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: postgres://oxsar:oxsar@postgres:5432/oxsar?sslmode=disable
      MIGRATE_DIR: /migrations/game-nova
    restart: "no"

  backend:
    build:
      context: ..
      dockerfile: projects/game-nova/backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      auth-service:
        condition: service_healthy
    environment:
      SERVER_ADDR: ":8080"
      SERVER_ENV: dev
      LOG_LEVEL: info
      DB_URL: postgres://oxsar:oxsar@postgres:5432/oxsar?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      # План 36 Ф.11: backend верифицирует RSA-JWT через JWKS auth-service.
      # JWT_SECRET (HS256) больше не используется в dev — Backend
      # переключается в режим auth.LoadVerifier(AUTH_JWKS_URL).
      AUTH_JWKS_URL: http://auth-service:9000
      AUTH_SERVICE_URL: http://auth-service:9000
      UNIVERSE_ID: uni01
      CATALOG_DIR: /app/configs
      I18N_DIR: /app/configs/i18n
    ports: ["8081:8080"]
    # План 31 Ф.1: healthcheck использует /api/ready, который при
    # SetDraining возвращает 503 → docker помечает контейнер unhealthy
    # → orchestrator/балансировщик может убрать инстанс из ротации.
    # start_period 10s даёт время на инициализацию (LoadCatalog, БД).
    # GET вместо --spider (HEAD): auth middleware режет HEAD на /api/*.
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/api/ready"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  worker:
    build:
      context: ..
      dockerfile: projects/game-nova/backend/Dockerfile
    # Переопределяем ENTRYPOINT из backend/Dockerfile (там по умолчанию
    # /app/server). Если бы использовали command — Docker склеил бы его
    # как аргументы к server, а не заменил бинарь.
    entrypoint: ["/app/worker"]
    depends_on:
      backend:
        condition: service_started
    environment:
      DB_URL: postgres://oxsar:oxsar@postgres:5432/oxsar?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      CATALOG_DIR: /app/configs
      WORKER_METRICS_ADDR: ":9091"
    # Worker публикует /api/health и /api/ready на metrics-порту :9091
    # (см. cmd/worker/main.go). План 31 Ф.1.
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:9091/api/ready"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  # ── Universe 02: Speed (план 36 Ф.8) ──────────────────────────────────
  # Параллельный стек uni02 с GAMESPEED=4. Используется отдельная БД
  # (uni02-db) и Redis logical-DB (5) — полная изоляция от uni01 (RAM
  # дороже, но соответствует прод-архитектуре multiverse.yml и позволяет
  # тестировать handoff E2E с реальным переездом юзера между БД).

  uni02-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: oxsar
      POSTGRES_PASSWORD: oxsar
      POSTGRES_DB: oxsar
    ports: ["5437:5432"]
    volumes:
      - uni02-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oxsar"]
      interval: 5s
      timeout: 3s
      retries: 10

  uni02-migrate:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.migrate
    depends_on:
      uni02-db:
        condition: service_healthy
    environment:
      DB_URL: postgres://oxsar:oxsar@uni02-db:5432/oxsar?sslmode=disable
      MIGRATE_DIR: /migrations/game-nova
    restart: "no"

  uni02-backend:
    build:
      context: ..
      dockerfile: projects/game-nova/backend/Dockerfile
    depends_on:
      uni02-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      uni02-migrate:
        condition: service_completed_successfully
      auth-service:
        condition: service_healthy
    environment:
      SERVER_ADDR: ":8080"
      SERVER_ENV: dev
      LOG_LEVEL: info
      DB_URL: postgres://oxsar:oxsar@uni02-db:5432/oxsar?sslmode=disable
      REDIS_URL: redis://redis:6379/5
      AUTH_JWKS_URL: http://auth-service:9000
      AUTH_SERVICE_URL: http://auth-service:9000
      UNIVERSE_ID: uni02
      # Скорость 4× — agressive timing для тестов (см. universes.yaml).
      GAMESPEED: "4.0"
      NUM_GALAXIES: "4"
      NUM_SYSTEMS: "300"
      PROTECTION_PERIOD: "43200"
      CATALOG_DIR: /app/configs
      I18N_DIR: /app/configs/i18n
    ports: ["8082:8080"]
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/api/ready"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  uni02-worker:
    build:
      context: ..
      dockerfile: projects/game-nova/backend/Dockerfile
    entrypoint: ["/app/worker"]
    depends_on:
      uni02-backend:
        condition: service_started
    environment:
      DB_URL: postgres://oxsar:oxsar@uni02-db:5432/oxsar?sslmode=disable
      REDIS_URL: redis://redis:6379/5
      CATALOG_DIR: /app/configs
      WORKER_METRICS_ADDR: ":9091"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:9091/api/ready"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  uni02-frontend:
    build:
      context: ..
      dockerfile: projects/game-nova/frontend/Dockerfile
    depends_on:
      uni02-backend:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      billing-service:
        condition: service_healthy
    environment:
      VITE_PROXY_TARGET: http://uni02-backend:8080
      VITE_AUTH_TARGET: http://auth-service:9000
      VITE_BILLING_TARGET: http://billing-service:9100
    ports: ["5175:5173"]
    volumes:
      - ../projects/game-nova/frontend:/app
      - uni02-frontend-node-modules:/app/node_modules

  frontend:
    build:
      context: ..
      dockerfile: projects/game-nova/frontend/Dockerfile
    depends_on:
      backend:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      billing-service:
        condition: service_healthy
    environment:
      VITE_PROXY_TARGET: http://backend:8080
      VITE_AUTH_TARGET: http://auth-service:9000
      VITE_BILLING_TARGET: http://billing-service:9100
    ports: ["5173:5173"]
    volumes:
      - ../projects/game-nova/frontend:/app
      - frontend-node-modules:/app/node_modules

  # ── Auth stack ───────────────────────────────────────────────────────────
  # План 36 Ф.11. RSA-ключ генерируется auth-service-ом сам при первом старте
  # и кладётся в volume auth-rsa-key (pem-файл). На проде он подкладывается
  # как docker secret — см. docker-compose.multiverse.yml.

  auth-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: authsvc
      POSTGRES_PASSWORD: authsvc
      POSTGRES_DB: authsvc
    ports: ["5435:5432"]
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authsvc"]
      interval: 5s
      timeout: 3s
      retries: 10

  auth-migrate:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.migrate
    depends_on:
      auth-db:
        condition: service_healthy
    environment:
      DB_URL: postgres://authsvc:authsvc@auth-db:5432/authsvc?sslmode=disable
      MIGRATE_DIR: /migrations/auth
    restart: "no"

  auth-service:
    build:
      context: ..
      dockerfile: projects/auth/backend/Dockerfile
    depends_on:
      auth-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-migrate:
        condition: service_completed_successfully
    environment:
      AUTH_ADDR: ":9000"
      AUTH_DB_URL: postgres://authsvc:authsvc@auth-db:5432/authsvc?sslmode=disable
      REDIS_URL: redis://redis:6379/2
      # В dev RSA-ключ генерируется при первом старте и сохраняется в volume.
      # AUTH_KEY_AUTOGEN=1 включает auto-generate (только для dev/test).
      # На проде — монтируется secret из /run/secrets, AUTH_KEY_AUTOGEN=0.
      RSA_KEY_PATH: /var/lib/auth/rsa_key.pem
      AUTH_KEY_AUTOGEN: "1"
      # Dev TTL: access 60m / refresh 30d — удобно при разработке,
      # не нужно часто перелогиниваться.
      # Prod TTL (15m / 7d) — в docker-compose.multiverse.yml.
      JWT_ACCESS_TTL: 60m
      JWT_REFRESH_TTL: 720h
      LOG_LEVEL: info
      ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:5174"
    volumes:
      - auth-rsa-key:/var/lib/auth
    ports: ["9000:9000"]
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:9000/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  # ── Billing stack ────────────────────────────────────────────────────────
  # План 38. Кошельки, платёжные шлюзы (Robokassa/Enot/Mock), idempotent
  # spend/credit. Webhook'и от платёжных шлюзов.

  billing-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: billing
      POSTGRES_PASSWORD: billing
      POSTGRES_DB: billing
    ports: ["5436:5432"]
    volumes:
      - billing-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U billing"]
      interval: 5s
      timeout: 3s
      retries: 10

  billing-migrate:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.migrate
    depends_on:
      billing-db:
        condition: service_healthy
    environment:
      DB_URL: postgres://billing:billing@billing-db:5432/billing?sslmode=disable
      MIGRATE_DIR: /migrations/billing
    restart: "no"

  billing-service:
    build:
      context: ..
      dockerfile: projects/billing/backend/Dockerfile
    depends_on:
      billing-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      billing-migrate:
        condition: service_completed_successfully
    environment:
      BILLING_ADDR: ":9100"
      BILLING_DB_URL: postgres://billing:billing@billing-db:5432/billing?sslmode=disable
      REDIS_URL: redis://redis:6379/3
      AUTH_JWKS_URL: http://auth-service:9000
      LOG_LEVEL: info
      ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:5174"
      PAYMENT_PROVIDER: mock
      PAYMENT_MOCK_BASE_URL: http://billing-service:9100
      PAYMENT_MOCK_SECRET: dev-mock-secret-change-me
      PAYMENT_RETURN_URL: http://localhost:5173/
    ports: ["9100:9100"]
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:9100/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  # ── Portal stack ─────────────────────────────────────────────────────────

  portal-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: portal
      POSTGRES_PASSWORD: portal
      POSTGRES_DB: portal
    ports: ["5434:5432"]
    volumes:
      - portal-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portal"]
      interval: 5s
      timeout: 3s
      retries: 10

  portal-migrate:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.migrate
    depends_on:
      portal-db:
        condition: service_healthy
    environment:
      DB_URL: postgres://portal:portal@portal-db:5432/portal?sslmode=disable
      MIGRATE_DIR: /migrations/portal
    restart: "no"

  portal-backend:
    build:
      context: ..
      dockerfile: projects/portal/backend/Dockerfile
    depends_on:
      portal-db:
        condition: service_healthy
      portal-migrate:
        condition: service_completed_successfully
      auth-service:
        condition: service_healthy
      billing-service:
        condition: service_healthy
    environment:
      PORTAL_ADDR: ":8090"
      PORTAL_DB_URL: postgres://portal:portal@portal-db:5432/portal?sslmode=disable
      AUTH_JWKS_URL: http://auth-service:9000
      # План 38 Ф.6: списание кредитов через billing-service.
      BILLING_URL: http://billing-service:9100
      UNIVERSES_CONFIG: /app/configs/universes.yaml
      LOG_LEVEL: info
    ports: ["8090:8090"]
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8090/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  portal-frontend:
    build:
      context: ..
      dockerfile: projects/portal/frontend/Dockerfile
    depends_on:
      portal-backend:
        condition: service_started
      auth-service:
        condition: service_healthy
      billing-service:
        condition: service_healthy
    environment:
      VITE_PORTAL_API: http://portal-backend:8090
      VITE_AUTH_TARGET: http://auth-service:9000
      VITE_BILLING_TARGET: http://billing-service:9100
      VITE_BASE_DOMAIN: localhost
      VITE_UNIVERSE_PORT_uni01: "5173"
      VITE_UNIVERSE_PORT_uni02: "5175"
    ports: ["5174:5174"]
    volumes:
      - ../projects/portal/frontend:/app
      - portal-frontend-node-modules:/app/node_modules

volumes:
  pg-data:
  redis-data:
  portal-db-data:
  auth-db-data:
  auth-rsa-key:
  billing-db-data:
  uni02-db-data:
  frontend-node-modules:
  uni02-frontend-node-modules:
  portal-frontend-node-modules:
