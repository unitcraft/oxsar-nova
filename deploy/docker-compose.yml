# Полный dev-стек: postgres, redis, migrator (one-shot), backend,
# worker, frontend. Запускается одной командой:
#
#   docker compose -f deploy/docker-compose.yml up --build
#
# Порты на хосте выбраны «нестандартные», чтобы не конфликтовать с
# другими проектами, часто использующими 5432/6379/8080. Внутри
# docker-сети сервисы находят друг друга по именам (postgres:5432,
# redis:6379, backend:8080), поэтому смена внешних портов не требует
# правок в коде.
#
# Доступ:
#   - UI:      http://localhost:5173
#   - API:     http://localhost:8081  (обычно через UI-прокси)
#   - pg:      localhost:5433 (oxsar/oxsar/oxsar)
#   - redis:   localhost:6380

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: oxsar
      POSTGRES_PASSWORD: oxsar
      POSTGRES_DB: oxsar
    ports: ["5433:5432"]
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oxsar"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6380:6379"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: postgres://oxsar:oxsar@postgres:5432/oxsar?sslmode=disable
    restart: "no"

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      SERVER_ADDR: ":8080"
      SERVER_ENV: dev
      LOG_LEVEL: info
      DB_URL: postgres://oxsar:oxsar@postgres:5432/oxsar?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: dev-secret-change-me
      CATALOG_DIR: /app/configs
      I18N_DIR: /app/configs/i18n
    ports: ["8081:8080"]
    # План 31 Ф.1: healthcheck использует /api/ready, который при
    # SetDraining возвращает 503 → docker помечает контейнер unhealthy
    # → orchestrator/балансировщик может убрать инстанс из ротации.
    # start_period 10s даёт время на инициализацию (LoadCatalog, БД).
    # GET вместо --spider (HEAD): auth middleware режет HEAD на /api/*.
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/api/ready"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  worker:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    # Переопределяем ENTRYPOINT из backend/Dockerfile (там по умолчанию
    # /app/server). Если бы использовали command — Docker склеил бы его
    # как аргументы к server, а не заменил бинарь.
    entrypoint: ["/app/worker"]
    depends_on:
      backend:
        condition: service_started
    environment:
      DB_URL: postgres://oxsar:oxsar@postgres:5432/oxsar?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: dev-secret-change-me
      CATALOG_DIR: /app/configs
      WORKER_METRICS_ADDR: ":9091"
    # Worker публикует /api/health и /api/ready на metrics-порту :9091
    # (см. cmd/worker/main.go). План 31 Ф.1.
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:9091/api/ready"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_PROXY_TARGET: http://backend:8080
    ports: ["5173:5173"]
    volumes:
      - ../frontend:/app
      - frontend-node-modules:/app/node_modules

  # ── Portal stack ─────────────────────────────────────────────────────────

  portal-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: portal
      POSTGRES_PASSWORD: portal
      POSTGRES_DB: portal
    ports: ["5434:5432"]
    volumes:
      - portal-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portal"]
      interval: 5s
      timeout: 3s
      retries: 10

  portal-migrate:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.migrate
    command: ["sh", "-c", "goose -dir /migrations/portal postgres \"$DB_URL\" up"]
    depends_on:
      portal-db:
        condition: service_healthy
    environment:
      DB_URL: postgres://portal:portal@portal-db:5432/portal?sslmode=disable
    restart: "no"

  portal-backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    entrypoint: ["/app/portal"]
    depends_on:
      portal-db:
        condition: service_healthy
      portal-migrate:
        condition: service_completed_successfully
    environment:
      PORTAL_ADDR: ":8090"
      PORTAL_DB_URL: postgres://portal:portal@portal-db:5432/portal?sslmode=disable
      # В dev-режиме без auth-service используем заглушку JWKS_URL.
      # portal стартует с предупреждением если не удаётся загрузить ключ —
      # это нормально для локального запуска без auth-service.
      AUTH_JWKS_URL: http://backend:8080/.well-known/jwks.json
      AUTH_SERVICE_URL: ""
      UNIVERSES_CONFIG: /app/configs/universes.yaml
      LOG_LEVEL: info
    ports: ["8090:8090"]
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8090/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  portal-frontend:
    build:
      context: ..
      dockerfile: frontend/portal/Dockerfile
    depends_on:
      portal-backend:
        condition: service_started
    environment:
      VITE_PORTAL_API: http://portal-backend:8090
    ports: ["5174:5174"]
    volumes:
      - ../frontend/portal:/app
      - portal-frontend-node-modules:/app/node_modules

volumes:
  pg-data:
  redis-data:
  portal-db-data:
  frontend-node-modules:
  portal-frontend-node-modules:
