global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: oxsar-nova

scrape_configs:
  - job_name: backend
    static_configs:
      - targets: ["backend:8080"]
    metrics_path: /metrics

  - job_name: worker
    static_configs:
      - targets: ["worker:9090"]
    metrics_path: /metrics

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
