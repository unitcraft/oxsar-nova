# Override для docker-compose.e2e.yml: пробрасывает порты
# uni01-frontend / uni01-backend наружу, чтобы можно было открыть UI
# в браузере хоста.
#
# Использование:
#   docker compose -f deploy/docker-compose.e2e.yml -f deploy/docker-compose.e2e.ports.yml up -d uni01-backend worker uni01-frontend testseed
#   # потом открыть http://localhost:5173 (логин bob / DevPass123)
#
# Не запускать playwright — он сразу прогонит тесты и сам выйдет.

services:
  uni01-frontend:
    ports:
      - "5173:5173"
  uni01-backend:
    ports:
      - "8081:8080"
