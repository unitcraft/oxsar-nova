# Мониторинг-overlay: Prometheus + Grafana.
#
# Запуск вместе с основным стеком:
#   docker compose \
#     -f deploy/docker-compose.yml \
#     -f deploy/docker-compose.prod.yml \
#     -f deploy/docker-compose.monitoring.yml \
#     up -d
#
# Доступ:
#   Prometheus: http://localhost:9090
#   Grafana:    http://localhost:3000  (admin / admin, сменить в .env)
#
# Метрики:
#   backend:  http://backend:8080/metrics
#   worker:   http://worker:9090/metrics
#   postgres: через postgres-exporter (порт 9187)

services:
  prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    ports: ["9090:9090"]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s:%(http_port)s/grafana/"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports: ["3000:3000"]
    depends_on: [prometheus]
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    environment:
      DATA_SOURCE_NAME: "${DB_URL}"
    ports: ["9187:9187"]
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:
