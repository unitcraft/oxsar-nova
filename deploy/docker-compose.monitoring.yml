# Мониторинг-overlay: Prometheus + Grafana.
#
# Локальный dev-запуск (с одним backend + 2 worker'а):
#   docker compose \
#     -f deploy/docker-compose.yml \
#     -f deploy/docker-compose.scaling.yml \
#     -f deploy/docker-compose.monitoring.yml \
#     up -d --build
#
# Прод-вариант: заменить scaling.yml на prod.yml.
#
# Доступ:
#   Prometheus: http://localhost:9090
#   Grafana:    http://localhost:3000  (admin / admin, переопределить
#               через GRAFANA_PASSWORD env)
#
# Метрики:
#   uni01-backend:  http://uni01-backend:8080/metrics
#   uni01-worker:   http://uni01-worker:9091/metrics  (WORKER_METRICS_ADDR)
#   postgres: через postgres-exporter (порт 9187)

services:
  prometheus:
    # Конфиг копируется внутрь образа (Dockerfile.prometheus) — обход
    # бага Docker Desktop с bind-mount файла из d:\ на Windows.
    build:
      context: .
      dockerfile: Dockerfile.prometheus
    volumes:
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    ports: ["9090:9090"]
    restart: unless-stopped

  grafana:
    # Provisioning копируется внутрь образа (см. Dockerfile.grafana).
    build:
      context: .
      dockerfile: Dockerfile.grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
    ports: ["3000:3000"]
    depends_on: [prometheus]
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    environment:
      # Захардкожено как в base compose; для прода переопределяется через
      # ${DB_URL} в .env.
      DATA_SOURCE_NAME: "postgres://oxsar:oxsar@postgres:5432/oxsar?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    ports: ["9187:9187"]
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:
