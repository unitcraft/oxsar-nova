run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - revive
    - gosec
    - bodyclose
    - contextcheck
    - nilerr
    - prealloc
    - errorlint
    - misspell

linters-settings:
  errorlint:
    errorf: true
  gocritic:
    enabled-tags:
      - diagnostic
      - performance
      - style
  revive:
    rules:
      - name: exported
        severity: warning
        disabled: false

issues:
  exclude-dirs:
    - vendor
    - dist
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - prealloc
