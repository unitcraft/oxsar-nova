                type: object
                properties:
                  languages: { type: array, items: { type: string } }

  /api/admin/stats:
    get:
      tags: [admin]
      security: [{ bearerAuth: [] }]
      summary: Базовая статистика сервера (только admin/superadmin).
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_users:    { type: integer }
                  active_last24h: { type: integer }
                  total_planets:  { type: integer }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/admin/users:
    get:
      tags: [admin]
      security: [{ bearerAuth: [] }]
      summary: Список игроков (limit/offset).
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 50, maximum: 200 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items: { $ref: "#/components/schemas/AdminUserRow" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/admin/users/{id}/ban:
    post:
      tags: [admin]
      security: [{ bearerAuth: [] }]
      summary: Заблокировать игрока.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: banned }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/admin/users/{id}/unban:
    post:
      tags: [admin]
      security: [{ bearerAuth: [] }]
      summary: Снять блокировку.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: unbanned }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/admin/users/{id}/credit:
    post:
      tags: [admin]
      security: [{ bearerAuth: [] }]
      summary: Изменить баланс кредитов игрока (delta может быть отрицательным).
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [delta]
              properties:
                delta: { type: integer, format: int64 }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  credit: { type: integer, format: int64 }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/admin/users/{id}/role:
    post:
      tags: [admin]
      security: [{ bearerAuth: [] }]
      summary: Изменить роль игрока.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [player, support, admin, superadmin]
      responses:
        "204": { description: updated }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/admin/users/{id}:
    get:
      tags: [admin]
      summary: Глубокая карточка игрока (план 14 Ф.2.1)
      description: |
        Агрегат: базовые поля, планеты, флот в полёте, лоты на рынке
        и арт-рынке, активные офицеры, артефакты, последние 20
        транзакций res_log, последние 20 credit_purchases, 20 inbox
        сообщений, 20 боевых/шпионских/экспедиционных отчётов.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminUserProfile" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/admin/users/{id}/resources:
    post:
      tags: [admin]
      summary: Изменить ресурсы на планете игрока (план 14 Ф.2.2)
      description: |
        Дельты metal/silicon/hydrogen могут быть отрицательными (списание).
        Баланс никогда не уходит ниже 0 (GREATEST(0, …)). Пишет в res_log
        с reason='admin_grant' и в admin_audit_log через middleware.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [planet_id]
              properties:
                planet_id: { type: string, format: uuid }
                metal:     { type: integer, format: int64 }
                silicon:   { type: integer, format: int64 }
                hydrogen:  { type: integer, format: int64 }
      responses:
        "204": { description: updated }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/admin/users/{id}/artefacts/grant:
    post:
      tags: [admin]
      summary: Выдать артефакт игроку (план 14 Ф.2.3)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [unit_id]
              properties:
                unit_id: { type: integer, description: "ARTEFACT_* код из каталога" }
      responses:
        "200":
          description: созданный артефакт
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string, format: uuid }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/admin/users/{id}/artefacts/{aid}:
    delete:
      tags: [admin]
      summary: Отобрать артефакт у игрока (план 14 Ф.2.3)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
        - in: path
          name: aid
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: deleted }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/admin/audit:
    get:
      tags: [admin]
      summary: Журнал деструктивных админских действий
      description: |
        Write-запросы под /api/admin/* пишут запись в admin_audit_log через
        middleware (см. план 14 Ф.1.2). Здесь — чтение этого журнала
        с фильтрами.
      parameters:
        - in: query
          name: admin_id
          schema: { type: string, format: uuid }
        - in: query
          name: action
          description: "ключ действия (например: users.ban, users.credit, events.retry)"
          schema: { type: string }
        - in: query
          name: target_id
          schema: { type: string }
        - in: query
          name: from
          description: RFC3339 нижняя граница created_at
          schema: { type: string, format: date-time }
        - in: query
          name: to
          schema: { type: string, format: date-time }
        - in: query
          name: limit
          schema: { type: integer, default: 100, maximum: 500 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items: { $ref: "#/components/schemas/AdminAuditEntry" }
                  limit:  { type: integer }
                  offset: { type: integer }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/i18n/{lang}:
    get:
      tags: [i18n]
      summary: Все переводы для заданного языка.
      parameters:
        - in: path
          name: lang
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { type: object }

  /api/payment/packages:
    get:
      tags: [payment]
      summary: Список пакетов кредитов (публичный).
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CreditPackage" }

  /api/payment/order:
    post:
      tags: [payment]
      summary: Создать заказ на покупку кредитов.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateOrderRequest" }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CreateOrderResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/payment/webhook:
    post:
      tags: [payment]
      summary: Callback от платёжного шлюза (без авторизации).
      responses:
        "200":
          description: ok (тело зависит от шлюза)
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/payment/history:
    get:
      tags: [payment]
      summary: История покупок кредитов игрока.
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Purchase" }
        "401": { $ref: "#/components/responses/Unauthorized" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    BadRequest:
      description: bad request
      content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } }
    Unauthorized:
      description: unauthorized
      content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } }
    Forbidden:
      description: forbidden
      content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } }
    NotFound:
      description: not found
      content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } }
    Conflict:
      description: conflict
      content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } }

  schemas:
    Status:
      type: object
      properties:
        status: { type: string }

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string }
            message: { type: string }

    RegisterRequest:
      type: object
      required: [username, email, password]
      properties:
        username: { type: string, minLength: 3, maxLength: 24 }
        email:    { type: string, format: email }
        password: { type: string, minLength: 8 }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:    { type: string, format: email }
        password: { type: string }

    Tokens:
      type: object
      properties:
        access:  { type: string }
        refresh: { type: string }
        expires: { type: string, format: date-time }

    User:
      type: object
      properties:
        id:       { type: string, format: uuid }
        username: { type: string }
        email:    { type: string, format: email }

    AuthResponse:
      type: object
      properties:
        user:   { $ref: "#/components/schemas/User" }
        tokens: { $ref: "#/components/schemas/Tokens" }

    AdminAuditEntry:
      type: object
      properties:
        id:          { type: string, format: uuid }
        admin_id:    { type: string, format: uuid }
        admin_name:  { type: string }
        action:      { type: string, description: "users.ban / users.credit / events.retry / …" }
        target_kind: { type: string, description: "user / automsg / event / ''" }
        target_id:   { type: string, description: "id или key цели" }
        payload:     { type: object, additionalProperties: true, description: "тело запроса без секретов" }
        status:      { type: integer, description: "HTTP-код ответа" }
        ip:          { type: string }
        user_agent:  { type: string }
        created_at:  { type: string, format: date-time }

    AdminUserProfile:
      type: object
      properties:
        id:            { type: string, format: uuid }
        username:      { type: string }
        email:         { type: string }
        role:          { type: string }
        credit:        { type: integer, format: int64 }
        score:         { type: integer, format: int64 }
        banned_at:     { type: string, format: date-time, nullable: true }
        created_at:    { type: string, format: date-time }
        last_seen_at:  { type: string, format: date-time }
        planets:
          type: array
          items:
            type: object
            properties:
              id:       { type: string, format: uuid }
              name:     { type: string }
              galaxy:   { type: integer }
              system:   { type: integer }
              position: { type: integer }
              is_moon:  { type: boolean }
              metal:    { type: integer, format: int64 }
              silicon:  { type: integer, format: int64 }
              hydrogen: { type: integer, format: int64 }
        fleets:
          type: array
          items:
            type: object
            properties:
              id:           { type: string, format: uuid }
              mission:      { type: integer }
              state:        { type: string }
              dst_galaxy:   { type: integer }
              dst_system:   { type: integer }
              dst_position: { type: integer }
              dst_is_moon:  { type: boolean }
              arrive_at:    { type: string, format: date-time }
        market_lots:
          type: array
          items:
            type: object
            properties:
              id:            { type: string, format: uuid }
              sell_resource: { type: string }
              sell_amount:   { type: integer, format: int64 }
              buy_resource:  { type: string }
              buy_amount:    { type: integer, format: int64 }
              state:         { type: string }
        artefact_lots:
          type: array
          items:
            type: object
            properties:
              id:           { type: string, format: uuid }
              artefact_id:  { type: string, format: uuid }
              unit_id:      { type: integer }
              price_credit: { type: integer, format: int64 }
        officers:
          type: array
          items:
            type: object
            properties:
              key:         { type: string }
              expires_at:  { type: string, format: date-time }
        artefacts:
          type: array
          items:
            type: object
            properties:
              id:      { type: string, format: uuid }
              unit_id: { type: integer }
              state:   { type: string }
        res_log:
          type: array
          items:
            type: object
            properties:
              reason:      { type: string }
              planet_id:   { type: string, format: uuid, nullable: true }
              d_metal:     { type: integer, format: int64 }
              d_silicon:   { type: integer, format: int64 }
              d_hydrogen:  { type: integer, format: int64 }
              created_at:  { type: string, format: date-time }
        purchases:
          type: array
          items:
            type: object
            properties:
              id:          { type: string, format: uuid }
              package_key: { type: string }
              credits:     { type: integer }
              price_rub:   { type: number }
              status:      { type: string }
              created_at:  { type: string, format: date-time }
              paid_at:     { type: string, format: date-time, nullable: true }
        messages_recent:
          type: array
          items:
            type: object
            properties:
              id:         { type: string, format: uuid }
              folder:     { type: integer }
              subject:    { type: string }
              created_at: { type: string, format: date-time }
              read:       { type: boolean }
        reports_recent:
          type: array
          items:
            type: object
            properties:
              id:         { type: string, format: uuid }
              kind:       { type: string, enum: [battle, espionage, expedition] }
              created_at: { type: string, format: date-time }

    Planet:
      type: object
      properties:
        id:       { type: string, format: uuid }
        user_id:  { type: string, format: uuid }
        is_moon:  { type: boolean }
        name:     { type: string }
        galaxy:   { type: integer }
        system:   { type: integer }
        position: { type: integer }
        metal:    { type: number }
        silicon:  { type: number }
        hydrogen: { type: number }
        last_res_update: { type: string, format: date-time }

    QueueItem:
      type: object
      properties:
        id:           { type: string, format: uuid }
        planet_id:    { type: string, format: uuid }
        unit_id:      { type: integer }
        target_level: { type: integer }
        start_at:     { type: string, format: date-time }
        end_at:       { type: string, format: date-time }
        status:       { type: string }

    ShipyardQueueItem:
      type: object
      properties:
        id:               { type: string, format: uuid }
        planet_id:        { type: string, format: uuid }
        unit_id:          { type: integer }
        count:            { type: integer, format: int64 }
        per_unit_seconds: { type: integer }
        start_at:         { type: string, format: date-time }
        end_at:           { type: string, format: date-time }
        status:           { type: string }

    RepairQueueItem:
      type: object
      properties:
        id:               { type: string, format: uuid }
        planet_id:        { type: string, format: uuid }
        user_id:          { type: string, format: uuid }
        unit_id:          { type: integer }
        is_defense:       { type: boolean }
        mode:             { type: string, enum: [disassemble, repair] }
        count:            { type: integer, format: int64 }
        return_metal:     { type: integer, format: int64 }
        return_silicon:   { type: integer, format: int64 }
        return_hydrogen:  { type: integer, format: int64 }
        per_unit_seconds: { type: integer }
        start_at:         { type: string, format: date-time }
        end_at:           { type: string, format: date-time }
        status:           { type: string }

    SystemView:
      type: object
      properties:
        galaxy: { type: integer }
        system: { type: integer }
        cells:
          type: array
          items: { $ref: "#/components/schemas/GalaxyCell" }

    GalaxyCell:
      type: object
      properties:
        position:        { type: integer }
        has_planet:      { type: boolean }
        planet_name:     { type: string, nullable: true }
        has_moon:        { type: boolean }
        moon_name:       { type: string, nullable: true }
        owner_id:        { type: string, format: uuid, nullable: true }
        owner_username:  { type: string, nullable: true }
        debris_metal:    { type: integer, format: int64 }
        debris_silicon:  { type: integer, format: int64 }

    FleetDispatch:
      type: object
      required: [src_planet_id, dst, ships, speed_percent]
      properties:
        src_planet_id: { type: string, format: uuid }
        dst:           { $ref: "#/components/schemas/Coords" }
        ships:
          type: object
          additionalProperties: { type: integer, format: int64, minimum: 1 }
        carry_metal:    { type: integer, format: int64, minimum: 0 }
        carry_silicon:  { type: integer, format: int64, minimum: 0 }
        carry_hydrogen: { type: integer, format: int64, minimum: 0 }
        speed_percent:  { type: integer, minimum: 10, maximum: 100 }
        mission:        { type: integer, description: "7 = TRANSPORT, 9 = RECYCLING, 10 = ATTACK_SINGLE" }

    Coords:
      type: object
      required: [galaxy, system, position]
      properties:
        galaxy:   { type: integer, minimum: 1, maximum: 16 }
        system:   { type: integer, minimum: 1, maximum: 999 }
        position: { type: integer, minimum: 1, maximum: 15 }
        is_moon:  { type: boolean }

    Fleet:
      type: object
      properties:
        id:              { type: string, format: uuid }
        owner_user_id:   { type: string, format: uuid }
        src_planet_id:   { type: string, format: uuid }
        dst_galaxy:      { type: integer }
        dst_system:      { type: integer }
        dst_position:    { type: integer }
        dst_is_moon:     { type: boolean }
        mission:         { type: integer }
        state:           { type: string, enum: [outbound, hold, returning, done] }
        depart_at:       { type: string, format: date-time }
        arrive_at:       { type: string, format: date-time }
        return_at:       { type: string, format: date-time, nullable: true }
        carry:
          type: object
          properties:
            metal:    { type: integer, format: int64 }
            silicon:  { type: integer, format: int64 }
            hydrogen: { type: integer, format: int64 }
        speed_percent:   { type: integer }
        ships:
          type: object
          additionalProperties: { type: integer, format: int64 }

    Artefact:
      type: object
      properties:
        id:            { type: string, format: uuid }
        user_id:       { type: string, format: uuid }
        planet_id:     { type: string, format: uuid, nullable: true }
        unit_id:       { type: integer }
        state:         { type: string, enum: [held, delayed, active, expired, consumed] }
        acquired_at:   { type: string, format: date-time }
        activated_at:  { type: string, format: date-time, nullable: true }
        expire_at:     { type: string, format: date-time, nullable: true }

    BattleInput:
      type: object
      properties:
        seed:      { type: integer, format: int64 }
        rounds:    { type: integer }
        is_moon:   { type: boolean }
        attackers:
          type: array
          items: { $ref: "#/components/schemas/BattleSide" }
        defenders:
          type: array
          items: { $ref: "#/components/schemas/BattleSide" }

    BattleSide:
      type: object
      properties:
        user_id:  { type: string }
        username: { type: string }
        tech:
          type: object
          properties:
            gun:        { type: integer }
            shield:     { type: integer }
            shell:      { type: integer }
            ballistics: { type: integer }
            masking:    { type: integer }
        units:
          type: array
          items:
            type: object
            properties:
              unit_id:  { type: integer }
              quantity: { type: integer, format: int64 }
              front:    { type: integer }
              attack:   { type: array, items: { type: number } }
              shield:   { type: array, items: { type: number } }
              shell:    { type: number }

    Message:
      type: object
      properties:
        id:               { type: string, format: uuid }
        from_user_id:     { type: string, format: uuid, nullable: true }
        from_username:    { type: string }
        subject:          { type: string }
        body:             { type: string }
        folder:           { type: integer }
        created_at:       { type: string, format: date-time }
        read_at:          { type: string, format: date-time, nullable: true }
        battle_report_id: { type: string, format: uuid, nullable: true }

    BattleReportFull:
      type: object
      properties:
        id:                { type: string, format: uuid }
        attacker_user_id:  { type: string, format: uuid, nullable: true }
        defender_user_id:  { type: string, format: uuid, nullable: true }
        planet_id:         { type: string, format: uuid, nullable: true }
        seed:              { type: integer, format: int64 }
        winner:            { type: string, enum: [attackers, defenders, draw] }
        rounds:            { type: integer }
        debris_metal:      { type: integer, format: int64 }
        debris_silicon:    { type: integer, format: int64 }
        loot_metal:        { type: integer, format: int64 }
        loot_silicon:      { type: integer, format: int64 }
        loot_hydrogen:     { type: integer, format: int64 }
        at:                { type: string, format: date-time }
        report:            { type: object, description: "полный battle.Report как JSON" }

    BattleReport:
      type: object
      properties:
        seed:   { type: integer, format: int64 }
        winner: { type: string, enum: [attackers, defenders, draw] }
        rounds: { type: integer }

    SimStats:
      type: object
      properties:
        num_sim:    { type: integer }
        win_rate:   { type: number, description: "доля побед атакующих 0..1" }
        draw_rate:  { type: number }
        avg_rounds: { type: number }

    AchievementEntry:
      type: object
      properties:
        key:         { type: string }
        title:       { type: string }
        description: { type: string }
