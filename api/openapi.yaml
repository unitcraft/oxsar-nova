openapi: 3.1.0
info:
  title: oxsar-nova API
  version: 0.1.0
  description: |
    REST API for oxsar-nova. Источник истины для клиентских типов —
    TS-клиент генерируется из этого файла (см. CLAUDE.md).

servers:
  - url: http://localhost:8080
    description: local dev

tags:
  - name: auth
  - name: planets
  - name: buildings
  - name: research
  - name: shipyard
  - name: repair
  - name: artefacts
  - name: artmarket
  - name: galaxy
  - name: fleet
  - name: battle
  - name: messages
  - name: achievements
  - name: officers
  - name: market
  - name: rockets
  - name: score
  - name: alliances
  - name: admin
  - name: i18n
  - name: payment
  - name: system

paths:
  /healthz:
    get:
      tags: [system]
      summary: Liveness probe
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Status" }

  /api/auth/register:
    post:
      tags: [auth]
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegisterRequest" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }
        "409": { $ref: "#/components/responses/Conflict" }
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/auth/login:
    post:
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/auth/refresh:
    post:
      tags: [auth]
      summary: Refresh tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh]
              properties:
                refresh: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  tokens: { $ref: "#/components/schemas/Tokens" }

  /api/planets:
    get:
      tags: [planets]
      security: [{ bearerAuth: [] }]
      summary: List my planets
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  planets:
                    type: array
                    items: { $ref: "#/components/schemas/Planet" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/planets/{id}:
    get:
      tags: [planets]
      security: [{ bearerAuth: [] }]
      summary: Get planet by id
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Planet" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [planets]
      security: [{ bearerAuth: [] }]
      summary: Rename planet
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, minLength: 1, maxLength: 50 }
      responses:
        "200":
          description: renamed
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [planets]
      security: [{ bearerAuth: [] }]
      summary: Abandon planet (soft-delete)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: abandoned
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/planets/{id}/set-home:
    post:
      tags: [planets]
      security: [{ bearerAuth: [] }]
      summary: Set planet as home planet
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: home set
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/planets/{id}/resource-report:
    get:
      tags: [planets]
      security: [{ bearerAuth: [] }]
      summary: Get resource production report for a planet
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: resource report
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ResourceReport" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/planets/{id}/resource-update:
    post:
      tags: [planets]
      security: [{ bearerAuth: [] }]
      summary: Update building production factors
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [factors]
              properties:
                factors:
                  type: object
                  additionalProperties:
                    type: integer
                    minimum: 0
                    maximum: 100
                  description: Map of unit_id to production factor (0-100%)
      responses:
        "200":
          description: updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/planets/{id}/buildings:
    post:
      tags: [buildings]
      security: [{ bearerAuth: [] }]
      summary: Enqueue a building upgrade
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [unit_id]
              properties:
                unit_id: { type: integer, minimum: 1 }
      responses:
        "201":
          description: queued
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QueueItem" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }

  /api/planets/{id}/buildings/queue:
    get:
      tags: [buildings]
      security: [{ bearerAuth: [] }]
      summary: List building queue
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  queue:
                    type: array
                    items: { $ref: "#/components/schemas/QueueItem" }

  /api/planets/{id}/buildings/queue/{taskId}:
    delete:
      tags: [buildings]
      security: [{ bearerAuth: [] }]
      summary: Cancel queued building
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
        - in: path
          name: taskId
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: cancelled }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/planets/{id}/research:
    post:
      tags: [research]
      security: [{ bearerAuth: [] }]
      summary: Start a research on a planet
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [unit_id]
              properties:
                unit_id: { type: integer }
      responses:
        "201":
          description: queued
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QueueItem" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }

  /api/research:
    get:
      tags: [research]
      security: [{ bearerAuth: [] }]
      summary: List my research (queue + levels)
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  queue:
                    type: array
                    items: { $ref: "#/components/schemas/QueueItem" }
                  levels:
                    type: object
                    additionalProperties: { type: integer }

  /api/planets/{id}/shipyard:
    post:
      tags: [shipyard]
      security: [{ bearerAuth: [] }]
      summary: Build ships or defense
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [unit_id, count]
              properties:
                unit_id: { type: integer }
                count:   { type: integer, format: int64, minimum: 1 }
      responses:
        "201":
          description: queued
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ShipyardQueueItem" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/planets/{id}/shipyard/queue:
    get:
      tags: [shipyard]
      security: [{ bearerAuth: [] }]
      summary: Shipyard queue on a planet
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  queue:
                    type: array
                    items: { $ref: "#/components/schemas/ShipyardQueueItem" }

  /api/planets/{id}/shipyard/inventory:
    get:
      tags: [shipyard]
      security: [{ bearerAuth: [] }]
      summary: Ships & defense on a planet
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  ships:   { type: object, additionalProperties: { type: integer, format: int64 } }
                  defense: { type: object, additionalProperties: { type: integer, format: int64 } }

  /api/planets/{id}/repair/disassemble:
    post:
      tags: [repair]
      security: [{ bearerAuth: [] }]
      summary: |
        Enqueue a batch disassembly of healthy units. Charges required
        cost and subtracts units up-front; returns cost is credited when
        the event fires (see DisassembleHandler).
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [unit_id, count]
              properties:
                unit_id: { type: integer }
                count:   { type: integer, format: int64, minimum: 1 }
      responses:
        "201":
          description: queued
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RepairQueueItem" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/planets/{id}/repair/repair:
    post:
      tags: [repair]
      security: [{ bearerAuth: [] }]
      summary: |
        Enqueue repair of all damaged ships of one unit_id. Cost scales
        with remaining shell_percent (more damaged = cheaper to repair,
        less damaged = more expensive in legacy formula).
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [unit_id]
              properties:
                unit_id: { type: integer }
      responses:
        "201":
          description: queued
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RepairQueueItem" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/planets/{id}/repair/damaged:
    get:
      tags: [repair]
      security: [{ bearerAuth: [] }]
      summary: Damaged ships on a planet (ships.damaged_count > 0)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  damaged:
                    type: array
                    items:
                      type: object
                      properties:
                        unit_id:       { type: integer }
                        count:         { type: integer, format: int64 }
                        damaged:       { type: integer, format: int64 }
                        shell_percent: { type: number }

  /api/planets/{id}/repair/queue:
    get:
      tags: [repair]
      security: [{ bearerAuth: [] }]
      summary: Active repair/disassemble queue on a planet
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  queue:
                    type: array
                    items: { $ref: "#/components/schemas/RepairQueueItem" }

  /api/artefacts:
    get:
      tags: [artefacts]
      security: [{ bearerAuth: [] }]
      summary: List my artefacts
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  artefacts:
                    type: array
                    items: { $ref: "#/components/schemas/Artefact" }

  /api/artefacts/{id}/activate:
    post:
      tags: [artefacts]
      security: [{ bearerAuth: [] }]
      summary: Activate an artefact from inventory
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Artefact" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /api/artefacts/{id}/deactivate:
    post:
      tags: [artefacts]
      security: [{ bearerAuth: [] }]
      summary: Deactivate an active artefact (revert its effect)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: deactivated }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/galaxy/{g}/{s}:
    get:
      tags: [galaxy]
      security: [{ bearerAuth: [] }]
      summary: Read a system (15 positions, planets/moons/debris)
      parameters:
        - in: path
          name: g
          required: true
          schema: { type: integer, minimum: 1, maximum: 16 }
        - in: path
          name: s
          required: true
          schema: { type: integer, minimum: 1, maximum: 999 }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SystemView" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/fleet:
    get:
      tags: [fleet]
      security: [{ bearerAuth: [] }]
      summary: List active fleets of the current user
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  fleets:
                    type: array
                    items: { $ref: "#/components/schemas/Fleet" }
    post:
      tags: [fleet]
      security: [{ bearerAuth: [] }]
      summary: Dispatch a fleet (v1 = TRANSPORT only, mission=7)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/FleetDispatch" }
      responses:
        "201":
          description: dispatched
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Fleet" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/fleet/{id}/recall:
    post:
      tags: [fleet]
      security: [{ bearerAuth: [] }]
      summary: |
        Recall a fleet while it is still outbound. Works only for
        state=outbound; any other state → 409 Conflict. Cargo stays
        on board and is refunded back to the source planet together
        with the ships by the return handler.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: returning
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Fleet" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /api/messages:
    get:
      tags: [messages]
      security: [{ bearerAuth: [] }]
      summary: Inbox — последние 100 сообщений, новые сверху.
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items: { $ref: "#/components/schemas/Message" }
    post:
      tags: [messages]
      security: [{ bearerAuth: [] }]
      summary: Отправить сообщение игроку.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to_username, subject, body]
              properties:
                to_username: { type: string }
                subject: { type: string }
                body: { type: string }
      responses:
        "201": { description: sent }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/messages/unread-count:
    get:
      tags: [messages]
      security: [{ bearerAuth: [] }]
      summary: Число непрочитанных сообщений.
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  count: { type: integer }

  /api/messages/{id}:
    delete:
      tags: [messages]
      security: [{ bearerAuth: [] }]
      summary: Удалить сообщение.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: deleted }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/messages/{id}/read:
    post:
      tags: [messages]
      security: [{ bearerAuth: [] }]
      summary: Пометить сообщение прочитанным (идемпотентно).
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: marked (or already was) }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/battle-reports/{id}:
    get:
      tags: [messages]
      security: [{ bearerAuth: [] }]
      summary: Полный battle report. Доступен attacker'у и defender'у.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BattleReportFull" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/espionage-reports/{id}:
    get:
      tags: [messages]
      security: [{ bearerAuth: [] }]
      summary: Полный espionage report.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { type: object }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/expedition-reports/{id}:
    get:
      tags: [messages]
      security: [{ bearerAuth: [] }]
      summary: Полный expedition report.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { type: object }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/battle-sim:
    post:
      tags: [battle]
      summary: Offline battle simulation (pure function, no side effects)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BattleInput" }
      responses:
        "200":
          description: ok (BattleReport if num_sim<2, SimStats if num_sim>=2)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/BattleReport"
                  - $ref: "#/components/schemas/SimStats"

  /api/achievements:
    get:
      tags: [achievements]
      security: [{ bearerAuth: [] }]
      summary: Список всех достижений + статус unlock.
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  achievements:
                    type: array
                    items: { $ref: "#/components/schemas/AchievementEntry" }

  /api/officers:
    get:
      tags: [officers]
      security: [{ bearerAuth: [] }]
      summary: Список офицеров и их статусов.
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  officers:
                    type: array
                    items: { $ref: "#/components/schemas/Officer" }

  /api/officers/{key}/activate:
    post:
      tags: [officers]
      security: [{ bearerAuth: [] }]
      summary: Нанять / продлить офицера (списывает кредиты).
