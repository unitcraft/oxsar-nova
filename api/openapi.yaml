        planet_name:   { type: string }
        buildings:
          type: array
          items: { $ref: "#/components/schemas/ResourceBuilding" }
        basic_metal:   { type: number }
        basic_silicon: { type: number }
        basic_hydrogen: { type: number }
        storage_metal:  { type: number }
        storage_silicon: { type: number }
