    Purchase:
      type: object
      properties:
        id:            { type: string }
        package_key:   { type: string }
        package_label: { type: string }
        credits:       { type: integer }
        price_rub:     { type: number }
        status:        { type: string, enum: [pending, paid, failed, refunded] }
