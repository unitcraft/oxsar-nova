        unlocked_at: { type: string, format: date-time, nullable: true }

    Officer:
      type: object
      properties:
        key:        { type: string }
        active:     { type: boolean }
        expires_at: { type: string, format: date-time, nullable: true }

    MarketRates:
      type: object
      properties:
        metal:     { type: number }
        silicon:   { type: number }
        hydrogen:  { type: number }
        user_rate: { type: number }

    ExchangeResult:
      type: object
      properties:
        from:        { type: string }
