# Балансовые формулы зданий. Значения — ориентировочные, соответствующие
# ogame/oxsar2 defaults. Точные коэффициенты выверяются против legacy
# на этапе M1 (cross-check с oxsar2 Planet_YII / CronCommand).
#
# cost_base: базовая стоимость уровня 1 (metal, silicon, hydrogen, energy)
# cost_factor: множитель стоимости на каждый следующий уровень
# time_base_seconds: базовое время постройки уровня 1 на robotic_factory=0
# max_level: максимальный допустимый уровень (из legacy consts.php MAX_BUILDING_LEVEL=40
#            и $GLOBALS["MAX_UNIT_LEVELS"] для исключений)
#
# Формула времени:
#   time_seconds = time_base * cost_factor^(level-1) /
#                  (1 + robotic_factory_level) /
#                  (2^nano_factory_level) /
#                  GAMESPEED
#
# Формула стоимости уровня N:
#   cost_N = cost_base * cost_factor^(N-1)
#
# Формула добычи (metal_mine): base_rate * level * 1.1^level * factors

buildings:
  metal_mine:
    id: 1
    cost_base:   { metal: 60,  silicon: 15,  hydrogen: 0 }
    cost_factor: 1.5
    time_base_seconds: 60
    base_rate_per_hour: 30   # при level=1
    energy_per_level: 10
    max_level: 40

  silicon_lab:
    id: 2
    cost_base:   { metal: 48,  silicon: 24,  hydrogen: 0 }
    cost_factor: 1.6
    time_base_seconds: 75
    base_rate_per_hour: 20
    energy_per_level: 10
    max_level: 40

  hydrogen_lab:
    id: 3
    cost_base:   { metal: 225, silicon: 75,  hydrogen: 0 }
    cost_factor: 1.5
    time_base_seconds: 90
    base_rate_per_hour: 10
    energy_per_level: 20
    max_level: 40

  solar_plant:
    id: 4
    cost_base:   { metal: 75,  silicon: 30,  hydrogen: 0 }
    cost_factor: 1.5
    time_base_seconds: 60
    energy_output_per_level: 20
    max_level: 40

  hydrogen_plant:
    id: 5
    cost_base:   { metal: 900, silicon: 360, hydrogen: 180 }
    cost_factor: 1.8
    time_base_seconds: 90
    max_level: 40

  robotic_factory:
    id: 6
    cost_base:   { metal: 400, silicon: 120, hydrogen: 200 }
    cost_factor: 2.0
    time_base_seconds: 180
    max_level: 40

  nano_factory:
    id: 7
    cost_base:   { metal: 1000000, silicon: 500000, hydrogen: 100000 }
    cost_factor: 2.0
    time_base_seconds: 600
    max_level: 12

  shipyard:
    id: 8
    cost_base:   { metal: 400, silicon: 200, hydrogen: 100 }
    cost_factor: 2.0
    time_base_seconds: 180
    max_level: 40

  metal_storage:
    id: 9
    cost_base:   { metal: 1000, silicon: 0, hydrogen: 0 }
    cost_factor: 2.0
    time_base_seconds: 120
    capacity_base: 5_000
    max_level: 40

  silicon_storage:
    id: 10
    cost_base:   { metal: 1000, silicon: 500, hydrogen: 0 }
    cost_factor: 2.0
    time_base_seconds: 120
    capacity_base: 5_000
    max_level: 40

  hydrogen_storage:
    id: 11
    cost_base:   { metal: 1000, silicon: 1000, hydrogen: 0 }
    cost_factor: 2.0
    time_base_seconds: 120
    capacity_base: 5_000
    max_level: 40

  research_lab:
    id: 12
    cost_base:   { metal: 200, silicon: 400, hydrogen: 200 }
    cost_factor: 2.0
    time_base_seconds: 180
    max_level: 40

  # Ракетная шахта (legacy UNIT_ROCKET_STATION=53).
  # max_rockets = level × rocket_capacity_per_level (legacy: level × 10).
  # Используется rocket/service.go для проверки запаса.
  missile_silo:
    id: 53
    cost_base:   { metal: 20000, silicon: 20000, hydrogen: 1000 }
    cost_factor: 2.0
    time_base_seconds: 360
    rocket_capacity_per_level: 10
    max_level: 40

  # Ремонтная фабрика (legacy UNIT_REPAIR_FACTORY=100, na_construction id=100).
  repair_factory:
    id: 100
    cost_base:   { metal: 800, silicon: 400, hydrogen: 200 }
    cost_factor: 2.0
    time_base_seconds: 30
    max_level: 40

  # Лунные здания (legacy mode=5). Только на луне (is_moon=true).
  moon_base:
    id: 54
    moon_only: true
    cost_base:   { metal: 50000, silicon: 20000, hydrogen: 10000 }
    cost_factor: 2.0
    time_base_seconds: 300
    max_level: 40

  star_surveillance:
    id: 55
    moon_only: true
    cost_base:   { metal: 100000, silicon: 20000, hydrogen: 50000 }
    cost_factor: 2.0
    time_base_seconds: 600
    max_level: 40

  star_gate:
    id: 56
    moon_only: true
    cost_base:   { metal: 4000000, silicon: 2000000, hydrogen: 1000000 }
    cost_factor: 2.0
    time_base_seconds: 1800
    max_level: 15

  moon_robotic_factory:
    id: 57
    moon_only: true
    cost_base:   { metal: 10000, silicon: 6000, hydrogen: 4000 }
    cost_factor: 2.0
    time_base_seconds: 240
    max_level: 40
