# Описания юнитов для wiki. Только русский — wiki-gen --lang добавится
# при необходимости. Источник: legacy oxsar2 + frontend/src/api/catalog.ts.
#
# Формат:
#   <key>:
#     short: «одна строка для подсказок»
#     long: |
#       Полный текст. Поддерживает [[unit:N]] для перекрёстных ссылок.

descriptions:
  # --- Здания ---
  metal_mine:
    short: Добывает металл из недр планеты.
    long: |
      Основной поставщик сырья для строительства несущих структур построек
      и кораблей. Металл — самое дешёвое сырьё, но зато его требуется больше,
      чем всего остального. Чем рудник больше, тем он глубже: с каждым уровнем
      производство растёт, но и потребление энергии увеличивается. Энергию
      даёт [[unit:4]] и [[unit:5]].

  silicon_lab:
    short: Добывает кремний для строительства и исследований.
    long: |
      Основной поставщик сырья для электронных строительных элементов и
      сплавов. Для добычи кремния требуется примерно вдвое больше энергии,
      чем для добычи металла, поэтому он и ценится выше. Кремний нужен почти
      для всех кораблей и зданий.

  hydrogen_lab:
    short: Синтезирует водород — топливо для флота.
    long: |
      Совершенствование синтезатора способствует увеличению его
      эффективности по обработке воды океана планеты и большей выработке
      водорода. Водород необходим в качестве топлива для кораблей, почти
      для всех исследований, просмотра галактик и сенсорной фаланги.

  solar_plant:
    short: Вырабатывает энергию из солнечного излучения.
    long: |
      Для обеспечения энергией [[unit:1]], [[unit:2]] и [[unit:3]] необходимы
      огромные солнечные электростанции. Чем больше построено станций, тем
      больше поверхности покрыто кварцевыми пластинами, перерабатывающими
      свет в электроэнергию. Базовый источник энергии планеты.

  hydrogen_plant:
    short: Мощная электростанция на термоядерном синтезе.
    long: |
      На термоядерных электростанциях под огромным давлением и при высокой
      температуре два атома тяжёлого водорода объединяются в один атом гелия,
      высвобождая огромное количество энергии. Чем мощнее реактор, тем больше
      энергии он даёт. Альтернатива [[unit:4]], когда требуются десятки тысяч
      единиц энергии.

  robotic_factory:
    short: Ускоряет строительство зданий.
    long: |
      Предоставляет простую рабочую силу для строительства планетарной
      инфраструктуры. Каждый уровень фабрики ускоряет постройку зданий
      на этой планете. Является требованием для [[unit:8]] и [[unit:7]].

  nano_factory:
    short: Вдвое ускоряет строительство за каждый уровень.
    long: |
      Венец робототехники: наниты — роботы размером в нанометр, которые,
      объединяясь в сеть, выполняют экстраординарные задания. С каждым уровнем
      фабрика нанитов сокращает время строительства зданий, кораблей и
      обороны вдвое. Эффект складывается с [[unit:6]].

  shipyard:
    short: Производит корабли и оборонительные сооружения.
    long: |
      В верфи производятся все виды кораблей и оборонительных сооружений.
      Чем выше уровень, тем быстрее можно строить более сложные и крупные
      корабли. Постройка [[unit:7]] дополнительно сокращает время.

  metal_storage:
    short: Увеличивает максимальный запас металла.
    long: |
      Огромное хранилище для добытых руд. Если оно заполнено, [[unit:1]]
      перестаёт работать.

  silicon_storage:
    short: Увеличивает максимальный запас кремния.
    long: |
      В этом хранилище складируется ещё необработанный кремний. Если оно
      заполнено, [[unit:2]] перестаёт работать.

  hydrogen_storage:
    short: Увеличивает максимальный запас водорода.
    long: |
      Огромные ёмкости вблизи космических портов. Если они заполнены,
      [[unit:3]] перестаёт работать.

  research_lab:
    short: Позволяет проводить научные исследования.
    long: |
      Для исследования новых технологий необходима исследовательская
      лаборатория. Чем выше её уровень, тем быстрее завершается исследование.
      Все технологии раздела «Исследования» проводятся здесь. Уровень
      [[unit:7]] также сокращает длительность работ.

  rocket_station:
    short: Хранит межпланетные ракеты для атаки.
    long: |
      Ракетные шахты служат для хранения ракет. С каждым уровнем можно
      хранить пять межпланетных или десять ракет-перехватчиков больше.
      Межпланетная ракета занимает место двух перехватчиков. Возможно
      произвольное комбинирование типов.

  repair_factory:
    short: Ремонтирует повреждённые корабли и оборону.
    long: |
      Ремонтный ангар выполняет две операции: ремонт повреждённых кораблей
      и обороны и утилизацию ненужных юнитов с возвратом части ресурсов.

  defense_factory:
    short: Ускоряет постройку оборонительных сооружений.
    long: |
      Завод обороны ускоряет производство всех оборонительных сооружений
      на планете — аналогично тому, как [[unit:6]] ускоряет постройку зданий.

  exchange:
    short: Быстрый обмен ресурсов по фиксированному курсу.
    long: |
      Обменник позволяет мгновенно обменять ресурсы планеты по фиксированному
      курсу. Курс улучшается с уровнем здания и активными артефактами.

  exch_office:
    short: Книга ордеров на обмен ресурсами между игроками.
    long: |
      Биржа позволяет выставлять ордера на обмен ресурсами с другими игроками.
      Курс определяется рынком, а не фиксирован.

  terra_former:
    short: Расширяет пригодную для постройки площадь планеты.
    long: |
      Терраформер увеличивает количество свободных полей под застройку:
      каждый уровень добавляет несколько полей к диаметру планеты.
      Незаменим, если планета мала, а ключевые шахты уже заняли всё место.

  # --- Лунные постройки ---
  moon_base:
    short: Основа луны — даёт возможность строить остальное.
    long: |
      Луна не имеет атмосферы, поэтому перед заселением требуется лунная
      база, обеспечивающая воздух, гравитацию и тепло. Каждый уровень даёт
      три новых поля под застройку.

  star_surveillance:
    short: Сенсоры наблюдения за флотами в системе.
    long: |
      Звёздные сенсоры отслеживают перемещения чужих флотов в системе и
      позволяют использовать сенсорную фалангу для разведки полётов
      из других галактик. Радиус действия растёт с уровнем.

  star_gate:
    short: Мгновенно перемещает флот между лунами.
    long: |
      Звёздные врата — телепортеры, способные пересылать флоты любого размера
      без затрат времени. Полёт «врата → врата» занимает 0 секунд, но между
      прыжками действует кулдаун, зависящий от [[unit:19]].

  moon_robotic_factory:
    short: Ускоряет строительство зданий на луне.
    long: |
      Лунный аналог [[unit:6]]: каждый уровень сокращает время постройки
      лунных зданий.

  # --- Исследования ---
  spyware:
    short: Развивает шпионские сенсоры.
    long: |
      Чем выше шпионаж, тем больше информации о противнике в разведотчёте
      и тем меньше шанс быть обнаруженным. Со 2-го уровня в отчёте об атаке
      виден общий размер вражеского флота, с 4-го — типы кораблей, с 8-го —
      точное число каждого типа.

  computer_tech:
    short: Открывает дополнительные слоты флота.
    long: |
      Каждый уровень компьютерной технологии даёт +1 одновременный полёт
      флота. Базовое значение слотов — 1; формула: 1 + ⌊computer_tech/6⌋
      дополнительных + по 1 за уровень начиная с 1-го.

  gun_tech:
    short: +10 % атаки флота и обороны за уровень.
    long: |
      Развивает системы вооружения: оружие точнее наводится и эффективнее
      использует энергию. Линейный бонус — каждый уровень увеличивает атаку
      всех ваших юнитов на 10 % от номинала.

  shield_tech:
    short: +10 % щита флота и обороны за уровень.
    long: |
      Усиливает энергоснабжение щитов. Линейный бонус — каждый уровень
      повышает прочность щитов на 10 %. Также каждый уровень открывает
      больше [[unit:49]] на планете.

  shell_tech:
    short: +10 % брони флота и обороны за уровень.
    long: |
      Специальные сплавы улучшают броню кораблей и обороны. С каждым уровнем
      устойчивость структуры увеличивается на 10 %.

  energy_tech:
    short: Требование для большинства высокотехнологичных юнитов.
    long: |
      Без развитой энергетики невозможна работа лазеров, плазменных орудий
      и продвинутых двигателей. Это технология-«ключ» к большому числу
      других исследований.

  hyperspace_tech:
    short: Требование для гипердвигателя; +10 % радиус фаланги.
    long: |
      Сплетение 4-го и 5-го измерения позволило исследовать более экономный
      двигатель. Кроме этого, искривлённое пространство увеличивает радиус
      сенсорной фаланги [[unit:55]] на 10 % за уровень.

  combustion_engine:
    short: +10 % скорость транспортов и истребителей.
    long: |
      Реактивный двигатель основан на принципе отдачи. Эффективность
      невелика, но он надёжен и дёшев. Развитие ускоряет [[unit:29]],
      [[unit:30]], [[unit:31]] и [[unit:38]] на 10 % за уровень.

  impulse_engine:
    short: +20 % скорость крейсеров и зондов.
    long: |
      Двигатель, использующий ядерную реакцию для нагрева рабочего тела.
      Ускоряет [[unit:33]], [[unit:32]], [[unit:36]] и [[unit:40]] на 20 %
      за уровень. Каждый уровень также увеличивает дальность межпланетных
      ракет.

  hyperspace_engine:
    short: +30 % скорость линкоров и флагманов.
    long: |
      Сжатие пространства в окрестности корабля позволяет преодолевать
      далёкие расстояния гораздо быстрее. Каждый уровень повышает скорость
      [[unit:34]] и [[unit:42]] на 30 %.

  laser_tech:
    short: Требование для ионной технологии.
    long: |
      Лазеры производят насыщенный энергетический луч когерентного света.
      Применяются всюду — от компьютеров до тяжёлых лазеров, режущих броню.

  ion_tech:
    short: Требование для плазменной технологии.
    long: |
      Поистине смертоносный наводимый луч из ускоренных ионов. При попадании
      на объект ионы наносят огромный ущерб.

  plasma_tech:
    short: Открывает [[unit:48]] и повышает урон по ресурсам.
    long: |
      Развитие ионной технологии, которая ускоряет высокоэнергетическую
      плазму. Открывает доступ к плазменному орудию [[unit:48]].

  expo_tech:
    short: +1 слот экспедиции за уровень.
    long: |
      Экспедиционная технология охватывает сканеры и исследовательские
      модули, благодаря которым флот может уходить в экспедиции.

  ballistics_tech:
    short: +1 ракета в шахте за уровень; точнее стрельба.
    long: |
      Технология баллистического анализа просчитывает бой до его начала на
      основе пространственного расположения, ТТХ юнитов и траекторий огня.
      Уменьшает промахи и попадания в уже уничтоженные цели.

  masking_tech:
    short: Снижает видимость флота для шпионажа и точности противника.
    long: |
      Маскировочная технология создаёт помехи в работе баллистического
      анализатора противника. Увеличивает живучесть юнитов, уменьшая точность
      огня противника.

  astro_tech:
    short: Открывает дополнительные планеты для колонизации.
    long: |
      Каждый уровень астрофизики увеличивает максимально возможное
      количество планет: предельно — MAX(computer_tech + 1, astro_tech / 2 + 1).

  igr_tech:
    short: Лаборатории на разных планетах объединяются в сеть.
    long: |
      Технология IGR — Inter-Galactic Research Network — позволяет верхним
      по уровню (1 + igr_tech) лабораториям [[unit:12]] объединять свои
      мощности при расчёте скорости исследований.

  # --- Корабли (короткие назначения; полные описания добавим по мере надобности) ---
  small_transporter:
    short: Дешёвый транспорт для перевозки ресурсов.
    long: |
      Самый дешёвый перевозчик. Грузоподъёмность невелика, но цена и скорость
      делают его рабочей лошадкой ранней игры.

  large_transporter:
    short: Основной грузовоз для перевозки ресурсов.
    long: |
      В пять раз вместительнее [[unit:29]]. Используется для логистики между
      планетами и сбора добычи после атак.

  light_fighter:
    short: Дешёвый и быстрый — основа атакующего флота.
    long: |
      Лёгкий истребитель — массовый ударный юнит. Дёшев, быстро строится,
      хорошо работает против обороны без щитов. В большом количестве
      эффективен почти против любой цели, но крошится от [[unit:33]].

  strong_fighter:
    short: Мощная альтернатива лёгкому истребителю.
    long: |
      Тяжёлый истребитель в три раза прочнее [[unit:31]] и втрое сильнее
      по атаке, но дороже и медленнее.

  cruiser:
    short: Эффективен против ракетных установок.
    long: |
      Крейсер обладает rapidfire против [[unit:31]] и [[unit:43]], что делает
      его опасным для дешёвой обороны и роёв лёгких истребителей.

  battle_ship:
    short: Мощный линкор с гиперпространственным двигателем.
    long: |
      Линкор — основной боевой корабль среднего и позднего этапа. Большая
      грузоподъёмность позволяет использовать его и для тяжёлой логистики.

  colony_ship:
    short: Колонизирует незанятые планеты.
    long: |
      Корабль одноразового назначения: при достижении пустого слота превращает
      его в новую планету игрока. Лимит планет определяется [[unit:112]].

  recycler:
    short: Собирает ресурсы из полей обломков.
    long: |
      Переработчик — единственный корабль, способный собирать обломки после
      боя. Чем больше обломков на координате, тем дольше идёт сбор.

  espionage_sensor:
    short: Шпионский зонд для разведки планет.
    long: |
      Дешёвый и быстрый разведчик. При слабом [[unit:13]] может быть
      перехвачен.

  solar_satellite:
    short: Добавляет энергию без строительства электростанций.
    long: |
      Солнечный спутник вырабатывает энергию на орбите планеты. В бою почти
      бесполезен и легко уничтожается.

  bomber:
    short: Специализируется на уничтожении обороны.
    long: |
      Бомбардировщик имеет rapidfire против всех оборонительных сооружений
      и применяется для прорыва защищённых планет.

  death_star:
    short: Сильнейший корабль — способен уничтожить луну.
    long: |
      Звезда смерти — финальный юнит игры. Имеет rapidfire против почти всего
      и используется для разрушения [[unit:54]] (миссия 9).

  # --- Оборона ---
  rocket_launcher:
    short: Базовая и дешёвая оборонительная установка.
    long: |
      Самая дешёвая оборона. Уязвима для [[unit:33]] (rapidfire ×10).

  light_laser:
    short: Лазерная пушка начального уровня.
    long: |
      Лучше [[unit:43]] по показателю «эффективности на ресурс», но дороже.

  strong_laser:
    short: Усиленная лазерная пушка.
    long: |
      Тяжёлый лазер — основа поздней обороны.

  ion_gun:
    short: Ионная пушка с большим щитом.
    long: |
      Ионная установка имеет высокие щиты и наносит постоянный ущерб щитам
      противника.

  gauss_gun:
    short: Мощная пушка против тяжёлых кораблей.
    long: |
      Пушка Гаусса эффективна против [[unit:34]] и [[unit:42]] — её урон
      достаточен, чтобы пробить даже толстую броню.

  plasma_gun:
    short: Наиболее разрушительное орудие обороны.
    long: |
      Плазменное орудие — сильнейшая стационарная пушка в игре. Дорогое,
      но способно одно-два-выстрелом уничтожить тяжёлый корабль.

  small_shield:
    short: Защищает оборону от первого залпа.
    long: |
      Малый щитовой купол поглощает один залп противника, защищая остальную
      оборону. На планете может стоять только один.

  large_shield:
    short: Усиленный щитовой купол.
    long: |
      Большой щитовой купол в пять раз мощнее [[unit:49]]. На планете может
      стоять только один.
