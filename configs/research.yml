# Баланс исследований. Формула идентична зданиям:
#   cost_N = cost_base * cost_factor^(N-1)
#   time   = (m+s)/ (1000 * (1 + research_lab_level)) / GAMESPEED
#
# cost_base заполняется из configs/construction.yml (mode=2) при старте процесса.
# Источник истины — construction.yml (na_construction).

research:
  spyware:
    id: 13
    cost_factor: 2.0

  computer_tech:
    id: 14
    cost_factor: 2.0

  gun_tech:
    id: 15
    cost_factor: 2.0

  shield_tech:
    id: 16
    cost_factor: 2.0

  shell_tech:
    id: 17
    cost_factor: 2.0

  energy_tech:
    id: 18
    cost_factor: 2.0

  hyperspace_tech:
    id: 19
    cost_factor: 2.0

  combustion_engine:
    id: 20
    cost_factor: 2.0

  impulse_engine:
    id: 21
    cost_factor: 2.0

  hyperspace_engine:
    id: 22
    cost_factor: 3.0

  laser_tech:
    id: 23
    cost_factor: 2.0

  ion_tech:
    id: 24
    cost_factor: 2.0

  plasma_tech:
    id: 25
    cost_factor: 2.0

  # ign / gravi — «пустые» исследования легаси (base_cost в construction.yml).
  # Добавлены, потому что death_star требует gravi level 1 (см. requirements.yml).
  # Без них requirements.Check молча возвращал «нет требований», и DS можно было
  # строить без проверки.
  ign:
    id: 26
    cost_factor: 2.0

  expo_tech:
    id: 27
    cost_factor: 1.75

  gravi:
    id: 28
    cost_factor: 3.0

  ballistics_tech:
    id: 103
    cost_factor: 2.0

  masking_tech:
    id: 104
    cost_factor: 2.0

  # Astrophysics (id=112). План 20 Ф.7, ADR-0005.
  # Расширяет лимит колоний и даёт слоты экспедиций.
  astro_tech:
    id: 112
    cost_factor: 1.75
