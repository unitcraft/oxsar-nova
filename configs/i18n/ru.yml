info:
  ABORT: Отмена
  ALIEN_TECH: Инопланетная технология
  ALIEN_TECH_DESC: Эта технология позволяет ремонтировать инопланетные корабли.
  ALIEN_TECH_FULL_DESC: Эта технология позволяет ремонтировать инопланетные корабли.
  ANNIHILATION_ENGINE: Аннигиляционный модуль
  ANNIHILATION_ENGINE_DESC: "При подключении к любому типу двигателей увеличивает скорость флота в полете на 10%."
  ANNIHILATION_ENGINE_FULL_DESC: "Аннигиляция - взаимоуничтожение частицы и античастицы при их столкновении с высвобождением огромного количества энергии. Антиматерию крайне сложно синтезировать и хранить, поэтому создание эффективного двигателя, основанного на принципе аннигиляции, пока невозможно. Однако среди обломков крупных инопланетных кораблей были найдены модули двигателей, работающих именно по такому принципу. Некоторые из них находятся в рабочем состоянии и могут быть совмещены с известными типами двигателей, давая им прирост производительности в 10%."
  ARTEFACT: Артефакт
  ARTEFACTS_TECH: Изучение артефактов
  ARTEFACTS_TECH_DESC: Технология позволяет активировать артефакты. Количество одновременно работающих артефактов на всех планетах увеличивается с каждым уровнем на 1.
  ARTEFACTS_TECH_FULL_DESC: В исследовании инопланетных артефактов работают самые лучшие научные подразделения Вашей империи. Для изучения неизвестных технологий и механизмов работы артефактов используются лучшие эвристические методы анализа и супер компьютерные технологии. Данная технология позволяет использовать артефакты и поддерживать некоторые из них в рабочем состоянии некоторое время. Максимальное количество активированных артефактов на всех планетах ограничено уровнем этой технологии.
  ARTEFACT_PACKED_BUILDING: Запакованное строение
  ARTEFACT_PACKED_RESEARCH: Запакованное исследование
  ARTEFACT_PACKING_BUILDING: Конструкторский модуль
  ARTEFACT_PACKING_RESEARCH: Исследовательский модуль
  ASSAULT_REPORT_TITLE: Отчет о сражении
  ASSEMBLY_MODULE__31_10: Модуль сборки
  ASSEMBLY_MODULE__31_10_DESC: Добавляет к флоту 10 легких истребителей.
  ASSEMBLY_MODULE__31_10_FULL_DESC: Развитие инопланетной техники позволяет создавать роботов, подобных известным в галактике нанитам. Однако вместо нанитов общего назначения инопланетяне предпочитают использовать специализированных нанитов, оптимизированных для выполнения единственной задачи. Модуль сборки состоит из микрокомпьютера, управляющего процессом сборки, и множества нанитов, предназначенных для создания кораблей конкретного типа. Этот модуль предназначен для сборки 10 легких истребителей.
  ASSEMBLY_MODULE__42_1: Модуль сборки
  ASSEMBLY_MODULE__42_1_DESC: Добавляет к флоту 1 Звезду смерти.
  ASSEMBLY_MODULE__42_1_FULL_DESC: Развитие инопланетной техники позволяет создавать роботов, подобных известным в галактике нанитам. Однако вместо нанитов общего назначения инопланетяне предпочитают использовать специализированных нанитов, оптимизированных для выполнения единственной задачи. Модуль сборки состоит из микрокомпьютера, управляющего процессом сборки, и множества нанитов, предназначенных для создания кораблей конкретного типа. Этот модуль предназначен для сборки 1 Звезды смерти.
  ATOMIC_DENSIFIER: Атомный уплотнитель
  ATOMIC_DENSIFIER_DESC: "Увеличивает емкость хранилищ на 10%."
  ATOMIC_DENSIFIER_FULL_DESC: "Генерирует силовое поле, сжимающее вещество, что позволяет хранилищам вмещать больше ресурсов. В течение недели емкость хранилищ ресурсов на всех планетах увеличивается на 10%."
  BALLISTICS_TECH: Баллистическая технология
  BALLISTICS_TECH_DESC: Баллистический анализатор управляет высокоточным наведением оружия, увеличивая точность прямых попаданий в юниты противника.
  BALLISTICS_TECH_FULL_DESC: Технология баллистического анализа позволяет компьютерным системам просчитывать бой до его начала на основе пространственного расположения, технических характеристик юнитов и траекторий огневых путей и излучений. Это делает возможным вести прицельный и высокоточный огонь на всем протяжении боя. Технология уменьшает промахи и попадания в уже уничтоженные юниты.
  BATTLE_ATTACK_POWER: Единство атаки
  BATTLE_ATTACK_POWER_DESC: "Увеличивает во время сражения силу атаки на 10% для всех юнитов всех игроков своей стороны."
  BATTLE_ATTACK_POWER_FULL_DESC: "Увеличивает во время сражения силу атаки на 10% для всех юнитов всех игроков своей стороны."
  BATTLE_SHELL_POWER: Единство брони
  BATTLE_SHELL_POWER_DESC: "Увеличивает во время сражения силу брони на 10% для всех юнитов всех игроков своей стороны."
  BATTLE_SHELL_POWER_FULL_DESC: "Увеличивает во время сражения силу брони на 10% для всех юнитов всех игроков своей стороны."
  BATTLE_SHIELD_POWER: Единство щитов
  BATTLE_SHIELD_POWER_DESC: "Увеличивает во время сражения силу щитов на 10% для всех юнитов всех игроков своей стороны."
  BATTLE_SHIELD_POWER_FULL_DESC: "Увеличивает во время сражения силу щитов на 10% для всех юнитов всех игроков своей стороны."
  BATTLE_SHIP: Линкор
  BATTLE_SHIP_DESC: Линкоры как правило составляют основу флота. Их тяжёлые орудия, высокая скорость и большой грузовой тоннаж делают их серьёзными противниками.
  BATTLE_SHIP_FULL_DESC: Линкоры как правило составляют основу флота. Их тяжёлые орудия, высокая скорость и большой грузовой тоннаж делают их серьёзными противниками.
  BOMBER: Бомбардир
  BOMBER_DESC: Бомбардировщик был разработан специально для того, чтобы уничтожать планетарную защиту.
  BOMBER_FULL_DESC: "Бомбардировщик был разработан специально для того, чтобы уничтожать планетарную защиту. С помощью лазерного прицела он точно сбрасывает плазменные бомбы на поверхность планеты и таким образом наносит огромные повреждения оборонительным сооружениям.\r\nНедостатки: Сильно медленный корабль."
  CATALYST: Катализатор
  CATALYST_DESC: "Увеличивает выработку ресурсов на 10%."
  CATALYST_FULL_DESC: "Универсальный катализатор ускоряет ход химических процессов при синтезе металла, кремния и водорода. В течение недели выработка ресурсов на всех планетах увеличивается на 10%."
  COLONY_SHIP: Колонизатор
  COLONY_SHIP_DESC: При помощи этого корабля можно осваивать незаселённые планеты.
  COLONY_SHIP_FULL_DESC: Колонизатор предназначен для освоения ранее не занятых планет. Он используется в новой колонии в качестве поставщика сырья - его разбирают и используют весь полезный материал для освоения нового света.
  COMBUSTION_ENGINE: Реактивный двигатель
  COMBUSTION_ENGINE_DESC: Технология для развития двигателей небольших комсических кораблей, что позволяет летать с небольшим потреблением топлива на большие растояния.
  COMBUSTION_ENGINE_FULL_DESC: "Реактивный двигатель основывается на принципе отдачи. Материя, разогретая до высоких температур, выбрасывается в направлении, противоположном движению и даёт ускорение кораблю. Эффективность этих двигателей достаточно мала, но они достаточно надёжны, дёшевы в производстве и обслуживании. Кроме того они занимают гораздо меньше места на корабле по сравнению с остальными двигателями, поэтому их всё ещё достаточно часто можно встретить на маленьких кораблях. Так как реактивные двигатели являются основой любого полёта в космос, следует исследовать их как можно раньше. Дальнейшее развитие этих двигателей делает следующие корабли с каждым уровнем на 10% быстрее:<br /><br />\r\nмалые транспорты (до тех пор пока не будет исследован импульсный двигатель 5-го уровня) , большие транспорты, лёгкие истребители и шпионские зонды."
  COMPUTER_TECH: Компьютерная технология
  COMPUTER_TECH_DESC: С увеличением мощности компьютеров можно командовать всё большим количеством флотов. Каждый уровень компьютерной технологии увеличивает максимальное количество флотов на один.
  COMPUTER_TECH_FULL_DESC: Компьютерная технология предназначена для расширения имеющихся в наличии компьютерных мощностей. В результате на планете развиваются более продуктивные и эффективные компьютерные системы, возрастает вычислительная мощность и скорость протекания вычислительных процессов. С повышением мощности компьютеров можно одновременно командовать всё большим количеством флотов. Каждый уровень развития компьютерной технологии даёт возможность командовать +1 флотом. Чем больше рассылается флотов, тем больше можно совершать налётов и тем самым захватывать больше сырья. Естественно, что эта технология полезна и торговцам, так как она позволяет им одновременно рассылать больше торговых флотов. По этой причине следует постоянно развивать компьютерную технологию на протяжении всей игры.
  CONTINUE: Продолжить
  CRUISER: Крейсер
  CRUISER_DESC: Крейсеры почти втрое сильней защищены, чем тяжёлые истребители, а по огневой мощи они превосходят тяжёлые истребители почти в два раза. К тому же они очень быстры.
  CRUISER_FULL_DESC: С развитием тяжёлых лазеров и ионных пушек тяжёлые истребители всё больше вытеснялись. Несмотря на многочисленные усовершенствования огневая мощь и бронирование не могли быть настолько изменены, чтобы действенно противостоять этим оборонительным орудиям. Поэтому было решено построить новый класс кораблей, который объединял бы в себе больше бронирования и огневой мощи. Так появился крейсер. Крейсеры почти втрое сильней защищены, чем тяжёлые истребители и обладают более чем удвоенной огневой мощью. К тому же они очень быстры. Нет лучшего оружия против средней защиты. Почти столетие крейсеры неограниченно господствовали во вселенной. С появлением орудий Гаусса и плазменных орудий их господство закончилось. Однако и сегодня их охотно применяют против групп истребителей.
  DEATH_STAR: Звезда смерти
  DEATH_STAR_DESC: Звезда смерти оснащена гигантской гравитонной пушкой, которая может уничтожать корабли и даже луны.
  DEATH_STAR_FULL_DESC: Звезда Смерти оснащена гравитонной пушкой, которая может уничтожать все типы кораблей и даже луны. Для производства достаточного количества энергии, звезда смерти практически полностью состоит из генераторов. Только огромные звёздные империи имеют достаточно ресурсов и работников для строительства этого огромного корабля.
  DEFENSE_FACTORY: Оборонный завод
  DEFENSE_FACTORY_FULL_DESC: В оборонном заводе производятся все виды оборонительных сооружений. Чем он больше, тем быстрее можно строить более сложные и более крупные оборонительные сооружения. Посредством строительства фабрики нанитов производятся миниатюрные роботы, которые помогают работникам работать быстрее.
  DEFENSE_FACTORY_REQUIRED: Необходимо построить оборонный завод.
  DEMOLISH: "Уничтожение:"
  DEMOLISH_NOW: '&laquo; Снести &laquo;'
