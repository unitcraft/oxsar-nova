  TARGET_BUILDING_DESTROYED: "Атакующий разрушил:"
  TARGET_BUILDING_NOT_DESTROYED: "Не удалось разрушить:"
  TARGET_MOON_DESTROYED: Генераторы Звезд Смерти атакующего накапливают энергию для гравитационной атаки и делают выстрел по Луне. Всё более усиливающиеся толчки сотрясают спутник. Луна начинает деформироваться, по ее экватору несколько раз проходят гравитационные волны, затем взрыв ослепляет приборы атакующего. Мгновенье и приборы фиксируют пустоту, Луна уничтожена, ее больше нет.
  TARGET_MOON_NOT_DESTROYED: Генераторы Звезд Смерти атакующего накапливают энергию для гравитационной атаки и делают выстрел по Луне. Толчки, один за одним, сотрясают спутник, но Луна остается на месте. Спутник стабилизируется высвобождая люшнюю энергию гравитационными импульсами. Мощности генераторов Звезд Смерти не хватило, чтобы уничтожить Луну.
  TURN: Раунд
