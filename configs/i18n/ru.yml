  REQUEST_DATA: Отправить
  REQUEST_PASSWORD: "Здравствуйте, {@req_username}! <br /><br /> Кто-то, возможно Вы, на сайте {config}pagetitle{/config} запросил забытый пароль. Если Вы действительно забыли пароль, то для получения нового нажмите на ссылку ниже: <br /><br /> {@new_pw_url} <br /><br /> Если Вы не запрашивали пароля, проигнорируйте это письмо. <br /><br /> Запрос был отправлен с IP-адреса {@req_ipaddress}. <br /><br /> Чтобы активировать аккаунт без смены пароля, нажмите на ссылку ниже: <br /><br /> {@reactivate_url} <br /><br /> С уважением, <br /> Ваша команда {config}pagetitle{/config}"
  REQUEST_USERNAME: "Здравствуйте, {@req_username}!\r\n\r\nКто-то, возможно Вы, на сайте {config}pagetitle{/config} запросили забытый логин.\r\n\r\nВаш Логин: {@req_username}\r\n\r\nЕсли Вы не забывали свой логин, советуем Вам в настройках изменить адрес электронной почты. Запрос был отправлен с IP-адреса {@req_ipaddress}.\r\n\r\nС уважением,\r\nВаша команда {config}pagetitle{/config}"
  RULES: Правила
  SCREENSHOTS: Скриншоты
  SCREENSHOT_GALAXY_BROWSER: Представление Галактики
  SCREENSHOT_MAIN_PAGE: Домашнаяя страница
  SIGN_IN: Войти
  SIGN_UP: Регистрироваться
  SPACE_EVENTS_LIST: Текущие задания во вселенной
  START_UP_MESSAGE: "Добро пожаловать в {config}pagetitle{/config}!\r\n\r\n{config}pagetitle{/config} - это многопользовательская космическая онлайн игра. Все игроки развиваются в единной вселенной. Здесь можно приглашать друзей и объединять свои усилия в нападении на врагов и обороне, использовать уникальную систему боя и собственный симулятор сражений. Биржа позволит вести торговлю ресурсами, кораблями и артефактами с другими игроками, научные исследования откроют новые технологии и более совершенные системы вооружения. Используя множество стратегий и тактик развития, ты сможешь расширять свою империю и усиливать влияние на другие галактики во имя главной цели – стать хозяином {config}pagetitle{/config}.\r\n\r\nЧтобы развитие империи шло полным ходом, строй шахты по добыче ресурсов. Когда заканчивается постройка или накапливается нужное количество ресурсов, строй новые здания в меню <i>Постройки</i>. Однако, не забывай про Энергию. Без Энергии ни одна шахта не сможет добывать ресурсы.\r\n\r\nСистема Достижений поможет тебе стать грозой {config}pagetitle{/config}. Следуй ее подсказкам и твое развитие пойдет по оптимальному пути.\r\n\r\nЛюбые вопросы по игре можно обсудить в <i>Чате</i>, не стесняйся, спрашивай, там всегда готовы прийти на помощь.\r\n\r\nС уважением,\r\nтвоя команда {config}pagetitle{/config}"
  START_UP_MESSAGE_SUBJECT: Добро пожаловать, {@regUsername}!
  SUCCESS_REGISTRATION: Вы успешно зарегистрировались во Вселенной. Для того чтобы начать играть, зайдите в свой почтовый ящик, дождитесь получения письма и следуйте приведенным там инструкциям. Вселенная ждет тебя, поторопись!
