Achievements:
  ACHIEVEMENT_BONUS: Награда
  AVAIL_ACHIEVEMENTS: Невыполненные достижения
  DONE_ACHIEVEMENTS: Полученные достижения
  FIRST_COMPUTER_TECH: Открыть второй фронт.
  FIRST_COMPUTER_TECH_DESC: Зачастую для победы над противником его надо атаковать в нескольких местах одновременно. Для координации атакующих флотов требуются огромные вычислительные мощности. Исследуйте компьютерную технологию, чтобы управлять большим количеством флотов.
  FIRST_DEFFENCE: Крепим стены.
  FIRST_DEFFENCE_DESC: Галактика - опасное и суровое место. Пока ваш флот бороздит просторы космоса, на вашу планету могут напасть другие игроки. Заставьте их заплатить за самоуверенность - начните строить оборону.
  FIRST_ENERGY: Солнце - наш друг.
  FIRST_ENERGY_DESC: Исследуя солнечную радиацию можно попытаться добыть из неё энергию. Исследуйте энергетическую технологию для увеличения выработки электричества.
  FIRST_ENGINE: Предполетная подготовка.
  FIRST_ENGINE_DESC: Для перемещения в пространстве вашим кораблям нужны надежные и мощьные двигатели. Исследовав свой первый двигатель вы станете еще на шаг ближе к покорению космоса.
  FIRST_HYDROGEN: Синяя кровь.
  FIRST_HYDROGEN_DESC: В далеком будущем цивилизации отказались от нефти, как от основного источника топлива, теперь повсеместно используется водород. На нем летают корабли и его потребляет научное оборудование. Постройте свой первый синтезатор водорода и обеспечьте свою планету топливом.
  FIRST_METAL: Метал - основа всего.
  FIRST_METAL_DESC: Для строительства зданий, кораблей и обороны, а так же для исследования некоторых технологий нужен метал. Он добывается на руднике. Постройте свой первый рудник по добыче метала.
  FIRST_RESS_EXCHANGE: Рыночная экономика.
  FIRST_RESS_EXCHANGE_DESC: Для великих свершений не всегда хватает ресурсов. Как хорошо, что в Вашей империи открылся Обменник. Поищите его в меню. Обменяйте некоторое количество одних ресурсов на другие и продолжайте свое восхождение к власти над Миром.
  FIRST_ROBOT: Роботы, на работу!
  FIRST_ROBOT_DESC: Ученые установили, что использование роботов ускоряет строительсво зданий и кораблей. Постройте фабрику роботов, что бы узнать так ли это.
  FIRST_SILICON: Кремниевое вещество.
  FIRST_SILICON_DESC: Кремний используется для производства микросхем, которые необходимы ученым для работы и используются практически в каждом приборе и строении. Постройте свой первый рудник по добыче кремния и начните свой путь развития высоких технологий.
  FIRST_SOLAR: Берегите природу.
  FIRST_SOLAR_DESC: Солнце - гигантская электростанция, надо просто научится добывать из него энергию. Постройте Солнечную электростанцию и обеспечьте теплом и энергией свою планету.
  FIVE_ATTACKER: Железные мускулы.
  FIVE_ATTACKER_DESC: Не все планеты сразу признают в Вас своего повелителя. Постройте несколько кораблей атакующего плана для начала Вашего победоносного шествия по галактике.
  FIVE_ROCKET: Мы не одни, но мы защищены.
  FIVE_ROCKET_DESC: Надежно защитите свои тылы - постройте ракетную оборону!
  LOGIN: Добро пожаловать.
  LOGIN_DESC: Чтобы получить Ваши первые бонусные ресурсы, нажмите кнопку Получить бонус. Система Достижений поможет Вам пройти курс молодого бойца и стать грозой Мира OXSAR. Чтобы выполнить Достижения, нужно выполнить все его требования. Достижения, которые Вы скрыли, всегда можно найти выбрав в меню пункт Достижения.
  MOON_BONUS_ONLY: Награду за это достижение можно получить только на луне.
  NEW_ACHIEVEMENTS_PREFIX: Новых
  PLANET_BONUS_ONLY: Награду за это достижение нельзя получить на луне.
  RECALC_ACHIEVEMENTS: Пересчитать
  SIMULATE_BATTLE: Тактический гений.
  SIMULATE_BATTLE_DESC: Победа в любом сражении на 80 процентов состоит из грамотного планирования. Ваши ученые помогут вам в этом, они разработали систему для предсказания, которая позволит проверить все Ваши тактические схемы. Найдите в меню Симулятор боя и попробуйте провести один бой в лабораторных условиях.
  STARTER: Крепкий фундамент
  STARTER_DESC: Перед тем как выйти в космос, обустройте свою планету.
  STATE_ASSAULT_SIMULATION: Провести симуляцию боя.
  STATE_RES_UPDATE_EXCHANGE: Обменять ресурсы в обменнике
  TEN_TRANSPORT: Космический дальнобойщик.
  TEN_TRANSPORT_DESC: Для перевозок грузов между планетами, а так же для сбора ресурсов с других планет лучше всего подходят Транспорты. Еще транспорты могут везти дополнительные запасы топлива, тем самым увеличивая дальность полета флота.
  TUTORIAL_END: Конец курса молодого бойца.
  TUTORIAL_END_DESC: Перед тем как закончить курс молодого бойца, закончите обустраивать свою империю.
