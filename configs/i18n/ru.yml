  ATTACKER_FLLETS_EXPLODE: Генераторы Звезд Смерти атакующего накапливают энергию для гравитационной атаки и делают выстрел по Луне. Усиливающиеся толчки сотрясают спутник, но не могут разорвать его. Гравитация Луны выбрасывает люшнюю энергию. Мощнейшая энергетическая волна направляется к флоту атакующего, затем хлопок. Флот атакующего распадается на субматерию и исчезает во мраке вселенной.
