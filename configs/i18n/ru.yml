  FORGOTTEN: забыли?
  GAME_DESCRIPTION: "<p /> Довольно тратить время на земные игры! <p /> В <b>БЕСПЛАТНОЙ</b> космической онлайн стратегии <b>МИР OXSAR</b> ты можешь реализовать весь свой игровой потенциал. <p /> Регистрируйся и играй через любой браузер или телефон и тебе откроется таинственный <b>МИР OXSAR</b>. <p /> Создай военную и экономическую инфраструктуру на своей планете и отправляйся колонизировать другие, покоряй новые звездные системы и галактики. <p /> <b>МИР OXSAR</b> - это многопользовательская онлайн игра, куда можно приглашать друзей и объединять свои усилия в нападении на врагов и обороне, использовать уникальную систему боя и собственный симулятор сражений.  Биржа позволит вести торговлю ресурсами, кораблями и артефактами с другими игроками, научные исследования откроют новые технологии и более совершенные системы вооружения.  Используя множество стратегий и тактик развития, ты будешь расширять свою империю и усиливать влияние на другие галактики во имя главной цели – стать хозяином вселенной в <b>МИРЕ OXSAR!</b>."
