AutoMessages:
  ALLIANCE_ABANDONED: "Ваш альянс [%s] распался. Вы можете найти новый альянс, либо продолжать играть в одиночку."
  ALLIANCE_ABANDONED_SUBJECT: Альянс распущен
  ALLIANCE_APPLICATION: Заявка на вступление
  ARTEFACTS_GRASPED_MSG: "В сражение на планете {@coords_from} были захвачены артефакты: {@artefacts}. Ваш флот вместе с артефактами прибудет на планету {@planet} {@coords}."
  ARTEFACTS_GRASPED_SUBJECT: Захват артефактов противника
  ASTEROID_IMPACT: "Гигантский астероид замечен на орбите Вашей планеты %s %s. Командование флота успело выдать приказы и уничтожить астероид. Образовавшиеся обломки можно переработать.\r\nНа орбите находится %s металла и %s кремния."
  ASTEROID_IMPACT_SUBJECT: Взаимодействие с астероидом
  BUILDING_DESTROYED_MSG: В сражении на планете {@coords_planet} была разрушена Ваша постройка {@building_name}.
  BUILDING_DESTROYED_SUBJECT: Ваша постройка была разрушена
  COLONY_ATTEMPT_SUBJECT: Основание колонии
  DELIVERY_UNITS_REPORT: "Купленный флот (%s) достиг планеты %s %s. <br /> Флот оставил груз: %s металла, %s кремния и %s водорода."
  DELIVERY_UNITS_REPORT_SUBJECT: Доставлен купленный флот
  ESPIOANGE_COMMITTED: "Чужой флот %s с %s %s был замечен около %s %s.<br />Защита от шпионажа: %d&#37;<br />[b][color=#0f0]%s[/color][/b]"
  ESPIOANGE_COMMITTED_SUBJECT: Шпионаж
  ESP_PROBES_DESTROYED_1: Шпионские зонды были сбиты.
  EXPEDITION_ARTEFACT: "Ваша экспедиция нашла загадочный артефакт: {@art_name}"
  EXPEDITION_ASTEROID_DISCOVERY_1: "Ваши исследователи нашли астероидное поле обломков: {@debrismetal} металла и {@debrissilicon} кремния. Переработчики добыли: {@metal} металла и {@silicon} кремния."
  EXPEDITION_ASTEROID_DISCOVERY_2: "Ваши исследователи нашли давно отгремевшее поле битвы. От разрушенных кораблей остались обломки, которые можно собрать: {@debrismetal} металла и {@debrissilicon} кремния. Переработчики добыли: {@metal} металла и {@silicon} кремния."
  EXPEDITION_ASTEROID_DISCOVERY_NO_CARGO: "Ваши исследователи нашли астероидное поле обломков: {@debrismetal} металла и {@debrissilicon} кремния. К сожалению в экспедиции не было переработчиков, чтобы собрать ресурсы из открытого космоса."
  EXPEDITION_BATTLEFIELD_DISCOVERY: "Ваши исследователи обнаружили следы давно отгремевшей битвы. Среди тон покореженного металла удалось найти корабли, пригодные для дальнейшего использования: {@new_ships}"
  EXPEDITION_CREDITS_DISCOVERY_1: Ваши исследователи обнаружили поле сражения. К сожалению все корабли не исправны и без ресурсов, но в одном из уцелевших сейфов исследователи нашли {@credits} кредитов. Поздравляем, кредиты уже переведены на Ваш счет. Флот возвращается на базу.
  EXPEDITION_CREDITS_DISCOVERY_2: Экспедиционное оборудование запеленговало странный объект. Это оказалась капитанская рубка неизвестного корабля с работающим позывным устройством. Рубка оказалась отрезанной от основного корабля супер оружием, исследователи поражены, ничего подобного они не видели. В абсолютно целом сейфе исследователи нашли {@credits} кредитов. Поздравляем, кредиты уже переведены на Ваш счет. Флот возвращается на базу.
  EXPEDITION_CREDITS_DISCOVERY_3: Экспедиционное оборудование запеленговало странный объект. Это оказался одноместный поврежденный космический корабль с мертвым существом неизвестной расы. Под сиденьем инопланетянина исследователи нашли {@credits} кредитов. Поздравляем, кредиты уже переведены на Ваш счет. Флот возвращается на базу.
  EXPEDITION_CREDITS_DISCOVERY_4: Экспедиционное оборудование запеленговало странный объект. Это оказался мертвый инопланетянин-пилот, о чем свидетельствует его экипировка. Исследование показало, что инопланетянин умер, находясь в открытом космосе в состоянии анабиоза {@anabios_years} лет, когда системы поддержания жизнеобеспечения израсходовали свои ресурсы (видимо его выкинуло в открытый космос в каком-то сражении). В одежде пилота обнаружен позывной маячок и {@credits} кредитов. Кредиты уже переведены на Ваш счет. Флот возвращается на базу.
  EXPEDITION_CREDITS_DISCOVERY_5: "Экспедиционное оборудование запеленговало странный объект. Это оказался небольшой поврежденный корабль инопланетян. Исследователи внимательно осмотрели его и кое что нашли: хитрые инопланетяне запрятали в тайнике {@credits} кредитов. Поздравляем, кредиты уже переведены на Ваш счет. Флот возвращается на базу."
  EXPEDITION_CREDITS_DISCOVERY_6: Ваши исследователи обнаружили поле сражения. К сожалению все корабли не исправны и без ресурсов, но в тайнике одного из кораблей внимательные исследователи нашли {@credits} кредитов. Поздравляем, кредиты уже переведены на Ваш счет. Флот возвращается на базу.
  EXPEDITION_DELAY_RETURN: "Ваши исследователи ничего не нашли, к тому же они заблудились. На поиск пути домой понадобиться на {@percent}% больше времени."
  EXPEDITION_FAST_RETURN_1: "Ваши исследователи ничего не нашли. К счастью, они обнаружили по пути стабильную черную дыру, проход через которую позволит им сократить обратный путь на {@percent}%"
  EXPEDITION_FAST_RETURN_2: "Ваши исследователи ничего не нашли. К счастью, из короны ближайшей звезды исходит поток солнечного ветра, который позволит им сократить время обратного пути на {@percent}%"
  EXPEDITION_FAST_RETURN_3: "Флот Вашей экспедиции попал в поле действия огромного магнитного поля неизвестного происхождения. К счастью, это позволит им сократить время обратного пути на {@percent}%"
  EXPEDITION_LOST_1: К сожалению связь с экспедицией была утеряна.
  EXPEDITION_LOST_2: Связь с Вашими исследователями потеряна. Скорее всего, они больше не вернутся...
  EXPEDITION_NEUTRAL_PLANET: "Исследователям удалось установить координаты планеты, на которой произошел бой: {@planet}.<br/>Обломки, оставшиеся после битвы, находятся на её орбите: {@m_scraps} металла и {@s_scraps} кремния. Поспешите, чтобы забрать их, т.к. планета не стабильна и скоро разрушится."
  EXPEDITION_NEUTRAL_PLANET_SUBJ: Открытие неизвестной планеты
  EXPEDITION_NOTHING_1: Ваш флот долго бороздил просторы вселенной, однако сенсоры учённых так и не смогли зафиксировать ничего интересного.
  EXPEDITION_NOTHING_2: Ваши исследователи прошли мимо Сверхновой звезды и сделали великолепные фотографии. Больше ничего интересного в выбранном секторе они не нашли.
  EXPEDITION_NOTHING_3: Ваши исследователи провели все время, предоставленное на изучение выбранного сектора. Но они не нашли ничего интересного.
  EXPEDITION_NOTHING_4: Ваш флот обнаружил одну планету, привлекшую внимание! Исследователи нашли на ней забавных маленьких зверьков. Больше ничего обнаружено не было.
  EXPEDITION_NOTHING_5: Ваши исследователи запеленговали на пути следования флот огромных размеров инопланетного происхождения. Командование приняло решение не рисковать и вернуться на базу.
  EXPEDITION_NOTHING_6: Ваши исследователи обнаружили на пути следования нестабильную черную дыру. Командование приняло решение не рисковать и вернуться на базу.
  EXPEDITION_NOTHING_7: Ваши исследователи прошли мимо огромной туманности антиматерии. Больше ничего обнаружено не было.
  EXPEDITION_RESOURCE_DISCOVERY_1: "Ваши исследователи обнаружили старые и не рабочие корабли, дрейфующие в космосе. Командование распорядилось забрать имеющиеся в трюмах ресурсы: {@metal} металла, {@silicon} кремния и {@hydrogen} водорода."
  EXPEDITION_RESOURCE_DISCOVERY_2: "Отличная новость: Ваши исследователи обнаружили необитаемую планету с ресурсами: {@debrismetal} металла, {@debrissilicon} кремния и {@debrishydrogen} водорода. Флот забрал: {@metal} металла, {@silicon} кремния и {@hydrogen} водорода."
  EXPEDITION_SENSOR_CLEAR_REPORT: "Шпионские зонды просканировали шлейф эха темной материи и обнаружили, что сектор {@exp_sector} никто не посещал в ближайшие дни - это очень хорошо! Исследователи советуют Вам слетать в этот сектор еще несколько раз для более тщательного его изучения. Поисковая мощность экспедиции составила {@exp_power}. Исследователи изучали выбранный сектор {@exp_hours} часов. Текущий результат экспедиции произошел с вероятностью {@exp_percent}%"
  EXPEDITION_SENSOR_POOR_REPORT: "Шпионские зонды просканировали шлейф эха темной материи и обнаружили следы {@visits} экспедиций в секторе {@exp_sector}. Исследователи, посовещавшись, решили предложить Вам не летать в этот сектор несколько дней. Попробуйте найти менее посещенные экспедициями сектора. Поисковая мощность составила {@exp_power}. Исследователи изучали выбранный сектор {@exp_hours} часов. Текущий результат экспедиции произошел с вероятностью {@exp_percent}%"
  EXPEDITION_SENSOR_REPORT: "Шпионские зонды просканировали шлейф эха темной материи и обнаружили следы {@visits} экспедиций в секторе {@exp_sector}. Поисковая мощность экспедиции составила {@exp_power}. Исследователи изучали выбранный сектор {@exp_hours} часов. Текущий результат экспедиции произошел с вероятностью {@exp_percent}%"
  EXPEDITION_SENSOR_SUBJECT: Данные с разведзонда
  EXPEDITION_SHIPS_DISCOVERY: "Ваши исследователи обнаружили дрейфующий в открытом космосе флот, который оказался в состоянии консервации. Командование распорядилось привести найденные корабли на базу: {@new_ships}"
  EXPEDITION_SUBJECT: Отчёт экспедиции
  EXPEDITION_XSKIRMISH: "Во время экспедиции Ваши корабли наткнулись на инопланетный флот, появившийся из ниоткуда. Неизвестная цивилизация оказалась враждебна, завязалась битва. Смотрите отчет о сражении в разделе 'Боевые отчёты'."
  FLEET_GRASPED: В сражение на планете {@coords_from} удалось захватить флот противника ({@fleet}). Командование уже отдало приказ восстановить поврежденные системы жизнеобеспечения и вооружения, захваченный флот прибудет совместно с Вашим флотом на планету {@planet} {@coords}.
  FLEET_GRASPED_SUBJECT: Захват флота противника
  FLEET_RETURNED: "Ваш флот (%s) вернулся с %s на %s %s. <br /> Флот привез груз: %s металла, %s кремния и %s водорода."
  FLEET_RETURNED_SUBJECT: Возвращение флота
  LOST_ARTEFACTS_MSG: "В сражении на планете {@coords_planet} атакующий захватил Ваши артефакты: {@artefacts}."
  LOST_ARTEFACTS_SUBJECT: Потеря артефактов
  MEMBER_RECEIPTED: "Ваша заявка рассмотрена и принята. Добро пожаловать в альянс %s"
  MEMBER_REFUSED: "К сожалению, Ваша заявка на участие в альянсе [%s] отклонена. Вы можете пробовать снова или играть в одиночестве."
  MOON_DESTROYED_MSG: Ваша Луна по координатам {@coords_planet} была уничтожена.
  MOON_DESTROYED_SUBJECT: Уничтожение Вашей Луны
  MSG_ACTIVATE_ARTEFACT: Включился артефакт {@name} на {@coords}
  MSG_ARTEFACT: Сообщение от системы артефактов.
  MSG_CAPTURE_ARTEFACT: Артефакт {@name} ({@coords}) был захвачен врагом.
  MSG_CREDIT: Сообщение от системы кредитов
  MSG_CREDIT_ARTEFAC_BUY_LOT: Вы купили артефакт ({@lot}) за {@credits} кредитов.
  MSG_CREDIT_BUY: Вы приобрели {@credits} кредитов.
  MSG_CREDIT_EXCHANGE_BUY: Вы купили лот на бирже за {@credits} кредитов.
  MSG_CREDIT_EXCHANGE_BUY_LOT: Вы купили лот ({@lot}) за {@credits} кредитов.
  MSG_CREDIT_EXCHANGE_DEFFEND: За защиту биржи Вам была начислена комиссия {@credits} кредитов.
  MSG_CREDIT_EXCHANGE_FROM_RESERVE: На Вашей бирже был выставлен лот, заработанная комиссия составила {@credits} кредитов.
  MSG_CREDIT_EXCHANGE_PROFIT: На Вашей бирже произошла покупка, заработанная комиссия составила {@credits} кредитов.
  MSG_CREDIT_EXCHANGE_RESERVE: Вы добавили лот на биржу за {@credits} кредитов.
  MSG_CREDIT_EXCHANGE_SELL: У Вас купили лот на бирже за {@credits} кредитов.
  MSG_CREDIT_EXCHANGE_SELL_LOT: У Вас купили лот ({@lot}) за {@credits} кредитов.
  MSG_CREDIT_FOR_MINER: За повышение шахтерского уровня Вам был начислен бонус {@credits} кредитов.
  MSG_CREDIT_FOR_VIP: Вы запустили задание вне очереди за {@credits} кредитов.
  MSG_CREDIT_MARKET: Вы купили на рынке ресурсы за {@credits} кредитов.
  MSG_DEACTIVATE_ARTEFACT: Выключился артефакт {@name} на {@coords}
  MSG_DELAY_ARTEFACT: Перезарядился артефакт {@name} на {@coords}
  MSG_DISAPEAR_ARTEFACT: Истек срок годности артефакта {@name} на {@coords}
  MSG_DISAPEAR_ARTEFACT_USED: Полностью израсходован артефакт {@name} на {@coords}
  MSG_EXPIRE_ARTEFACT: Выключился артефакт {@name} на {@coords}
  NEUTRAL_PLANET_DIE: Оказывается не зря инопланетный флот так бился за эту планету. В её коре стали проявляться невиданные по силе гравитационные аномалии и, прежде чем ученые успели исследовать их, планета {@planet} развалилась на субматерию.
  NEUTRAL_PLANET_FOUND: "После длительных блужданий по просторам вселенной, сенсоры экспедиции засекли странную активность в районе {@planet}.<br/>Подлетев поближе, ученые обнаружили, что это неизвестная ранее планета инопланетян с обломками от сражения. Видимо кто-то недавно разбил тут большой флот. На орбите планеты обнаружены обломки: {@metal} металла и {@silicon} кремния. Поспешите, чтобы забрать их, т.к. планета не стабильна и скоро разрушится, кроме этого о планете известно кому-то еще!"
  PLANET_COLONIZED: "Колонисты обнаружили планету на координатах %s с условиями, пригодными для жизни и начинают осваивать колонию."
  PLANET_OCCUPIED: "Ваш флот достиг координат %s, но эта планета уже занята. Колонисты возвращаются на базу."
  POSITION_REPORT: "Ваш флот (%s) достиг планеты %s %s. <br /> Флот оставил груз: %s металла, %s кремния и %s водорода."
  POSITION_REPORT_SUBJECT: Быстрое размещение
  RECYLCING_REPORT: "Ваши %s переработчиков добыли %s ресурсов. На координатах было %s металла и %s кремния. Вы добыли %s металла и %s кремния."
  RECYLCING_REPORT_SUBJECT: "Поле обломков: %s"
