  EXCHANGE: Межгалактическая биржа
  EXCHANGE_DESC: На межгалактической бирже игроки подают заявки на продажу товаров.
  EXCHANGE_FULL_DESC: Межгалактическая биржа необходима для осуществления торговых сделок в галактиках. Для нормального ее функционирования, необходимо создать и поддерживать в рабочем состоянии инфраструктуру из Межгалактических спутников и Биржевых подстанций.
  EXCH_OFFICE: Торговое представительство
  EXCH_OFFICE_DESC: Торговое представительство необходимо для возможности продавать на Межгалактической бирже.
  EXCH_OFFICE_FULL_DESC: Торговое представительство необходимо для возможности продавать на Межгалактической бирже. Каждый уровень представительства увеличивает максимальное количество Ваших лотов на 2.
  EXPO_TECH: Экспедиционная технология
  EXPO_TECH_DESC: Теперь корабли можно оснащать исследовательским модулем, обеспечивающим обработку собранных данных в условиях длительных полётов.
  EXPO_TECH_FULL_DESC: Экспедиционная технология охватывает различные технологии сканирования и даёт возможность оснащать корабли различных классов исследовательским модулем. Он содержит базу данных, маленькую передвижную лабораторию, а также различные биоклетки и сосуды для проб. Для безопасности корабля при исследовании опасных объектов исследовательский модуль оснащён автономным энергообеспечением и генератором энергетического поля, который в экстремальных ситуациях может окружать исследовательский модуль мощным энергетическим полем.
  FRIGATE: Линейный крейсер
  FRIGATE_DESC: Линейный крейсер специализируется на перехвате вражеских флотов.
  FRIGATE_FULL_DESC: Этот высокотехнологичный корабль несёт смерть атакующим флотам. Его усовершенствованные лазерные орудия удерживают тяжёлые корабли противника на расстоянии и могут уничтожать несколько единиц одним залпом. За счёт его малых размеров и невероятно мощного вооружения, грузоподъёмность линейного крейсера очень мала, но за счёт гиперпространственного двигателя также мало потребление топлива.
  GAUSS_GUN: Пушка Гаусса
  GAUSS_GUN_DESC: Пушка Гаусса ускоряет многотонные заряды с гигантскими затратами энергии.
  GAUSS_GUN_FULL_DESC: Долгое время артиллерийские орудия считались устаревшими на фоне развития современной лазерной и ионной техники и постоянно улучшающейся защиты, пока новые исследования в области энергетической технологии не позволили поднять артиллерию на качественно новый уровень. Вообще-то принципы электромагнитных ускорителей масс были известны на Земле уже с 20-го столетия. Один из них - пушка Гаусса. С решением технических трудностей использование ее в качестве оружия стало реальностью. Многотонные снаряды ускоряются магнитным полем при огромных затратах энергии и имеют такую выходную скорость, что частички пыли в воздухе вокруг снаряда сгорают, а звуковая волна сотрясает землю. Даже современная броня и щиты с трудом могут противостоять пробивной силе пушки Гаусса, и нередко случается так, что цель просто простреливается насквозь. Оборонительные сооружения деактивируются сами по себе, как только они сильно повреждаются.
  GRAVI: Гравитационная технология
  GRAVI_DESC: Гравитон - это частица, которая не обладает ни массой ни зарядом и определяет силу притяжения. Путём запуска концентрированного заряда гравитонов можно создавать искусственное гравитационное поле, которое, подобно чёрной дыре, втягивает в себя массу, благодаря чему можно уничтожать корабли или даже луны.
  GRAVI_FULL_DESC: Гравитон - это частица, которая не обладает ни массой ни зарядом и определяет силу притяжения. Путём запуска концентрированного заряда гравитонов можно создавать искусственное гравитационное поле, которое, подобно чёрной дыре, втягивает в себя массу, благодаря чему можно уничтожать корабли или даже луны. Чтобы произвести достаточное количество гравитонов, требуются огромные количества энергии.
  GUN_TECH: Оружейная технология
  GUN_TECH_DESC: "Оружейная технология делает системы вооружения эффективней. Каждый уровень увеличивает мощность вооружения войсковых частей на 10% от основной мощности."
  GUN_TECH_FULL_DESC: "Оружейная технология занимается прежде всего дальнейшим развитием имеющихся в наличии систем вооружения. При этом особое значение придаётся тому, чтобы снабжать имеющиеся в наличии системы большей энергией и более точно эту энергию направлять. Благодаря этому системы вооружения становятся эффективней, а оружие вызывает больше разрушений. Каждый уровень оружейной технологии увеличивает мощность вооружения войсковых частей на 10%. Оружейная технология важна для конкурентоспособного содержания частей. Поэтому следовало бы её постоянно развивать в течение всей игры."
  HISTORY: История
  HOME_PLANET_REQUIRED: Ваши колонисты уже ищут во вселенной подходящую планету для колонизации. Вы пока можете осмотреться, загляните в чат. При желании ник можно сменить в меню (оно слева) в Настройках (в самом низу).
  HYDROGEN_LAB: Синтезатор водорода
  HYDROGEN_LAB_FULL_DESC: Совершенствование синтезатора способствует увеличению его эффективности по обработке воды океана планеты и, как следствие, большей выработке водорода. Водород необходим в качестве топлива для кораблей, почти для всех исследований, просмотра галактик, а также для использования сенсорной фаланги.
  HYDROGEN_PLANT: Термоядерная электростанция
  HYDROGEN_PLANT_FULL_DESC: На термоядерных электростанциях при помощи термоядерного синтеза под огромным давлением и при высокой температуре 2 атома тяжёлого водорода объединяются в один атом гелия. При этом, при образовании ядра гелия, вырабатывается энергия в 41,32*10^-13 Дж в виде излучения (т.о. при сгорании 1 г водорода вырабатывается 172 МВт*ч энергии). Чем больше термоядерный реактор, тем сложнее процессы синтезирования, реактор производит больше энергии. Добыча энергии также может быть повышена за счёт развития энергетической технологии.
  HYDROGEN_STORAGE: Емкость для водорода
  HYDROGEN_STORAGE_FULL_DESC: Огромные ёмкости для хранения добытого водорода. Они обычно находятся вблизи космических портов. Чем они больше, тем больше водорода в них может сберегаться. Если они заполнены, то добыча водорода прекращается.
  HYPERSPACE_ENGINE: Гиперпространственный двигатель
  HYPERSPACE_ENGINE_DESC: Выгибает пространство вокруг корабля. Дальнейшее развитие этих двигателей делает некоторые корабли быстрее.
  HYPERSPACE_ENGINE_FULL_DESC: "Благодаря пространственно-временному изгибу в непосредственном окружении корабля пространство сжимается, чем быстрее преодолеваются далёкие расстояния. Чем выше развит гиперпространственный привод, тем выше сжатие пространства, благодаря чему с каждым уровнем скорость кораблей повышается на 30%."
  HYPERSPACE_TECH: Гиперпространственная технология
  HYPERSPACE_TECH_DESC: Путём сплетения 4-го и 5-го измерения стало возможным исследовать новый более экономный и эффективный двигатель. Кроме этого ученные обнаружили, что искривленное пространство увеличивает радиус действия сенсорной фаланги.
  HYPERSPACE_TECH_FULL_DESC: "Путём сплетения 4-го и 5-го измерения стало возможным исследовать новый более экономный и эффективный двигатель. Кроме этого ученные обнаружили, что искривленное пространство увеличивает радиус действия сенсорной фаланги на 10% за каждый уровень технологии."
  IGN: Межгалактическая исследовательская сеть
  IGN_DESC: Эта сеть делает возможным общение учёных, работающих в исследовательских лабораториях разных планет. Каждый новый уровень позволяет присоединить к сети дополнительную лабораторию.
  IGN_FULL_DESC: Эта сеть делает возможным общение учёных, работающих в исследовательских лабораториях разных планет. Каждый новый уровень позволяет присоединить к сети дополнительную лабораторию (в первую очередь присоединяются лаборатории старших уровней). Из всех объединённых в сеть лабораторий, в каждом исследовании принимают участие только те, которые имеют достаточный для проведения данного исследования уровень. Скорость исследования соответствует сумме уровней участвующих в нём лабораторий.
  IMPULSE_ENGINE: Импульсный двигатель
  IMPULSE_ENGINE_DESC: Импульсный двигатель основывается на принципе отдачи. Дальнейшее развитие этих двигателей делает некоторые корабли быстрее,
  IMPULSE_ENGINE_FULL_DESC: "Импульсный двигатель основывается на принципе отдачи, причём разогрев материи осуществляется в ходе ядерной реакции. Также можно впрыснуть дополнительную массу. Дальнейшее развитие этих двигателей делает следующие корабли с каждым уровнем на 20% быстрее: бомбардировщики, крейсеры, тяжёлые истребители и колонизаторы. Каждый уровень развития увеличивает радиус действия межпланетных ракет."
  INTERCEPTOR_ROCKET: Ракета-перехватчик
  INTERCEPTOR_ROCKET_DESC: Ракеты-перехватчики уничтожают атакующие межпланетные ракеты.
  INTERCEPTOR_ROCKET_FULL_DESC: Ракеты-перехватчики уничтожают атакующие межпланетные ракеты. Одна ракета-перехватчик уничтожает одну межпланетную ракету.
  INTERPLANETARY_ROCKET: Межпланетная ракета
  INTERPLANETARY_ROCKET_DESC: Межпланетные ракеты уничтожают вражескую оборону.
  INTERPLANETARY_ROCKET_FULL_DESC: Межпланетные ракеты уничтожают защиту противника. Уничтоженные межпланетными ракетами оборонительные сооружения больше не восстанавливаются.
  IN_FLIGHT: в полете
  ION_GUN: Ионное орудие
  ION_GUN_DESC: Ионное орудие направляет на цель волну ионов, которая дестабилизирует щиты и повреждает электронику.
  ION_GUN_FULL_DESC: В 21-м столетии на Земле уже существовало то, что общеизвестно как ЭМИ. ЭМИ означает электромагнитный импульс, который обладает способностью индуцировать дополнительные напряжения в схемы и тем самым причинять массовые помехи, которые могут уничтожить все чувствительные приборы. Тогда ЭМИ-орудия были в основном на базе ракет и бомб, также в комбинации с ядерными орудиями. Между тем ЭМИ-орудия постоянно развивались, так как в них видели большой потенциал не уничтожать цели, а делать их неспособными к бою и манёвренности и, тем самым, упрощать их захват. Пока что наивысшая форма ЭМИ-орудий представлена ионным орудием. Оно направляет на цель волну ионов (электрически заряженных частиц), которая дестабилизирует щиты и повреждает электронику, только если она не очень хорошо защищена, что иногда подобно полному уничтожению. Кинетической пробивной силой можно пренебречь. Ионная техника используется только на крейсерах, так как потребление энергии ионными орудиями огромно, и в бою часто приходится уничтожать, а не парализовать цель. Оборонительные сооружения деактивируются сами по себе, как только они сильно повреждаются.
  ION_TECH: Ионная технология
  ION_TECH_DESC: Поистине смертоносный наводимый луч из ускоренных ионов. При попадании на какой-либо объект они наносят огромный ущерб.
  ION_TECH_FULL_DESC: Поистине смертоносный наводимый луч из ускоренных ионов. При попадании на какой-либо объект они наносят огромный ущерб.
  LANCER_SHIP: Лансер
  LANCER_SHIP_DESC: Быстрый и эффективный военный корабль, построенный на самых современных технологиях. Оснащен мощнейшим вооружением, но для перезарядки оружие требует некоторого времени, что исключает скорострельность.
  LANCER_SHIP_FULL_DESC: Быстрый и эффективный военный корабль, построенный на самых современных технологиях. Оснащен мощнейшим вооружением, которое способно наносить катастрофические разрушения противнику. Для перезарядки энергетической пушки корабля требуется время, поэтому корабль не обладает скорострельностью. Корабль спроектирован учеными, как вспомогательное оружие при нанесении масштабного удара врагу, поэтому наиболее эффективен в сочетании с остальным флотом.
  LARGE_SHIELD: Большой щитовой купол
  LARGE_SHIELD_DESC: Дальнейшее развитие малого щитового купола. Он может сдерживать ещё более сильные атаки на планету, поглощая значительно большее количество энергии.
  LARGE_SHIELD_FULL_DESC: Дальнейшее развитие малого щитового купола. Он может сдерживать ещё более сильные атаки на планету, поглощая значительно большее количество энергии. Возможное количество щитовых куполов зависит от уровня щитовой технологии. С каждым повышением уровня щитовой технологии можно строить на 1 большой щитовой купол больше.
  LARGE_TRANSPORTER: Большой транспорт
  LARGE_TRANSPORTER_DESC: Дальнейшее развитие малых транспортов позволило создать корабли, обладающие большей вместительностью и, благодаря более развитому двигателю, способными передвигаться быстрее, чем малый транспорт.
  LARGE_TRANSPORTER_FULL_DESC: На борту этого корабля есть лишь слабое вооружение и нет серьёзных технологий... По этой причине их никогда не следует запускать без сопровождения. Благодаря своему высокоразвитому реактивному двигателю большой транспорт служит в качестве быстрого межпланетного доставщика ресурсов, также он сопровождает флоты при нападениях на вражеские планеты, чтобы захватить как можно больше ресурсов.
  LASER_TECH: Лазерная технология
  LASER_TECH_DESC: Благодаря фокусированию света возникает луч, который при попадании на объект наносит ему повреждения.
  LASER_TECH_FULL_DESC: Лазеры (усиление света при помощи индуцированного выброса излучения) производят насыщенный энергетический луч когерентного света. Эти приборы находят применение во всевозможных областях, от оптических компьютеров до тяжёлых лазеров, которые свободно режут броню космических кораблей. Лазерная технология является важным элементом для исследования дальнейших оружейных технологий.
  LEAVE: ПОКИНУТЬ
  LIGHT_FIGHTER: Легкий истребитель
  LIGHT_FIGHTER_DESC: Лёгкий истребитель - это манёвренный корабль, который можно найти почти на каждой планете. Затраты на него не особо велики, главное предназначение - поддержка в сражении для крупных кораблей.
  LIGHT_FIGHTER_FULL_DESC: Лёгкий истребитель - это манёвренный корабль, который можно найти почти на каждой планете. Он имеет слабую защиту и простые системы вооружения и служит в качестве атакующего корабля поддержки. Его скорость в сочетании с большим количеством, могут обеспечить превосходную буферную зону и защиту для более крупных кораблей.
  LIGHT_LASER: Легкий лазер
  LIGHT_LASER_DESC: При помощи концентрированного обстрела цели фотонами можно достичь значительно бoльших разрушений, чем при применении обычного баллистического вооружения.
  LIGHT_LASER_FULL_DESC: Для компенсации чрезмерных успехов в области технологии космических кораблей, учёные должны были создать оборонительное сооружение, справляющееся с более крупными и лучше вооружёнными флотами. Это привело к появлению лёгкого лазера. При помощи концентрированного обстрела цели фотонами можно достичь значительно больших разрушений, чем при применении обычного баллистического вооружения. Для противостояния более сильной огневой мощи новых типов кораблей он также оснащён усовершенствованными щитами. Однако, чтобы стоимость производства оставалась низкой, структура дальше не усиливалась. Лёгкий лазер обладает наилучшим соотношением цены и качества, поэтому он также интересен и для более развитых цивилизаций. Оборонительные сооружения деактивируются сами по себе, как только они сильно повреждаются.
  LOCATED: Находится
  MASKING_TECH: Маскировочная технология
  MASKING_TECH_DESC: Технология радио-локационной маскировки создает помехи в работе баллистического анализатора и систем наведения огня противника.
  MASKING_TECH_FULL_DESC: Технология радио-локационной маскировки создает помехи в работе баллистического анализатора и систем наведения огня противника. Эта технология увеличивает живучесть своих юнитов за счет уменьшения точности стрельбы огневых орудий противника.
  MEMORY_MODULE__110_1: Модуль памяти
  MEMORY_MODULE__110_1_DESC: Дает возможность изучить инопланетную технологию.
  MEMORY_MODULE__110_1_FULL_DESC: Иногда в экспедициях удается найти инопланетные модули памяти и расшифровать хранящиеся в них данные. Этот модуль содержит информацию об инопланетной технологии 1 уровня.
  MEMORY_MODULE__15_15: Модуль памяти
  MEMORY_MODULE__15_15_DESC: "Повышает уровень оружейной технологии до 15.<br /><i>Требования: Оружейная технология (Уровень 14)</i>"
  MEMORY_MODULE__15_15_FULL_DESC: Иногда в экспедициях удается найти инопланетные модули памяти и расшифровать хранящиеся в них данные. Этот модуль содержит информацию об оружейной технологии 15 уровня.
  MEMORY_MODULE__16_15: Модуль памяти
  MEMORY_MODULE__16_15_DESC: "Повышает уровень щитовой технологии до 15.<br /><i>Требования: Щитовая технология (Уровень 14)</i>"
  MEMORY_MODULE__16_15_FULL_DESC: Иногда в экспедициях удается найти инопланетные модули памяти и расшифровать хранящиеся в них данные. Этот модуль содержит информацию о щитовой технологии 15 уровня.
  MEMORY_MODULE__17_15: Модуль памяти
  MEMORY_MODULE__17_15_DESC: "Повышает уровень броневой технологии до 15.<br /><i>Требования: Броневая технология (Уровень 14)</i>"
  MEMORY_MODULE__17_15_FULL_DESC: Иногда в экспедициях удается найти инопланетные модули памяти и расшифровать хранящиеся в них данные. Этот модуль содержит информацию о броневой технологии 15 уровня.
  MEMORY_MODULE__23_12: Модуль памяти
  MEMORY_MODULE__23_12_DESC: "Повышает уровень лазерной технологии до 12.<br /><i>Требования: Лазерная технология (Уровень 11)</i>"
  MEMORY_MODULE__23_12_FULL_DESC: Иногда в экспедициях удается найти инопланетные модули памяти и расшифровать хранящиеся в них данные. Этот модуль содержит информацию о лазерной технологии 12 уровня.
  MEMORY_MODULE__28_1: Модуль памяти
  MEMORY_MODULE__28_1_DESC: Дает возможность изучить гравитационную технологию.
  MEMORY_MODULE__28_1_FULL_DESC: Иногда в экспедициях удается найти инопланетные модули памяти и расшифровать хранящиеся в них данные. Этот модуль содержит информацию о гравитационной технологии 1 уровня.
  MERCHANTS_MARK: Знак торговца
  MERCHANTS_MARK_DESC: "Уменьшает комиссию при обмене ресурсов до 3%."
  MERCHANTS_MARK_FULL_DESC: "Дает возможность совершать обмен ресурсов со сниженной до 3% комиссией."
  METALMINE: Рудник по добыче металла
  METALMINE_FULL_DESC: Основной поставщик сырья для строительства несущих структур построек и кораблей. Металл - самое дешёвое сырьё, но зато его требуется больше, чем всего остального. Для производства металла требуется меньше всего энергии. Чем рудники больше, тем они глубже. На большинстве планет металл находится на больших глубинах, при помощи этих более глубоких рудников можно добывать больше металлов, производство растёт. В то же время более крупные рудники требуют больше энергии.
  METAL_STORAGE: Хранилище металла
  METAL_STORAGE_FULL_DESC: Огромное хранилище для добытых руд. Чем оно больше, тем больше металла можно в нём хранить. Если оно заполнено, то добыча металла прекращается.
  MOON_BASE: Лунная база
  MOON_BASE_DESC: Луна не располагает атмосферой, поэтому перед заселением требуется соорудить лунную базу.
  MOON_BASE_FULL_DESC: Луна не располагает атмосферой, поэтому перед заселением требуется соорудить лунную базу. Она обеспечивает необходимые воздух, гравитацию и тепло. Чем выше уровень развития лунной базы, тем больше обеспеченная биосферой площадь. Каждый уровень лунной базы может застроить 3 поля, максимум до площади всей луны. Она составляет 2 (диаметр луны/1000)^2, причём каждый уровень лунной базы сам занимает одно поле.
  MOON_CREATOR: Лунный творец
  MOON_CREATOR_DESC: Позволяет создать луну на орбите планеты.
  MOON_CREATOR_FULL_DESC: Позволяет создать луну на орбите планеты.
  MOON_HYDROGEN_LAB: Лунный синтезатор водорода
  MOON_HYDROGEN_LAB_FULL_DESC: Лунный синтезатор добывает водород изо льда с кратеров, расположенных на полюсах луны. Это самые темные и неизведанные места на луне, туда никогда не попадает свет со звезды. Ученные активно работают над изучением скрытых возможностей по добыче водорода на луне. Энергию для синтезатора могут дать захваченные в бою солнечные спутники.
  MOON_ROBOTIC_FACTORY: Лунная фабрика роботов
  MOON_ROBOTIC_FACTORY_FULL_DESC: Предоставляет простую рабочую силу, которую можно применять при строительстве планетарной инфраструктуры. Каждый уровень развития фабрики повышает скорость строительства зданий.
  NANO_FACTORY: Фабрика нанитов
  NANO_FACTORY_FULL_DESC: Фабрика нанитов представляет собой венец робототехники. Наниты - это роботы размером в нанометр, которые путём объединения в сеть в состоянии выполнять экстраординарные задания. Сразу же после исследования они увеличивают производительность почти во всех областях. С каждым уровнем фабрика нанитов сокращает время строительства зданий, кораблей и оборонительных сооружений вдвое.
  NO_ARTEFACTS: Нет артефактов
  NO_EXCHANGE_SLOTS: Недостаточно уровней Межгалактической биржи
  ON_PLANET: на планете
  OPTIONS: Установки
  PACK_BUILDING_NOW: Запаковать текущий уровень в артефакт
  PACK_RESEARCH_NOW: Запаковать исследование
  PLANET_CREATOR: Планетарный творец
  PLANET_CREATOR_DESC: Позволяет создать дополнительную планету. Необходимо отправить в составе флота с колонизатором на свободные координаты.
  PLANET_CREATOR_FULL_DESC: Позволяет создать дополнительную планету. Необходимо отправить в составе флота с колонизатором на свободные координаты.
  PLASMA_GUN: Плазменное орудие
  PLASMA_GUN_DESC: Лазерная технология была доведена до совершенства, ионная техника достигла конечной стадии.
  PLASMA_GUN_FULL_DESC: Лазерная технология была доведена до совершенства, ионная техника достигла конечной стадии и считалось, что практически невозможно, даже с качественной точки зрения орудийной системы, достичь ещё большей эффективности. Но всё должно было измениться, когда появилась идея объединить обе системы. Используя технологии термоядерного синтеза, лазерами нагревают вещество (обычно водород) до сверхвысоких температур, достигающих миллионов градусов. Ионная техника обеспечивает обогащение плазмы электрическим зарядом, её стабилизацию и ускорение. Как только заряд достаточно нагрет, ионизирован и находится под давлением, то его выпускают при помощи ускорителей в направлении цели. Светящийся голубоватым цветом плазменный шар выглядит внушительно, только спрашивается, долго ли им будет наслаждаться команда корабля-цели, если через несколько секунд броня разорвётся на куски, а электроника сгорит... Плазменное орудие считается вообще самым страшным оружием, и у этой техники есть своя цена. Оборонительные сооружения деактивируются сами по себе, как только они сильно повреждаются.
  PLASMA_TECH: Плазменная технология
  PLASMA_TECH_DESC: Дальнейшее развитие ионной технологии, которая ускоряет не ионы, а высокоэнергетическую плазму. Она оказывает опустошительное действие при попадании на какой-либо объект.
  PLASMA_TECH_FULL_DESC: Дальнейшее развитие ионной технологии, которая ускоряет не ионы, а высокоэнергетическую плазму. Она оказывает опустошительное действие при попадании на какой-либо объект.
  POWER_GENERATOR: Энерготранс
  POWER_GENERATOR_DESC: "Увеличивает выработку энергии на 10%."
  POWER_GENERATOR_FULL_DESC: "Дает прирост производительности всех электростанций и спутников на 10%."
  PRODUCTION_TIME: "Нужно времени:"
  QUEUE_DISASSEMBLE_PREFIX: Утилизация
  QUEUE_REPAIR_PREFIX: Ремонт
  RECYCLER: Переработчик
  RECYCLER_DESC: С помощью переработчика добывается сырьё из обломков.
  RECYCLER_FULL_DESC: Космические бои принимали всё большие масштабы. Уничтожались тысячи кораблей и возникавшие при этом обломки казались навсегда потерянными. Нормальные транспорты не могли близко к ним приблизиться, не будучи сильно повреждёнными маленькими обломками. С новым открытием в области щитовой технологии стало возможно эффективно устранять эту проблему, возник новый класс корабля, подобный большому транспорту - переработчик. С его помощью можно было заново использовать казавшиеся потерянными ресурсы. Из-за новых щитов маленькие обломки больше не представляли собой опасности. К сожалению, эти устройства требуют пространства, поэтому его грузовой тоннаж ограничен до 20 000.
  REG_AGREE: Прочел и согласен.
  REG_AGREEMENT: Ознакомтесь с пользовательским соглашением.
  REG_NO_AGREEMENT: Вы не согласились с пользовательским соглашением.
  REPAIR_BOT: Ремонтный робот
  REPAIR_BOT_DESC: Ремонтирует все корабли на планете.
  REPAIR_BOT_FULL_DESC: Ремонтный робот способен анализировать структуру любых кораблей и восстанавливать их броню. За один запуск он способен отремонтировать весь флот на планете. Однако робот имеет ограниченный запас энергии, поэтому после трех запусков он становится бесполезным.
  REPAIR_FACTORY: Ремонтный ангар
  REPAIR_FACTORY_DESC: Ремонтный ангар необходим для ремонта поврежденных и утилизации ненужных юнитов.
  REPAIR_FACTORY_FULL_DESC: "Ремонтный ангар необходим для выполнения двух операций: 1 - ремонт поврежденных кораблей и оборонительных сооружений, 2 - утилизация ненужных кораблей и обороны для получения ресурсов."
  REPAIR_REQUIRED: Необходимо построить ангар.
  REQUIRES: Требуется
  REQUIRE_TIME: Время
  REQUIRE_TIME_EXT: Время строительства
  RESEARCH_LAB: Исследовательская лаборатория
  RESEARCH_LAB_FULL_DESC: Для исследования новых технологий необходима работа исследовательской станции. Уровень развития исследовательской станции является решающим фактором того, как быстро могут быть освоены новые технологии. Чем выше уровень развития исследовательской лаборатории, тем больше может быть исследовано новых технологий. Для того, чтобы как можно быстрее завершить исследовательские работы на одной планете, на неё посылаются все имеющиеся в наличии учёные и, таким образом, покидают свои планеты. Как только технология исследована, учёные возвращаются на свои родные планеты и переносят с собой знания о ней. Так новые технологии можно применять и на других планетах.
  RESEARCH_LAB_REQUIRED: Необходимо построить исследовательскую лабораторию.
  ROBOTIC_FACTORY: Фабрика роботов
  ROBOTIC_FACTORY_FULL_DESC: Предоставляет простую рабочую силу, которую можно применять при строительстве планетарной инфраструктуры. Каждый уровень развития фабрики повышает скорость строительства зданий.
  ROBOT_CONTROL_SYSTEM: Система управления роботами
  ROBOT_CONTROL_SYSTEM_DESC: 'Система управления роботами (СУР) повышает в 2 раза скорость строительства зданий, флота и обороны. Срабатывает для заданий запущенных после активации СУР. После деактивации, ускоренные задания не замедляются! '
  ROBOT_CONTROL_SYSTEM_FULL_DESC: Система управления роботами (СУР) позволяет эффективнее распределять задачи для роботов при строительстве на планете зданий, флота и обороны. Скорость строительства увеличивается в 2 раза. Срабатывает для заданий запущенных после активации СУР. После деактивации, ускоренные задания не замедляются! Два СУР увеличат скорость строительства в 4-е раза!
  ROCKET_LAUNCHER: Ракетная установка
  ROCKET_LAUNCHER_DESC: Ракетная установка - простое и дешёвое средство обороны.
  ROCKET_LAUNCHER_FULL_DESC: Ракетная установка - простое и дешёвое средство обороны. Так как это развитие обычных баллистических орудий, то ему не требуется дальнейшей модернизации. Малые затраты на его производство оправдывают его применение против более маленьких флотов, но со временем он теряет значение. Позднее его используют лишь для отвода вражеских выстрелов. Оборонительные сооружения деактивируются сами по себе, как только они сильно повреждаются.
  ROCKET_STATION: Ракетная шахта
  ROCKET_STATION_DESC: Служит для хранения ракет.
  ROCKET_STATION_FULL_DESC: Ракетные шахты служат для хранения ракет. С каждым уровнем можно хранить на пять межпланетных или десять ракет-перехватчиков больше. Одна межпланетная ракета требует места в два раза больше, чем ракета-перехватчик. Возможно любое комбинирование различных типов ракет.
  SAMPLE_ARTEFACT: Артефакт
  SAMPLE_ARTEFACT_DESC: Это какой-то артефакт
  SAMPLE_ARTEFACT_FULL_DESC: Это какой-то артефакт
  SHADOW_SHIP: Тень
  SHADOW_SHIP_DESC: Быстрый и неуловимый корабль для эффективного обстрела противника с большого расстояния.
  SHADOW_SHIP_FULL_DESC: Быстрый и неуловимый корабль для эффективного обстрела противника.  Корабль Тень - это секретная военная разработка лучших ученых империи. Он появился при переработке и модернизации Легкого истребителя. Специально разработанное для Тени многозарядное орудие идеально приспособлено для стрельбы по большим кораблям противника. Тень обладает совершено новой системой вооружения, способной вести прицельный огонь с огромных расстояний, новым генератором щитового поля, высокой маневренностью и генератором помех для улучшения маскировки.
  SHELL_TECH: Броневая технология
  SHELL_TECH_DESC: "Специальные сплавы улучшают броню космических кораблей. Так, устойчивость брони может увеличиваться с каждым уровнем на 10%."
  SHELL_TECH_FULL_DESC: "Специальные сплавы улучшают броню космических кораблей. Как только найден очень стойкий сплав, специальные лучи изменяют молекулярную структуру космического корабля, и доводит её до состояния изученного сплава. Так, устойчивость брони может увеличиваться с каждым уровнем на 10%."
  SHIELD_TECH: Щитовая технология
  SHIELD_TECH_DESC: "Эта технология делает щиты кораблей и оборонительных сооружений эффективней. Каждый уровень повышает эффективность щитов на 10% от основной мощности. С каждым уровнем можно строить больше защитных куполов."
  SHIELD_TECH_FULL_DESC: "Развитие этой технологии позволяет увеличивать снабжение энергией щитов и защитных экранов, что в свою очередь повышает их устойчивость и способность поглощать или отражать энергию атак противника. Благодаря этому с каждым изученным уровнем эффективность корабельных щитов и стационарных генераторов энергополей повышается на 10% от номинальной мощности. Кроме этого, с каждым уровнем можно строить в обороне больше защитных куполов. Каждый уровень позволяет построить один большой щитовой купол или два малых. Возможно любое комбинирование щитовых куполов."
  SHIPYARD: Верфь
  SHIPYARD_FULL_DESC: В строительной верфи производятся все виды кораблей. Чем она больше, тем быстрее можно строить более сложные и более крупные корабли. Посредством строительства фабрики нанитов производятся миниатюрные роботы, которые помогают работникам работать быстрее.
  SHIPYARD_REQUIRED: Необходимо построить верфь.
  SILICON_LAB: Рудник по добыче кремния
  SILICON_LAB_FULL_DESC: Основной поставщик сырья для электронных строительных элементов и сплавов. Для добычи кремния требуется примерно вдвое больше энергии, чем для добычи металла, поэтому он, соответственно, ценится больше. Кремний требуется для всех кораблей и зданий. К сожалению, так необходимые для строительства и исследований, месторождения кремния обычно очень редки и, как и большинство металлов, залегают на больших глубинах. Поэтому при усовершенствовании рудника также повышается производство, так как осваиваются более крупные и чистые залежи кремния.
  SILICON_STORAGE: Хранилище кремния
  SILICON_STORAGE_FULL_DESC: В этом огромном хранилище складируется ещё не обработанный кремний. Чем больше хранилище, тем больше кремния туда помещается. Если оно заполнено, то добыча данного ресурса прекращается.
  SIMULATE: Симулировать
  SIM_TECH_LIST: Технологии
  SMALL_SHIELD: Малый щитовой купол
  SMALL_SHIELD_DESC: Малый щитовой защищает планету и поглощает удары атаки.
  SMALL_SHIELD_FULL_DESC: Задолго до того, как щитовые генераторы стали достаточно малы для того, чтобы найти применение на кораблях, уже существовали огромные генераторы на поверхности планет. Они обволакивали целую планету силовым полем, которое могло поглощать удары атаки. Малые атакующие флоты постоянно разбиваются об эти щитовые купола. Благодаря растущему технологическому развитию эти щиты можно ещё усилить. Возможное количество щитовых куполов зависит от уровня щитовой технологии. С каждым повышением уровня щитовой технологии можно строить на 2 малых щитовых купола больше.
  SMALL_TRANSPORTER: Малый транспорт
  SMALL_TRANSPORTER_DESC: Малый транспорт - это манёвренный корабль, который может быстро транспортировать сырьё на другие планеты.
  SMALL_TRANSPORTER_FULL_DESC: Транспорты имеют примерно такой же размер, что и истребители, но они не обладают мощными двигателями и бортовым вооружением ради экономии места. Малый транспорт вмещает 5000 единиц сырья. По причине малой огневой мощи малые транспорты часто сопровождаются другими кораблями.Когда импульсный двигатель исследован до 5-й ступени, у малого транспорта повышается базовая скорость и он оснащается этим типом двигателя.
  SOLAR_PLANT: Солнечная электростанция
  SOLAR_PLANT_FULL_DESC: Для обеспечения энергией рудников и синтезаторов необходимы огромные солнечные электростанции. Чем больше построено станций, тем больше поверхности покрыто кварцевыми пластинами, которые перерабатывают световую энергию в электроэнергию. Солнечные электростанции представляют собой основу энергообеспечения планеты.
  SOLAR_SATELLITE: Солнечный спутник
  SOLAR_SATELLITE_DESC: Солнечные спутники - это простые платформы из солнечных батарей, которые находятся на высокой орбите. Они собирают солнечный свет и передают его с помощью лазера на наземную станцию.
  SOLAR_SATELLITE_FULL_DESC: "Солнечные спутники запускаются на орбиту планеты. Они собирают солнечную энергию и передают её на наземную станцию. Эффективность солнечных спутников зависит от мощи солнечного излучения. В принципе, добыча энергии на орбитах, более приближённых к солнцу, выше, чем на планетах, удалённых от солнца. Из-за своего соотношения цены и качества солнечные спутники решают энергетические проблемы многих миров. Но внимание: солнечные спутники могут быть уничтожены в бою."
  SPYWARE: Шпионаж
  SPYWARE_DESC: С помощью этой технологии добываются данные о других планетах.
  SPYWARE_FULL_DESC: Шпионаж предназначен для исследования новых и более эффективных сенсоров. Чем выше развита эта технология, тем больше информации имеет игрок о событиях в своём окружении. Разница в уровнях шпионажа с противником играет решающую роль - чем больше исследована собственная шпионская технология, тем больше информации содержится в разведданных и тем меньше шанс быть обнаруженным. Чем больше послано зондов, тем больше собирается подробностей о противнике, но при этом растёт опасность быть обнаруженным. Также шпионаж совершенствует определение местонахождения чужих флотов. При этом также важен уровень развития собственного шпионажа. Начиная со второго уровня его развития при атаке на Вас кроме сообщения о нападении показывается также и общая численность нападающих кораблей. С четвёртого уровня распознаётся вид нападающих кораблей, равно как и их общая численность, а с восьмого - точная численность каждого типа кораблей. Для налётчиков эта технология очень важна, так как она предоставляет информацию о том, выставила ли жертва флот и/или защиту или нет, поэтому следует исследовать её как можно раньше. Лучше всего - сразу же после исследования малых транспортов.
  STAR_DESTROYER: Уничтожитель
  STAR_DESTROYER_DESC: Уничтожитель - король среди военных кораблей.
  STAR_DESTROYER_FULL_DESC: "Уничтожитель - король среди военных кораблей. Его мультифланговые ионные, плазменные и гауссовые орудийные башни могут благодаря своим усовершенствованным пеленгационным сенсорам поражать с точностью до 99% даже скоростные манёвренные истребители. Так как уничтожители очень велики, их манёвренность очень ограничена, и в бою они подобны скорее боевой станции, чем боевому кораблю. Потребление водорода у них так же высоко, как и их боевая мощь."
  STAR_GATE: Межгалактические врата
  STAR_GATE_DESC: Ворота - это огромные телепортеры, которые могут пересылать между собой флоты любых размеров без временных затрат.
  STAR_GATE_FULL_DESC: Ворота - это огромные телепортеры, которые могут пересылать между собой флоты любых размеров без временных затрат. Эти телепортеры не требуют водорода, однако между двумя прыжками должен пройти один час, иначе ворота перегреются. Невозможна также пересылка ресурсов. Весь процесс требует крайне высоко развитой технологии.
  STAR_SURVEILLANCE: Сенсорная фаланга
  STAR_SURVEILLANCE_DESC: Высокочастотные сенсоры полностью просматривают спектр частот всех попадающих на фалангу излучений.
  STAR_SURVEILLANCE_FULL_DESC: Высокочастотные сенсоры полностью просматривают спектр частот всех попадающих на фалангу излучений. Мощные компьютеры комбинируют мельчайшие колебания энергии и таким образом получают информацию о передвижениях кораблей на отдалённых планетах. Для просмотра на луне должна быть предоставлена энергия в форме водорода (5 000 за просмотр). Просмотр осуществляется переходом с луны в меню Галактика и нажатием на соответствующую иконку в меню Действие планеты, находящейся в радиусе действия сенсоров.
  STATIC_ARTEFACT: Неприкрепляемый артефакт
  STATIC_ARTEFACT_DESC: Это артефакт без возможности прикрепления к флоту
  STATIC_ARTEFACT_FULL_DESC: Это артефакт без возможности прикрепления к флоту
  STORAGE_CAPICITY: Вместимость
  STRONG_FIGHTER: Тяжелый истребитель
  STRONG_FIGHTER_DESC: Дальнейшее развитие лёгкого истребителя, он лучше защищён и обладает большей силой атаки.
  STRONG_FIGHTER_FULL_DESC: При дальнейшем развитии лёгкого истребителя учёные дошли до момента, когда стало ясно, что обыкновенный двигатель не обладает необходимой мощью. Для того, чтобы оптимально передвигать корабль, был впервые использован импульсный двигатель. Хоть он и повысил стоимость, однако он также открыл новые возможности. Благодаря применению этого двигателя осталось больше энергии для вооружения и щитов, кроме того, для этого вида истребителей также использовались ценные материалы. Это привело к улучшенной структурной целостности и более сильной огневой мощи, благодаря чему в бою он представляет большую угрозу, чем его предшественник. После этих изменений тяжёлый истребитель представляет собой новую эру технологии кораблестроения, основу технологии крейсеростроения.
  STRONG_LASER: Тяжелый лазер
  STRONG_LASER_DESC: Тяжёлый лазер представляет собой дальнейшее развитие лёгкого лазера.
  STRONG_LASER_FULL_DESC: Тяжёлый лазер представляет собой дальнейшее развитие лёгкого лазера. Структура была усилена и усовершенствована новыми материалами. Оболочку смогли сделать значительно более стойкой. Одновременно была улучшена и энергетическая система и целевой компьютер, так что тяжёлый лазер может концентрировать значительно больше энергии на цели. Оборонительные сооружения деактивируются сами по себе, как только они сильно повреждаются.
  SUPERCOMPUTER: Суперкомпьютер
  SUPERCOMPUTER_DESC: Повышает уровень компьютерной технологии на 1 и увеличивает скорость исследований в два раза. Срабатывает для исследований запущенных после активации Суперкомпьютера.
  SUPERCOMPUTER_FULL_DESC: В одной из экспедиций удалось захватить уникальное инопланетное устройство, которое при подробном изучении оказалось суперкомпьютером инопланетян. Суперкомпьютер удалось привести в действие и включить в исследовательскую сеть. Он обладает огромной вычислительной мощностью и способен контролировать действия дополнительного флота. Одновременно с этим Суперкомпьютер занимается решением наиболее сложных исследовательских задач, уменьшая время исследований в 2 раза. Срабатывает для исследований запущенных после активации Суперкомпьютера. После деактивации, ускоренные исследования не замедляются! Два Суперкомпьютера увеличат скорость исследований в 4-е раза!
  TERRA_FORMER: Терраформер
  TERRA_FORMER_DESC: Терраформер может преобразовывать огромные территории делая их пригодными для застройки.
  TERRA_FORMER_FULL_DESC: По мере застройки планет всё более важным становился вопрос об ограниченности пригодных для использования площадей. Такие традиционные методы, как строительство ввысь и вглубь, оказались недостаточными. Маленькая группа физиков и нанотехников нашла решение - терраформер. Затрачивая огромное количество энергии терраформер может преобразовывать огромные территории и даже целые континенты, делая их пригодными для застройки. В этом строении беспрерывно производятся специальные наниты, отвечающие за постоянное качество почвы.
  TW_SIMULATOR: Идут технические работы, симуляция боя недоступна.
  UNIQUE_ARTEFACT: Уникальный артефакт
  UNIQUE_ARTEFACT_DESC: Это уникальный артефакт с историей
  UNIQUE_ARTEFACT_FULL_DESC: Это уникальный артефакт с историей
  UNIT_A_CORVETTE: Корвет инопланетян
  UNIT_A_CORVETTE_DESC: Очень быстрый и экономичный боевой корабль с хорошим вооружением.
  UNIT_A_CORVETTE_FULL_DESC: Очень быстрый и экономичный боевой корабль с хорошим вооружением.
  UNIT_A_FRIGATE: Фрегат инопланетян
  UNIT_A_FRIGATE_DESC: Огромная огневая мощь и большая вместимость. Способен наносить разрушающие удары противнику.
  UNIT_A_FRIGATE_FULL_DESC: Огромная огневая мощь и большая вместимость. Способен наносить разрушающие удары противнику.
  UNIT_A_PALADIN: Паладин инопланетян
  UNIT_A_PALADIN_DESC: Небольшой корабль огневой поддержки. Оснащен высокоточным оружием и системой маскировки.
  UNIT_A_PALADIN_FULL_DESC: Небольшой корабль огневой поддержки. Оснащен высокоточным оружием и системой маскировки.
  UNIT_A_SCREEN: Щитовой корабль инопланетян
  UNIT_A_SCREEN_DESC: Уникальный щитовой корабль. Непревзойденная защищенность позволяет принимать на себе основной удар противника.
  UNIT_A_SCREEN_FULL_DESC: Уникальный щитовой корабль. Непревзойденная защищенность позволяет принимать на себе основной удар противника.
  UNIT_A_TORPEDOCARIER: Торпедоносец инопланетян
  UNIT_A_TORPEDOCARIER_DESC: Быстрый корабль для нанесения внезапного удара. Оснащен мощным оружием с системой автоматического наведения.
  UNIT_A_TORPEDOCARIER_FULL_DESC: Быстрый корабль для нанесения внезапного удара. Оснащен мощным оружием с системой автоматического наведения.
  UNIT_EXCH_SUPPORT_RANGE: Межгалактический спутник
  UNIT_EXCH_SUPPORT_RANGE_DESC: Межгалактический спутник увеличивает радиус действия биржи. Продавцы могут добавлять лоты на продажу только в случае нахождения в радиусе действия.
  UNIT_EXCH_SUPPORT_RANGE_FULL_DESC: Межгалактический спутник - это огромный объект, вращающийся на орбите планеты. Он практически полностью состоит из высокотехнологичной аппаратуры для поддержания стабильной и бесперебойной связи с самыми далекими звездными системами во вселенной. При объединении таких спутников в группы, они способны улучшать качество связи многократно. Межгалактический спутник необходим для работы биржи. Каждый такой спутник увеличивает радиус действия межгалактической биржи на двойное количество уровней компьютерной технологии. Радиус действия измеряется в звездных системах. Каждые 300 систем увеличивают радиус действия на 1 галактику. Продавцы могут добавлять лоты на продажу только в случае нахождения в радиусе действия биржи.
  UNIT_EXCH_SUPPORT_SLOT: Биржевая подстанция
  UNIT_EXCH_SUPPORT_SLOT_DESC: Биржевая подстанция увеличивает максимальное количество лотов, обслуживаемое биржей.
  UNIT_EXCH_SUPPORT_SLOT_FULL_DESC: Биржевая подстанция увеличивает максимальное количество лотов, обслуживаемое биржей.
  USABLE_ARTEFACT: Используемый артефакт
  USABLE_ARTEFACT_DESC: Это артефакт с возможностью использования
  USABLE_ARTEFACT_FULL_DESC: Это артефакт с возможностью использования
  USE_NEW_ASSAULT: Использовать новую систему боя
  WRONG_LEAVE_PHRASE: Вы неправильно ввели фразу. Фраза чувствительна к регистру.
