  ENERGY_TECH: Энергетическая технология
  ENERGY_TECH_DESC: Обладание различными видами энергии необходимо для многих новых технологий.
  ENERGY_TECH_FULL_DESC: Обладание различными видами энергии необходимо для многих новых технологий.
  ESPIONAGE_SENSOR: Шпионский зонд
  ESPIONAGE_SENSOR_DESC: Шпионские зонды - это маленькие манёвренные корабли, которые доставляют с больших расстояний данные о флотах и планетах.
  ESPIONAGE_SENSOR_FULL_DESC: Шпионские зонды - это маленькие манёвренные корабли, которые доставляют с больших расстояний данные о флотах и планетах. Их высокомощный двигатель позволяет им преодолевать большие расстояния за несколько секунд. Однажды попав на орбиту какой-нибудь планеты, они пребывают там некоторое время для сборки данных. В это время враг может их относительно легко обнаружить и атаковать. Для экономии места не было установлено ни брони, ни щитов, ни орудий, что делает зонды в случае обнаружения лёгкими целями.
