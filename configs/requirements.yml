    - { kind: research, key: ion_tech, level: 4 }
  plasma_gun:
    - { kind: building, key: shipyard, level: 8 }
    - { kind: research, key: plasma_tech, level: 7 }
  small_shield:
    - { kind: building, key: shipyard, level: 1 }
    - { kind: research, key: shield_tech, level: 2 }
  large_shield:
    - { kind: building, key: shipyard, level: 6 }
    - { kind: research, key: shield_tech, level: 6 }
  interceptor_rocket:
    - { kind: building, key: shipyard, level: 1 }
    - { kind: building, key: rocket_station, level: 2 }
  interplanetary_rocket:
    - { kind: building, key: shipyard, level: 1 }
    - { kind: building, key: rocket_station, level: 4 }
    - { kind: research, key: impulse_engine, level: 1 }
