# Каталог артефактов. ID и эффекты 1-в-1 из oxsar2/consts.php +
# game/Artefact.class.php (см. §5.10.1 oxsar-spec.txt).
#
# effect:
#   type: factor_user | factor_planet | factor_all_planets |
#         one_shot | battle_bonus
#   field: exchange_rate | research_factor | build_factor |
#          produce_factor | energy_factor | storage_factor
#   op:    set | add
#   value: число (для add: дельта; для set: пара [active, inactive])
#
# На M5 достаточно реализовать factor_* — это самые распространённые
# и самые «ломкие» при порте. Остальные (one_shot, battle_bonus)
# добавляем в M5.1.

artefacts:
  merchants_mark:
    id: 300
    name: "Merchant's Mark"
    effect:
      type: factor_user
      field: exchange_rate
      op: set
      active_value: 1.03
      inactive_value: 1.2
    # set-эффект НЕ стакается; activate второго даёт ошибку.
    stackable: false
    lifetime_seconds: 604800   # 7 дней

  catalyst:
    id: 301
    name: "Catalyst"
    effect:
      type: factor_all_planets
      field: produce_factor
      op: add
      value: 0.1
    stackable: true
    max_stacks: 3   # +30% производства максимум
    lifetime_seconds: 604800

  power_generator:
    id: 302
    name: "Power Generator"
    effect:
      type: factor_all_planets
      field: energy_factor
      op: add
      value: 0.15
    stackable: true
    max_stacks: 2   # +30% энергии максимум
    lifetime_seconds: 604800

  atomic_densifier:
    id: 303
    name: "Atomic Densifier"
    effect:
      type: factor_all_planets
      field: storage_factor
      op: add
      value: 0.15
    stackable: true
    lifetime_seconds: 604800

  supercomputer:
    id: 305
    name: "Supercomputer"
    effect:
      type: factor_user
      field: research_factor
      op: add
      value: 1.0
    stackable: true
    lifetime_seconds: 604800

  robot_control_system:
    id: 315
    name: "Robot Control System"
    effect:
      type: factor_planet       # привязан к конкретной планете
      field: build_factor
      op: add
      value: 1.0
    stackable: true
    lifetime_seconds: 604800

  # Боевые артефакты (legacy mode=6). ID верифицированы по oxsar2/sql/data.sql.
  # +10% за 300 кр; стекаются (до 3 штук = up to +30%).
  battle_attack_power:
    id: 318
    name: "Единство атаки"
    effect:
      type: battle_bonus
      battle_attack: 1.1
    stackable: true
    max_stacks: 3
    lifetime_seconds: 0   # одноразовый (lifetime=0 в na_artefacts)

  battle_shield_power:
    id: 317
    name: "Единство щитов"
    effect:
      type: battle_bonus
      battle_shield: 1.1
    stackable: true
    max_stacks: 3
    lifetime_seconds: 0

  battle_shell_power:
    id: 316
    name: "Единство брони"
    effect:
      type: battle_bonus
      battle_shell: 1.1
    stackable: true
    max_stacks: 3
    lifetime_seconds: 0

  # +10% версии (legacy BATTLE_*_POWER_10, id=359-361), 2900 кр.
  battle_attack_power_10:
    id: 361
    name: "Единство атаки ×10"
    effect:
      type: battle_bonus
      battle_attack: 1.1
    stackable: true
    max_stacks: 3
    lifetime_seconds: 0

  battle_shield_power_10:
    id: 360
    name: "Единство щитов ×10"
    effect:
      type: battle_bonus
      battle_shield: 1.1
    stackable: true
    max_stacks: 3
    lifetime_seconds: 0

  battle_shell_power_10:
    id: 359
    name: "Единство брони ×10"
    effect:
      type: battle_bonus
      battle_shell: 1.1
    stackable: true
    max_stacks: 3
    lifetime_seconds: 0
