# Glossary именованных параметров для конвертации %s/%d → {{name}}.
# Формат ключа: "GROUP.KEY.N" (N — позиция плейсхолдера, 1-based).
# Используется инструментом i18n-rename --glossary.
#
# Стандартные имена параметров (не плодить синонимы):
#   username   — имя пользователя
#   allianceName — название альянса
#   planetName — название планеты
#   coords     — координаты вида "1:2:3" или объект
#   metal / silicon / hydrogen — ресурсы
#   total      — суммарное значение (ресурсов и т.п.)
#   count      — количество чего-либо
#   unitName   — название юнита
#   fleetName  — состав/название флота
#   time       — время/дата строкой
#   percent    — процент числом
#   credits    — кредиты
#   days / min / max — числовые диапазоны
#   artefactName — название артефакта
#   rank       — место в рейтинге
#   attackerName / defenderName — имена сторон боя

