server {
    listen 80;
    root /var/www/public;
    index game.php;
    charset utf-8;

    # Deny direct access to PHP source outside public/
    location ~* \.(class|inc)\.php$ {
        deny all;
    }

    # Static assets
    location ~* \.(css|js|png|jpg|gif|ico|woff|woff2|ttf|svg|mp3|ogg)$ {
        expires 7d;
        access_log off;
    }

    # All game requests go through game.php
    location / {
        try_files $uri $uri/ /game.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass   php:9000;
        fastcgi_index  game.php;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include        fastcgi_params;
    }
}
