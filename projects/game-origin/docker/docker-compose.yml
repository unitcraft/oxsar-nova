services:
  mysql:
    image: mysql:5.7
    restart: unless-stopped
    # Legacy oxsar2 SQL писалось до MySQL 5.7 strict-режима — много NOT NULL
    # колонок без DEFAULT (например na_planet.umi), которые рассчитывают на
    # implicit zero. Отключаем STRICT_TRANS_TABLES для совместимости с legacy.
    # Альтернатива (правильнее) — миграция «ALTER TABLE ... DEFAULT» или
    # явная передача всех NOT NULL полей в PlanetCreator/др. — отложено
    # до этапа 37.6+ (фикс игровых дыр).
    command:
      - --sql-mode=NO_ZERO_IN_DATE,NO_ZERO_DATE,ERROR_FOR_DIVISION_BY_ZERO,NO_AUTO_CREATE_USER,NO_ENGINE_SUBSTITUTION
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: ${DB_NAME:-oxsar_db}
      MYSQL_USER: ${DB_USER:-oxsar_user}
      MYSQL_PASSWORD: ${DB_PWD:-oxsar_pass}
    volumes:
      - mysql_data:/var/lib/mysql
      - ../migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

  memcached:
    image: memcached:1.6-alpine
    restart: unless-stopped
    command: ["-m", "64"]

  php:
    build:
      context: .
      dockerfile: Dockerfile.php
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-oxsar_db}
      DB_USER: ${DB_USER:-oxsar_user}
      DB_PWD: ${DB_PWD:-oxsar_pass}
      DB_PREFIX: ${DB_PREFIX:-na_}
      TIMEZONE: ${TIMEZONE:-Europe/Moscow}
      GAME_UNIVERSE: ${GAME_UNIVERSE:-dm}
      UNIVERSE_NAME_FULL: ${UNIVERSE_NAME_FULL:-Origin}
      PORTAL_URL: ${PORTAL_URL:-}
      IDENTITY_JWKS_URL: ${IDENTITY_JWKS_URL:-${AUTH_JWKS_URL:-}}
    volumes:
      - ../src:/var/www/src:ro
      - ../public:/var/www/public:ro
      - ../config:/var/www/config:ro
      - ../src/cache:/var/www/src/cache:rw
      # План 43 Ф.1: composer.json — read-only из корня game-origin;
      # vendor/ — named volume (генерится `composer install` в build-time
      # либо вручную через `docker compose exec php composer install`).
      - ../composer.json:/var/www/composer.json:ro
      - origin_vendor:/var/www/vendor
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8092}:80"
    volumes:
      - ../public:/var/www/public:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      php:
        condition: service_started

  # Event-monitor воркер для game-origin (план 37.5c.3).
  # Использует тот же образ что и php (Dockerfile.php), но запускает
  # CLI-скрипт worker/event-monitor.php вместо php-fpm.
  # Скрипт живёт ~125 сек и сам выходит — restart: unless-stopped поднимает
  # заново. Это защита от накопления PHP memory/state-проблем (legacy-баг).
  event-monitor:
    build:
      context: .
      dockerfile: Dockerfile.php
    restart: unless-stopped
    command: ["php", "/var/www/worker/event-monitor.php"]
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-oxsar_db}
      DB_USER: ${DB_USER:-oxsar_user}
      DB_PWD: ${DB_PWD:-oxsar_pass}
      DB_PREFIX: ${DB_PREFIX:-na_}
      TIMEZONE: ${TIMEZONE:-Europe/Moscow}
      GAME_UNIVERSE: ${GAME_UNIVERSE:-dm}
      MC_SERVER: memcached
    volumes:
      - ../src:/var/www/src:ro
      - ../public:/var/www/public:ro
      - ../config:/var/www/config:ro
      - ../worker:/var/www/worker:ro
      - ../src/cache:/var/www/src/cache:rw
      # План 43 Ф.1: composer.json + vendor (тот же named volume что у php).
      - ../composer.json:/var/www/composer.json:ro
      - origin_vendor:/var/www/vendor
    depends_on:
      mysql:
        condition: service_healthy
      memcached:
        condition: service_started

volumes:
  mysql_data:
  # План 43 Ф.1: vendor/ — генерится composer install внутри контейнера.
  # Не коммитится в git (см. .gitignore), не маунтится с хоста (Windows
  # filesystem-perms vs Linux uid/gid issues).
  origin_vendor:
