                new_user_id: { type: string, format: uuid }
      responses:
        "204": { description: transferred }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/admin/planets/{id}:
    delete:
      tags: [admin]
      summary: Soft-delete планеты (план 14 Ф.2.5). Не даёт удалить последнюю.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: deleted }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: last planet of user, transfer first

  /api/admin/users/{id}/restore:
    post:
      tags: [admin]
      summary: Восстановление soft-deleted аккаунта (план 14 Ф.2.6).
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: restored }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/i18n/{lang}:
    get:
      tags: [i18n]
      summary: Все переводы для заданного языка.
      parameters:
        - in: path
          name: lang
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { type: object }

  /api/payment/packages:
    get:
      tags: [payment]
      summary: Список пакетов кредитов (публичный).
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CreditPackage" }

  /api/payment/order:
    post:
      tags: [payment]
      summary: Создать заказ на покупку кредитов.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateOrderRequest" }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CreateOrderResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/payment/webhook:
    post:
      tags: [payment]
      summary: Callback от платёжного шлюза (без авторизации).
      responses:
        "200":
          description: ok (тело зависит от шлюза)
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/payment/history:
    get:
      tags: [payment]
      summary: История покупок кредитов игрока.
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Purchase" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/alien-missions/{mission_id}/buyout:
    post:
      tags: [alien]
      summary: |
        Платный выкуп удержания (HOLDING) пришельцами за оксары.
        Списывает оксары через billing-service, закрывает HOLDING-event,
        снимает все запланированные HOLDING_AI-тики этой миссии. Работает
        во всех вселенных (uni01/uni02/origin) — план 66 Ф.5, R0-исключение.
        Эта фича не существует в legacy oxsar2 (новая часть ремастера); цена
        фиксированная, см. configs alien.BuyoutBaseOxsars.
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: mission_id
          required: true
          schema: { type: string, format: uuid }
          description: id события KindAlienHolding (parent), которое надо выкупить.
        - in: header
          name: Idempotency-Key
          required: true
          schema: { type: string, minLength: 1, maxLength: 128 }
          description: |
            Ключ дедупликации (R9). Рекомендуемый формат:
            "<user_id>:alien_buyout:<mission_id>".
      responses:
        "200":
          description: ok — оксары списаны, удержание снято.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AlienBuyoutResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "402":
          description: |
            insufficient_oxsars — у игрока меньше оксаров, чем стоит выкуп.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "404":
          description: |
            mission_not_found — миссия не существует, чужая или уже закрыта.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "409":
          description: |
            not_in_holding_state — миссия не KindAlienHolding или уже завершена.
            Также возвращается idempotency_conflict, если тот же
            Idempotency-Key уже использовался с другим body.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "503":
          description: |
            billing_unavailable — billing-service недоступен (5xx/timeout
            после retry); миссия НЕ закрыта, можно повторить.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  # ───────────────────────────────────────────────────────────────────
  # Биржа артефактов (план 68). P2P-обмен пакетов артефактов одного
  # типа на оксариты (soft-currency, ст. 1062 ГК; см. ADR-0009).
  # Эскроу: при создании лота N конкретных artefacts_user.id переводятся
  # в state='listed'. При покупке — owner+state переводятся атомарно с
  # oxsarit-переводом. При отзыве/истечении — артефакты возвращаются.
  # ───────────────────────────────────────────────────────────────────
  /api/exchange/lots:
    get:
      tags: [exchange]
      summary: Список активных лотов с фильтрами
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: artifact_unit_id
          schema: { type: integer }
          description: фильтр по типу артефакта (ARTEFACT_* код)
        - in: query
          name: min_price
          schema: { type: integer, format: int64 }
        - in: query
          name: max_price
          schema: { type: integer, format: int64 }
        - in: query
          name: seller_id
          schema: { type: string, format: uuid }
        - in: query
          name: status
          schema: { type: string, enum: [active, sold, cancelled, expired] }
          description: по умолчанию active
        - in: query
          name: cursor
          schema: { type: string }
          description: cursor-based пагинация (opaque, из предыдущего ответа)
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                required: [lots]
                properties:
                  lots:
                    type: array
                    items: { $ref: "#/components/schemas/ExchangeLot" }
                  next_cursor:
                    type: string
                    nullable: true
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [exchange]
      summary: Создать лот (escrow артефактов)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [artifact_unit_id, quantity, price_oxsarit, expires_in_hours]
              properties:
                artifact_unit_id:
                  type: integer
                  description: ARTEFACT_* код артефакта
                quantity:
                  type: integer
                  minimum: 1
                  maximum: 100
                price_oxsarit:
                  type: integer
                  format: int64
                  minimum: 1
                  description: цена за весь лот в оксаритах
                expires_in_hours:
                  type: integer
                  minimum: 1
                  maximum: 168
      responses:
        "201":
          description: created
          content:
            application/json:
              schema:
                type: object
                required: [lot]
                properties:
                  lot: { $ref: "#/components/schemas/ExchangeLot" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: |
            idempotency_conflict — Idempotency-Key уже использовался с другим body.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "422":
          description: |
            insufficient_artefacts — у seller'а меньше N held-артефактов нужного типа.
            price_cap_exceeded — цена превышает rolling-30d AVG × multiplier.
            permit_required — нет permit «Знак торговца» (gating отключён в MVP, см. simplifications.md).
            max_active_lots — превышен лимит активных лотов на игрока.
            max_quantity — quantity > 100.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /api/exchange/lots/{id}:
    get:
      tags: [exchange]
      summary: Детали лота (с item-list)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                required: [lot, items]
                properties:
                  lot: { $ref: "#/components/schemas/ExchangeLot" }
                  items:
                    type: array
                    items:
                      type: object
                      required: [artefact_id]
                      properties:
                        artefact_id: { type: string, format: uuid }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [exchange]
      summary: Отозвать собственный лот
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: ok }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: not the seller
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: lot_not_active — лот уже sold/cancelled/expired
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /api/exchange/lots/{id}/buy:
    post:
      tags: [exchange]
      summary: Купить лот (атомарный oxsarit→artefact обмен)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
        - in: header
          name: Idempotency-Key
          required: true
          schema: { type: string }
      responses:
        "200":
          description: bought
          content:
            application/json:
              schema:
                type: object
                required: [lot]
                properties:
                  lot: { $ref: "#/components/schemas/ExchangeLot" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "402":
          description: insufficient_oxsarits — недостаточно средств у buyer'а
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "403":
          description: cannot buy own lot
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: |
            lot_not_active — лот уже sold/cancelled/expired.
            idempotency_conflict — Idempotency-Key с другим body.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /api/exchange/stats:
    get:
      tags: [exchange]
      summary: Агрегаты по биржам (count/avg по unit_id)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      required: [artifact_unit_id, active_lots, avg_unit_price, last_30d_volume]
                      properties:
                        artifact_unit_id: { type: integer }
                        active_lots:      { type: integer }
                        avg_unit_price:
                          type: integer
                          format: int64
                          nullable: true
                          description: rolling-30d AVG(price/quantity) по 'bought'
                        last_30d_volume:  { type: integer, format: int64 }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # =====================================================================
  # Spring 4 (план 72 Ф.5) — communication / settings / utilities
  # Документирование existing endpoints: handlers уже работают (см.
  # cmd/server/main.go), но в openapi их не было. Закрытие R2 тех-долга.
  # =====================================================================

  /api/friends:
    get:
      tags: [friends]
      security: [{ bearerAuth: [] }]
      summary: Список друзей текущего игрока.
      description: |
        Односторонний friend-list (legacy buddylist): добавление не
        требует подтверждения второй стороной.
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  friends:
                    type: array
                    items: { $ref: "#/components/schemas/Friend" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/friends/{userId}:
    post:
      tags: [friends]
      security: [{ bearerAuth: [] }]
      summary: Добавить пользователя в друзья.
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: string, format: uuid }
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "204": { description: added }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [friends]
      security: [{ bearerAuth: [] }]
      summary: Удалить пользователя из друзей.
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: string, format: uuid }
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "204": { description: removed }

  /api/chat/{kind}/history:
    get:
      tags: [chat]
      security: [{ bearerAuth: [] }]
      summary: Последние N (≤50) сообщений канала.
      parameters:
        - $ref: "#/components/parameters/ChatKind"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ChatMessage" }
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/chat/{kind}/ws:
    get:
      tags: [chat]
      security: [{ bearerAuth: [] }]
      summary: WebSocket upgrade для подписки на канал.
      description: |
        После апгрейда сервер шлёт JSON-сообщения формата ChatMessage
        (`kind=msg|edit|delete`). Клиент шлёт `{body: string}`.
        План 32 Ф.5: Hub использует Redis pub/sub для multi-instance.
      parameters:
        - $ref: "#/components/parameters/ChatKind"
      responses:
        "101": { description: switching protocols }
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/chat/{kind}/send:
    post:
      tags: [chat]
      security: [{ bearerAuth: [] }]
      summary: Отправить сообщение через REST-fallback (без WS).
      parameters:
        - $ref: "#/components/parameters/ChatKind"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body: { type: string, maxLength: 500 }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ChatMessage" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "429":
          description: rate limit exceeded (10 msg/min на автора, план 46 Ф.4)
          content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } }

  /api/chat/{kind}/unread:
    get:
      tags: [chat]
      security: [{ bearerAuth: [] }]
      summary: Число непрочитанных сообщений в канале.
      parameters:
        - $ref: "#/components/parameters/ChatKind"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ChatUnread" }

  /api/chat/{kind}/read:
    post:
      tags: [chat]
      security: [{ bearerAuth: [] }]
      summary: Отметить канал прочитанным (план 69 D-020).
      parameters:
        - $ref: "#/components/parameters/ChatKind"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  channel: { type: string }
                  last_read_at: { type: string, format: date-time }

  /api/chat/messages/{id}:
    patch:
      tags: [chat]
      security: [{ bearerAuth: [] }]
      summary: Отредактировать своё сообщение (5-минутное окно).
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body: { type: string, maxLength: 500 }
      responses:
        "200":
          description: updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ChatMessage" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [chat]
      security: [{ bearerAuth: [] }]
      summary: Удалить своё сообщение (5-минутное окно).
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "204": { description: deleted }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/search:
    get:
      tags: [search]
      security: [{ bearerAuth: [] }]
      summary: Глобальный поиск по игрокам / альянсам / планетам.
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string, minLength: 2 }
          description: подстрока для ILIKE
        - in: query
          name: type
          required: false
          schema:
            type: string
            enum: [player, alliance, planet]
          description: ограничить поиск одной категорией
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SearchResults" }

  /api/professions:
    get:
      tags: [profession]
      security: [{ bearerAuth: [] }]
      summary: Список доступных профессий с описаниями.
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  professions:
                    type: array
                    items: { $ref: "#/components/schemas/Profession" }

  /api/professions/me:
    get:
      tags: [profession]
      security: [{ bearerAuth: [] }]
      summary: Текущая профессия игрока + cooldown до смены.
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProfessionInfo" }
    post:
      tags: [profession]
      security: [{ bearerAuth: [] }]
      summary: Сменить профессию (раз в N дней, требует credit).
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [profession]
              properties:
                profession: { type: string, description: ключ профессии }
      responses:
        "204": { description: changed }
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/settings:
    get:
      tags: [settings]
      security: [{ bearerAuth: [] }]
      summary: Текущие настройки аккаунта (email/language/timezone/vacation).
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Settings" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    put:
      tags: [settings]
      security: [{ bearerAuth: [] }]
      summary: Обновить настройки (частичный PATCH-семантика на PUT).
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:    { type: string, format: email }
                language: { type: string, enum: [ru, en] }
                timezone: { type: string }
      responses:
        "204": { description: updated }
        "400": { $ref: "#/components/responses/BadRequest" }
        "409": { $ref: "#/components/responses/Conflict" }

  /api/me/deletion/code:
    post:
      tags: [settings]
      security: [{ bearerAuth: [] }]
      summary: Запросить одноразовый код для удаления аккаунта (rate-limit 3/час).
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  expires_at: { type: string, format: date-time }
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/me:
    get:
      tags: [me]
      security: [{ bearerAuth: [] }]
      summary: Профиль текущего пользователя (stats для MainScreen).
      description: |
        Возвращает полный набор stats, отображаемый на главном экране:
        очки, ранг, опыт, шахтёр-уровень, межгалактические исследования,
        режим отпуска. Источник правды по полю `roles` — JWT (claims),
        остальное — таблица `users` + computed (rank, miner_need_points,
        intergalactic_research_level).
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MeInfo" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    delete:
      tags: [settings]
      security: [{ bearerAuth: [] }]
      summary: Удалить аккаунт (soft-delete) по одноразовому коду.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: { type: string, description: 8-символьный код из email }
      responses:
        "204": { description: deleted (soft) }
        "400": { $ref: "#/components/responses/BadRequest" }

  # ---- Spring 4 ч.2 (S-040 Officer расширения, S-041 Profession) ----
  # /api/officers и /api/officers/{key}/activate уже задокументированы
  # выше; добавлены поля body для activate (auto_renew).

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    IdempotencyKey:
      in: header
      name: Idempotency-Key
      required: false
      schema: { type: string, format: uuid }
      description: |
        Idempotency-Key (R9 ТЗ §16.10). Отправляется фронтом для
        всех мутирующих запросов (POST/PUT/PATCH/DELETE). Backend
        кеширует первый ответ под этим ключом и при повторе с тем
        же ключом возвращает кешированный ответ (anti-double-submit).
    ChatKind:
      in: path
      name: kind
      required: true
      schema:
        type: string
        enum: [global, alliance]
      description: |
        Тип канала: `global` — общий чат (channel="global"),
        `alliance` — альянс-чат (channel="ally:<alliance_id>"
        текущего пользователя; для не-членов 400).

  responses:
    BadRequest:
      description: bad request
      content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } }
    Unauthorized:
      description: unauthorized
      content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } }
    Forbidden:
      description: forbidden
      content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } }
    NotFound:
      description: not found
      content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } }
    Conflict:
      description: conflict
      content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } }

  schemas:
    Status:
      type: object
      properties:
        status: { type: string }

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string }
            message: { type: string }

    RegisterRequest:
      type: object
      required: [username, email, password]
      properties:
        username: { type: string, minLength: 3, maxLength: 24 }
        email:    { type: string, format: email }
        password: { type: string, minLength: 8 }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:    { type: string, format: email }
        password: { type: string }

    # План 63: формат ответа login/refresh по RFC 6749 §5.1.
    # Плоская структура: access_token, token_type, expires_in, refresh_token.
    # Поле user — non-RFC, но widespread practice для SPA login endpoint'ов.
    AuthResponse:
      type: object
      required: [access_token, token_type, expires_in, refresh_token]
      properties:
        access_token:  { type: string }
        token_type:    { type: string, enum: [Bearer] }
        expires_in:    { type: integer, description: "TTL access-токена в секундах" }
        refresh_token: { type: string }
        user:          { $ref: "#/components/schemas/User" }

    User:
      type: object
      properties:
        id:       { type: string, format: uuid }
        username: { type: string }
        email:    { type: string, format: email }

    # MeInfo — ответ GET /api/me (план 72.1 ч.17 pixel-perfect MainScreen).
    # Поля legacy `Main.class.php:200-290` приведены к semantic naming
    # (e_points → combat_experience, be_points → accumulated_experience,
    # of_level → miner_level и т.д.). См. ADR-0009 currency-rebranding
    # для прецедента переименования (credit → oxsarit будет в отдельном PR).
    MeInfo:
      type: object
      required:
        - user_id
        - username
        - roles
        - credit
        - profession
        - points
        - rank
        - total_users
        - max_points
        - combat_experience
        - accumulated_experience
        - miner_level
        - miner_points
        - miner_need_points
        - dm_points
        - intergalactic_research_level
        - battles
      properties:
        user_id:
          type: string
          format: uuid
        username:
          type: string
        roles:
          type: array
          items: { type: string }
          description: Роли из JWT-claims identity-сервиса (план 52).
        credit:
          type: number
          format: double
          description: Баланс оксаритов (легаси `credit`, ADR-0009).
        profession:
          type: string
          enum: [none, miner, attacker, defender, tank]
          description: Ключ профессии. `none` — нет профессии.
        points:
          type: number
          format: double
          description: Текущие очки (b+r+u). Считаются воркером `score.RecalcUser`.
        rank:
          type: integer
          minimum: 1
          description: |
            Позиция в рейтинге по `points`. Игроки в umode/observer
            исключены. Вычисляется на лету (COUNT WHERE points > мои).
        total_users:
          type: integer
          minimum: 0
          description: |
            Общее число активных игроков (umode=false, is_observer=false).
            Используется для отображения "rank из total_users".
        max_points:
          type: number
          format: double
          description: Исторический пик `points` (план 69 D-001).
        combat_experience:
          type: number
          format: double
          description: |
            Тотальный бой-опыт (легаси `e_points`). Обновляется в
            `internal/fleet/attack.go` после боя по формуле
            Java Assault.java:819-847.
        accumulated_experience:
          type: number
          format: double
          description: |
            Резервуар активных уровней технологий (легаси `be_points`).
            Тратится при отправке атаки, возвращается при завершении
            события (план 72.1 ч.17).
        miner_level:
          type: integer
          minimum: 0
          description: Уровень профессии Шахтёр (легаси `of_level`).
        miner_points:
          type: number
          format: double
          description: |
            Очки Шахтёра (легаси `of_points`). Накапливаются при
            добыче ресурсов; повышение уровня — при достижении
            `miner_need_points`.
        miner_need_points:
          type: integer
          description: |
            Порог для следующего miner_level. Формула:
            `level<1 ? 100 : round(pow(1.5, level-1) * 200)`
            (легаси `Functions.inc.php:1642`).
        dm_points:
          type: number
          format: double
          description: |
            Derived-метрика для альтернативного рейтинга (план 72.1 ч.17).
            Считается воркером по формуле
            `Functions.inc.php:1432-1434` из `points`/`e_points`/`max_points`.
        intergalactic_research_level:
          type: integer
          minimum: 0
          description: |
            Уровень research «Intergalactic Research Network» (id=113).
            См. configs/units.yml.
        battles:
          type: integer
          minimum: 0
          description: Счётчик сражений (увеличивается при каждом бое).
        vacation_since:
          type: string
          format: date-time
          description: Когда был включён режим отпуска (если активен).
        vacation_unlock_at:
          type: string
          format: date-time
          description: |
            Когда станет возможен выход из отпуска (vacation_since + 48h).
        vacation_last_end:
          type: string
          format: date-time
          description: Когда был последний выход из режима отпуска.

    AlienBuyoutResponse:
      type: object
      required: [mission_id, cost_oxsars, freed_at]
      properties:
        mission_id:
          type: string
          format: uuid
          description: id выкупленной HOLDING-миссии.
        cost_oxsars:
          type: integer
          format: int64
          minimum: 0
          description: |
            Сумма оксаров, списанная через billing. Минимальные единицы
            оксара (целые числа, ADR-0009).
        freed_at:
          type: string
          format: date-time
          description: |
            Серверный timestamp снятия удержания (когда HOLDING-event
            был помечен state='ok'). UTC.

    AdminAuditEntry:
      type: object
      properties:
        id:          { type: string, format: uuid }
        admin_id:    { type: string, format: uuid }
        admin_name:  { type: string }
        action:      { type: string, description: "users.ban / users.credit / events.retry / …" }
        target_kind: { type: string, description: "user / automsg / event / ''" }
        target_id:   { type: string, description: "id или key цели" }
        payload:     { type: object, additionalProperties: true, description: "тело запроса без секретов" }
        status:      { type: integer, description: "HTTP-код ответа" }
        ip:          { type: string }
        user_agent:  { type: string }
        created_at:  { type: string, format: date-time }

    AdminUserProfile:
      type: object
      properties:
        id:            { type: string, format: uuid }
        username:      { type: string }
        email:         { type: string }
        role:          { type: string }
        credit:        { type: integer, format: int64 }
        score:         { type: integer, format: int64 }
        banned_at:     { type: string, format: date-time, nullable: true }
        created_at:    { type: string, format: date-time }
        last_seen_at:  { type: string, format: date-time }
        planets:
          type: array
          items:
            type: object
            properties:
              id:       { type: string, format: uuid }
              name:     { type: string }
              galaxy:   { type: integer }
              system:   { type: integer }
              position: { type: integer }
              is_moon:  { type: boolean }
              metal:    { type: integer, format: int64 }
              silicon:  { type: integer, format: int64 }
              hydrogen: { type: integer, format: int64 }
        fleets:
          type: array
          items:
            type: object
            properties:
              id:           { type: string, format: uuid }
              mission:      { type: integer }
              state:        { type: string }
              dst_galaxy:   { type: integer }
              dst_system:   { type: integer }
              dst_position: { type: integer }
              dst_is_moon:  { type: boolean }
              arrive_at:    { type: string, format: date-time }
        market_lots:
          type: array
          items:
            type: object
            properties:
              id:            { type: string, format: uuid }
              sell_resource: { type: string }
              sell_amount:   { type: integer, format: int64 }
              buy_resource:  { type: string }
              buy_amount:    { type: integer, format: int64 }
              state:         { type: string }
        artefact_lots:
          type: array
          items:
            type: object
            properties:
              id:           { type: string, format: uuid }
              artefact_id:  { type: string, format: uuid }
              unit_id:      { type: integer }
              price_credit: { type: integer, format: int64 }
        officers:
          type: array
          items:
            type: object
            properties:
              key:         { type: string }
              expires_at:  { type: string, format: date-time }
        artefacts:
          type: array
          items:
            type: object
            properties:
              id:      { type: string, format: uuid }
              unit_id: { type: integer }
              state:   { type: string }
        res_log:
          type: array
          items:
            type: object
            properties:
              reason:      { type: string }
              planet_id:   { type: string, format: uuid, nullable: true }
              d_metal:     { type: integer, format: int64 }
              d_silicon:   { type: integer, format: int64 }
              d_hydrogen:  { type: integer, format: int64 }
              created_at:  { type: string, format: date-time }
        purchases:
          type: array
          items:
            type: object
            properties:
              id:          { type: string, format: uuid }
              package_key: { type: string }
              credits:     { type: integer }
              price_rub:   { type: number }
              status:      { type: string }
              created_at:  { type: string, format: date-time }
              paid_at:     { type: string, format: date-time, nullable: true }
        messages_recent:
          type: array
          items:
            type: object
            properties:
              id:         { type: string, format: uuid }
              folder:     { type: integer }
              subject:    { type: string }
              created_at: { type: string, format: date-time }
              read:       { type: boolean }
        reports_recent:
          type: array
          items:
            type: object
            properties:
              id:         { type: string, format: uuid }
              kind:       { type: string, enum: [battle, espionage, expedition] }
              created_at: { type: string, format: date-time }

    Planet:
      type: object
      properties:
        id:       { type: string, format: uuid }
        user_id:  { type: string, format: uuid }
        is_moon:  { type: boolean }
        name:     { type: string }
        galaxy:   { type: integer }
        system:   { type: integer }
        position: { type: integer }
        metal:    { type: number }
        silicon:  { type: number }
        hydrogen: { type: number }
        last_res_update: { type: string, format: date-time }

    QueueItem:
      type: object
      properties:
        id:           { type: string, format: uuid }
        planet_id:    { type: string, format: uuid }
        unit_id:      { type: integer }
        target_level: { type: integer }
        start_at:     { type: string, format: date-time }
        end_at:       { type: string, format: date-time }
        status:       { type: string }

    ShipyardQueueItem:
      type: object
      properties:
        id:               { type: string, format: uuid }
        planet_id:        { type: string, format: uuid }
        unit_id:          { type: integer }
        count:            { type: integer, format: int64 }
        per_unit_seconds: { type: integer }
        start_at:         { type: string, format: date-time }
        end_at:           { type: string, format: date-time }
        status:           { type: string }

    RepairQueueItem:
      type: object
      properties:
        id:               { type: string, format: uuid }
        planet_id:        { type: string, format: uuid }
        user_id:          { type: string, format: uuid }
        unit_id:          { type: integer }
        is_defense:       { type: boolean }
        mode:             { type: string, enum: [disassemble, repair] }
        count:            { type: integer, format: int64 }
        return_metal:     { type: integer, format: int64 }
        return_silicon:   { type: integer, format: int64 }
        return_hydrogen:  { type: integer, format: int64 }
        per_unit_seconds: { type: integer }
        start_at:         { type: string, format: date-time }
        end_at:           { type: string, format: date-time }
        status:           { type: string }

    SystemView:
      type: object
      properties:
        galaxy: { type: integer }
        system: { type: integer }
        cells:
          type: array
          items: { $ref: "#/components/schemas/GalaxyCell" }

    GalaxyCell:
      type: object
      properties:
        position:        { type: integer }
        has_planet:      { type: boolean }
        planet_name:     { type: string, nullable: true }
        has_moon:        { type: boolean }
        moon_name:       { type: string, nullable: true }
        owner_id:        { type: string, format: uuid, nullable: true }
        owner_username:  { type: string, nullable: true }
        debris_metal:    { type: integer, format: int64 }
        debris_silicon:  { type: integer, format: int64 }

    FleetDispatch:
      type: object
      required: [src_planet_id, dst, ships, speed_percent]
      properties:
        src_planet_id: { type: string, format: uuid }
        dst:           { $ref: "#/components/schemas/Coords" }
        ships:
          type: object
          additionalProperties: { type: integer, format: int64, minimum: 1 }
        carry_metal:    { type: integer, format: int64, minimum: 0 }
        carry_silicon:  { type: integer, format: int64, minimum: 0 }
        carry_hydrogen: { type: integer, format: int64, minimum: 0 }
        speed_percent:  { type: integer, minimum: 10, maximum: 100 }
        mission:        { type: integer, description: "6 = POSITION (rebase), 7 = TRANSPORT, 8 = COLONIZE, 9 = RECYCLING, 10 = ATTACK_SINGLE, 11 = SPY, 12 = ACS_ATTACK, 15 = EXPEDITION" }

    Coords:
      type: object
      required: [galaxy, system, position]
      properties:
        galaxy:   { type: integer, minimum: 1, maximum: 16 }
        system:   { type: integer, minimum: 1, maximum: 999 }
        position: { type: integer, minimum: 1, maximum: 15 }
        is_moon:  { type: boolean }

    Fleet:
      type: object
      properties:
        id:              { type: string, format: uuid }
        owner_user_id:   { type: string, format: uuid }
        src_planet_id:   { type: string, format: uuid }
        dst_galaxy:      { type: integer }
        dst_system:      { type: integer }
        dst_position:    { type: integer }
        dst_is_moon:     { type: boolean }
        mission:         { type: integer }
        state:           { type: string, enum: [outbound, hold, returning, done] }
        depart_at:       { type: string, format: date-time }
        arrive_at:       { type: string, format: date-time }
        return_at:       { type: string, format: date-time, nullable: true }
        carry:
          type: object
          properties:
            metal:    { type: integer, format: int64 }
            silicon:  { type: integer, format: int64 }
            hydrogen: { type: integer, format: int64 }
        speed_percent:   { type: integer }
        ships:
          type: object
          additionalProperties: { type: integer, format: int64 }

    Artefact:
      type: object
      properties:
        id:            { type: string, format: uuid }
        user_id:       { type: string, format: uuid }
        planet_id:     { type: string, format: uuid, nullable: true }
        unit_id:       { type: integer }
        state:         { type: string, enum: [held, delayed, active, expired, consumed] }
        acquired_at:   { type: string, format: date-time }
        activated_at:  { type: string, format: date-time, nullable: true }
        expire_at:     { type: string, format: date-time, nullable: true }

    BattleInput:
      type: object
      properties:
        seed:      { type: integer, format: int64 }
        rounds:    { type: integer }
        is_moon:   { type: boolean }
        attackers:
          type: array
          items: { $ref: "#/components/schemas/BattleSide" }
        defenders:
          type: array
          items: { $ref: "#/components/schemas/BattleSide" }

    BattleSide:
      type: object
      properties:
        user_id:  { type: string }
        username: { type: string }
        tech:
          type: object
          properties:
            gun:        { type: integer }
            shield:     { type: integer }
            shell:      { type: integer }
            ballistics: { type: integer }
            masking:    { type: integer }
        units:
          type: array
          items:
            type: object
            properties:
              unit_id:  { type: integer }
              quantity: { type: integer, format: int64 }
              front:    { type: integer }
              attack:   { type: array, items: { type: number } }
              shield:   { type: array, items: { type: number } }
              shell:    { type: number }

    Notepad:
      type: object
      required: [content, updated_at]
      properties:
        content:    { type: string, description: "текст блокнота (до 50 000 символов)" }
        updated_at: { type: string, description: "RFC3339 timestamp последнего обновления; пустая строка для пустого блокнота" }

    NotepadSaveRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          maxLength: 50000

    Message:
      type: object
      properties:
        id:               { type: string, format: uuid }
        from_user_id:     { type: string, format: uuid, nullable: true }
        from_username:    { type: string }
        subject:          { type: string }
        body:             { type: string }
        folder:           { type: integer }
        created_at:       { type: string, format: date-time }
        read_at:          { type: string, format: date-time, nullable: true }
        battle_report_id: { type: string, format: uuid, nullable: true }

    BattleReportFull:
      type: object
      properties:
        id:                { type: string, format: uuid }
        attacker_user_id:  { type: string, format: uuid, nullable: true }
        defender_user_id:  { type: string, format: uuid, nullable: true }
        planet_id:         { type: string, format: uuid, nullable: true }
        seed:              { type: integer, format: int64 }
        winner:            { type: string, enum: [attackers, defenders, draw] }
        rounds:            { type: integer }
        debris_metal:      { type: integer, format: int64 }
        debris_silicon:    { type: integer, format: int64 }
        loot_metal:        { type: integer, format: int64 }
        loot_silicon:      { type: integer, format: int64 }
        loot_hydrogen:     { type: integer, format: int64 }
        at:                { type: string, format: date-time }
        report:            { type: object, description: "полный battle.Report как JSON" }

    BattleReport:
      type: object
      properties:
        seed:   { type: integer, format: int64 }
        winner: { type: string, enum: [attackers, defenders, draw] }
        rounds: { type: integer }

    SimStats:
      type: object
      properties:
        num_sim:    { type: integer }
        win_rate:   { type: number, description: "доля побед атакующих 0..1" }
        draw_rate:  { type: number }
        avg_rounds: { type: number }

    AchievementEntry:
      type: object
      properties:
        key:         { type: string }
        title:       { type: string }
        description: { type: string }
        points:      { type: integer }
        category:    { type: string, enum: [passive, starter] }
        unlocked_at: { type: string, format: date-time, nullable: true }

    Officer:
      type: object
      required: [key, title, description, duration_days, cost_credit]
      properties:
        key:           { type: string }
        title:         { type: string }
        description:   { type: string }
        duration_days: { type: integer }
        cost_credit:   { type: integer, format: int64 }
        effect:
          type: object
          additionalProperties: { type: number }
          nullable: true
          description: ключ эффекта → множитель (produce_factor=1.2 и т.п.)
        activated_at:  { type: string, format: date-time, nullable: true }
        expires_at:    { type: string, format: date-time, nullable: true }

    MarketRates:
      type: object
      properties:
        metal:     { type: number }
        silicon:   { type: number }
        hydrogen:  { type: number }
        user_rate: { type: number }

    ExchangeResult:
      type: object
      properties:
        from:        { type: string }
        to:          { type: string }
        from_amount: { type: integer, format: int64 }
        to_amount:   { type: integer, format: int64 }
        rate:        { type: number }

    HighscoreEntry:
      type: object
      properties:
        user_id:  { type: string, format: uuid }
        username: { type: string }
        score:    { type: integer, format: int64 }
        rank:     { type: integer }

    # ----- Techtree (план 72 Ф.4 Spring 3) -----
    Techtree:
      type: object
      properties:
        nodes:
          type: array
          items: { $ref: "#/components/schemas/TechtreeNode" }

    TechtreeNode:
      type: object
      properties:
        key:           { type: string }
        kind:          { type: string, enum: [building, research, ship, defense] }
        id:            { type: integer }
        current_level: { type: integer }
        unlocked:      { type: boolean }
        requirements:
          type: array
          items: { $ref: "#/components/schemas/TechtreeRequirement" }

    TechtreeRequirement:
      type: object
      properties:
        kind:  { type: string, enum: [building, research] }
        key:   { type: string }
        level: { type: integer }
        have:  { type: integer }
        met:   { type: boolean }

    # ----- Records (план 72 Ф.4 Spring 3) -----
    RecordEntry:
      type: object
      properties:
        category:    { type: string, enum: [building, research, ship, defense, score] }
        key:         { type: string }
        unit_id:     { type: integer }
        holder_id:   { type: string, format: uuid }
        holder_name: { type: string }
        value:       { type: number, format: double }
        my_value:    { type: number, format: double }

    # ----- Catalog (план 72 Ф.4 Spring 3) -----
    ResCost:
      type: object
      properties:
        metal:    { type: integer, format: int64 }
        silicon:  { type: integer, format: int64 }
        hydrogen: { type: integer, format: int64 }

    BuildingCatalogEntry:
      type: object
      properties:
        id:               { type: integer }
        key:              { type: string }
        name:             { type: string }
        cost_base:        { $ref: "#/components/schemas/ResCost" }
        cost_factor:      { type: number, format: double }
        time_base_seconds: { type: integer }
        base_rate_per_hour:    { type: number, format: double, nullable: true }
        energy_per_level:      { type: number, format: double, nullable: true }
        energy_output_per_level: { type: number, format: double, nullable: true }
        capacity_base:    { type: integer, format: int64, nullable: true }
        moon_only:        { type: boolean }
        max_level:        { type: integer }
        preview:
          type: array
          items: { $ref: "#/components/schemas/BuildingPreviewRow" }

    BuildingPreviewRow:
      type: object
      properties:
        level:               { type: integer }
        cost:                { $ref: "#/components/schemas/ResCost" }
        build_seconds:       { type: integer }
        production_per_hour: { type: number, format: double }
        energy_demand:       { type: number, format: double }
        energy_output:       { type: number, format: double }

    UnitCatalogEntry:
      type: object
      properties:
        id:          { type: integer }
        key:         { type: string }
        name:        { type: string }
        kind:        { type: string, enum: [ship, defense, research] }
        cost:        { $ref: "#/components/schemas/ResCost" }
        cost_factor: { type: number, format: double, nullable: true }
        attack:      { type: integer, nullable: true }
        shield:      { type: integer, nullable: true }
        shell:       { type: integer, nullable: true }
        cargo:       { type: integer, format: int64, nullable: true }
        speed:       { type: integer, nullable: true }
        fuel:        { type: integer, nullable: true }
        front:       { type: integer, nullable: true }
        rapidfire:
          type: array
          items: { $ref: "#/components/schemas/RapidfireEntry" }
        preview:
          type: array
          items: { $ref: "#/components/schemas/ResearchPreviewRow" }

    RapidfireEntry:
      type: object
      properties:
        target_id:  { type: integer }
        multiplier: { type: integer }

    ResearchPreviewRow:
      type: object
      properties:
        level: { type: integer }
        cost:  { $ref: "#/components/schemas/ResCost" }

    ArtefactCatalogEntry:
      type: object
      properties:
        id:               { type: integer }
        key:              { type: string }
        name:             { type: string }
        effect:           { $ref: "#/components/schemas/ArtefactEffect" }
        stackable:        { type: boolean }
        max_stacks:       { type: integer }
        lifetime_seconds: { type: integer }
        delay_seconds:    { type: integer }

    ArtefactEffect:
      type: object
      properties:
        type:           { type: string }
        field:          { type: string }
        op:             { type: string }
        value:          { type: number, format: double }
        active_value:   { type: number, format: double }
        inactive_value: { type: number, format: double }
        battle_attack:  { type: number, format: double }
        battle_shield:  { type: number, format: double }
        battle_shell:   { type: number, format: double }

    Alliance:
      type: object
      properties:
        id:           { type: string, format: uuid }
        tag:          { type: string }
        name:         { type: string }
        description:  { type: string }
        owner_id:     { type: string, format: uuid }
        member_count: { type: integer }
        created_at:   { type: string, format: date-time }

    AllianceMember:
      type: object
      properties:
        user_id:   { type: string, format: uuid }
        username:  { type: string }
        rank:      { type: string }
        joined_at: { type: string, format: date-time }

    AllianceDetail:
      type: object
      properties:
        alliance: { $ref: "#/components/schemas/Alliance" }
        members:
          type: array
          items: { $ref: "#/components/schemas/AllianceMember" }

    # План 67 Ф.2: расширенные схемы.
    AllianceDescriptionView:
      type: object
      description: |
        3 описания + legacy + контекст вьюера. internal/apply пустые
        для outsider'а; apply пустой для не-applicant'а.
      properties:
        description_external: { type: string }
        description_internal: { type: string }
        description_apply:    { type: string }
        description:          { type: string, description: "legacy alliances.description" }
        viewer:
          type: string
          enum: [member, applicant, outsider]

    AlliancePermissions:
      type: object
      description: |
        Карта permission→bool. Поддерживаемые ключи (snake_case):
        can_invite, can_kick, can_send_global_mail, can_manage_diplomacy,
        can_change_description, can_propose_relations, can_manage_ranks.
        Отсутствующий ключ трактуется как false.
      additionalProperties: { type: boolean }

    AllianceRank:
      type: object
      properties:
        id:          { type: string, format: uuid }
        alliance_id: { type: string, format: uuid }
        name:        { type: string }
        position:    { type: integer }
        permissions: { $ref: "#/components/schemas/AlliancePermissions" }
        created_at:  { type: string, format: date-time }

    AllianceAuditEntry:
      type: object
      properties:
        id:          { type: string, format: uuid }
        alliance_id: { type: string, format: uuid }
        actor_id:    { type: string, description: "пустая строка если NULL (системное действие)" }
        actor_name:  { type: string }
        action:
          type: string
          description: |
            Имя действия в snake_case. Известные значения:
            alliance_created, alliance_disbanded, description_changed,
            member_joined, member_left, member_kicked,
            member_rank_assigned, rank_created, rank_updated,
            rank_deleted, application_approved, application_rejected,
            relation_proposed, relation_accepted, relation_rejected,
            relation_cleared, leadership_transferred, open_changed.
        target_kind: { type: string }
        target_id:   { type: string }
        payload:     { type: object, additionalProperties: true }
        created_at:  { type: string, format: date-time }

    # AllianceTransferCodeIssued — ответ POST /transfer-leadership/code (план 67 Ф.3).
    AllianceTransferCodeIssued:
      type: object
      required: [expires_at, ttl_seconds]
      properties:
        expires_at:  { type: string, format: date-time }
        ttl_seconds: { type: integer, description: "TTL кода в секундах (10 мин)" }

    # AllianceRelation — расширенный enum (план 67 Ф.2, D-014).
    AllianceRelation:
      type: string
      enum: [friend, neutral, hostile_neutral, nap, war]
      description: |
        friend (был ally, мигрирован 0077), neutral, hostile_neutral
        (атаковать без объявления войны), nap, war.

    AdminUserRow:
      type: object
      properties:
        id:           { type: string, format: uuid }
        username:     { type: string }
        email:        { type: string, format: email }
        role:         { type: string, enum: [player, support, admin, superadmin] }
        credit:       { type: integer, format: int64 }
        banned_at:    { type: string, format: date-time, nullable: true }
        created_at:   { type: string, format: date-time }
        last_seen_at: { type: string, format: date-time }

    ResourceBuilding:
      type: object
      properties:
        unit_id:     { type: integer }
        name:        { type: string }
        level:       { type: integer }
        prod_metal:  { type: number }
        prod_silicon: { type: number }
        prod_hydrogen: { type: number }
        cons_energy: { type: number }
        factor:      { type: integer, minimum: 0, maximum: 100 }
        allow_factor: { type: boolean }

    ResourceReport:
      type: object
      properties:
        planet_id:     { type: string, format: uuid }
        planet_name:   { type: string }
        buildings:
          type: array
          items: { $ref: "#/components/schemas/ResourceBuilding" }
        basic_metal:   { type: number }
        basic_silicon: { type: number }
        basic_hydrogen: { type: number }
        storage_metal:  { type: number }
        storage_silicon: { type: number }
        storage_hydrogen: { type: number }
        metal_total:   { type: number }
        silicon_total: { type: number }
        hydrogen_total: { type: number }
        metal_per_hour: { type: number }
        silicon_per_hour: { type: number }
        hydrogen_per_hour: { type: number }
        metal_per_day:  { type: number }
        silicon_per_day: { type: number }
        hydrogen_per_day: { type: number }
        metal_per_week: { type: number }
        silicon_per_week: { type: number }
        hydrogen_per_week: { type: number }

    ArtMarketOffer:
      type: object
      properties:
        id:         { type: string, format: uuid }
        seller_id:  { type: string, format: uuid }
        unit_id:    { type: integer }
        price:      { type: integer, format: int64 }
        created_at: { type: string, format: date-time }

    CreditPackage:
      type: object
      properties:
        key:           { type: string }
        label:         { type: string }
        credits:       { type: integer }
        bonus_credits: { type: integer }
        total_credits: { type: integer }
        price_rub:     { type: number }

    CreateOrderRequest:
      type: object
      required: [package_key]
      properties:
        package_key: { type: string }

    CreateOrderResponse:
      type: object
      properties:
        order_id: { type: string }
        pay_url:  { type: string, format: uri }

    Purchase:
      type: object
      properties:
        id:            { type: string }
        package_key:   { type: string }
        package_label: { type: string }
        credits:       { type: integer }
        price_rub:     { type: number }
        status:        { type: string, enum: [pending, paid, failed, refunded] }
        created_at:    { type: string, format: date-time }
        paid_at:       { type: string, format: date-time, nullable: true }

    # Биржа артефактов (план 68).
    ExchangeLot:
      type: object
      required:
        - id
        - seller_user_id
        - artifact_unit_id
        - quantity
        - price_oxsarit
        - status
        - created_at
        - expires_at
      properties:
        id:               { type: string, format: uuid }
        seller_user_id:   { type: string, format: uuid }
        seller_username:  { type: string, nullable: true }
        artifact_unit_id: { type: integer }
        quantity:         { type: integer }
        price_oxsarit:
          type: integer
          format: int64
          description: цена за весь лот (целые оксариты)
        unit_price_oxsarit:
          type: integer
          format: int64
          description: price_oxsarit / quantity (для UI; backend отдаёт)
        status:
          type: string
          enum: [active, sold, cancelled, expired]
        created_at: { type: string, format: date-time }
        expires_at: { type: string, format: date-time }
        buyer_user_id:
          type: string
          format: uuid
          nullable: true
        sold_at:
          type: string
          format: date-time
          nullable: true

    # =====================================================================
    # Spring 4 (план 72 Ф.5) — DTO communication / settings / utilities
    # =====================================================================

    Friend:
      type: object
      required: [user_id, username, points]
      properties:
        user_id:      { type: string, format: uuid }
        username:     { type: string }
        points:       { type: number, format: double }
        last_seen:    { type: string, format: date-time, nullable: true }
        alliance_tag: { type: string, nullable: true }

    ChatMessage:
      type: object
      required: [id, channel, author_id, body, created_at]
      properties:
        id:          { type: string, format: uuid }
        channel:     { type: string, description: "global или ally:<alliance_id>" }
        author_id:   { type: string, format: uuid }
        author_name: { type: string }
        body:        { type: string, maxLength: 500 }
        created_at:  { type: string, format: date-time }
        edited_at:   { type: string, format: date-time, nullable: true }
        kind:
          type: string
          enum: [msg, edit, delete]
          description: тип события WS-broadcast (msg=новое, edit=правка, delete=soft-delete)

    ChatUnread:
      type: object
      required: [channel, unread]
      properties:
        channel:      { type: string }
        unread:       { type: integer, format: int64 }
        last_read_at: { type: string, format: date-time, nullable: true }

    SearchPlayer:
      type: object
      required: [user_id, username, points]
      properties:
        user_id:      { type: string, format: uuid }
        username:     { type: string }
        alliance_tag: { type: string, nullable: true }
        points:       { type: number, format: double }

    SearchAlliance:
      type: object
      required: [tag, name, members, points]
      properties:
        tag:     { type: string }
        name:    { type: string }
        members: { type: integer }
        points:  { type: number, format: double }

    SearchPlanet:
      type: object
      required: [planet_id, name, galaxy, system, position, owner]
      properties:
        planet_id: { type: string, format: uuid }
        name:      { type: string }
        galaxy:    { type: integer }
        system:    { type: integer }
        position:  { type: integer }
        owner:     { type: string }

    SearchResults:
      type: object
      required: [players, alliances, planets]
      properties:
        players:   { type: array, items: { $ref: "#/components/schemas/SearchPlayer" } }
        alliances: { type: array, items: { $ref: "#/components/schemas/SearchAlliance" } }
        planets:   { type: array, items: { $ref: "#/components/schemas/SearchPlanet" } }

    Profession:
      type: object
      required: [key, label]
      properties:
        key:   { type: string }
        label: { type: string }
        bonus:
          type: object
          additionalProperties: { type: integer }
          description: ключ техн. бонуса → дельта уровня (например, metalmine=+5)
        malus:
          type: object
          additionalProperties: { type: integer }
          description: ключ штрафа → отрицательная дельта уровня

    ProfessionInfo:
      type: object
      required: [profession]
      properties:
        profession:           { type: string, description: "текущая профессия игрока (none = без профессии)" }
        label:                { type: string }
        next_change_allowed:  { type: string, format: date-time, nullable: true, description: дата когда снова доступна смена }

    Settings:
      type: object
      required: [email, language, timezone]
      properties:
        email:          { type: string, format: email }
        language:       { type: string, enum: [ru, en] }
        timezone:       { type: string }
        vacation_since: { type: string, format: date-time, nullable: true }

