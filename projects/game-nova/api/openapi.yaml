                  online_now:
                    type: integer
                    description: Игроки активные в последние 5 минут
                  online_24h:
                    type: integer
                    description: Игроки заходившие за последние 24 часа

  /api/techtree:
    get:
      tags: [score]
      security: [{ bearerAuth: [] }]
      summary: Дерево требований юнитов/зданий/исследований с прогрессом игрока.
      description: |
        Возвращает все известные nodes (buildings + research + ships +
        defense) с их requirements и текущими уровнями игрока.
        Используется origin-фронтом (план 72 Ф.4 S-021 Techtree) и
        nova-фронтом (общий wiki/tree view).
      parameters:
        - in: query
          name: planet_id
          required: false
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Techtree" }

  /api/records:
    get:
      tags: [score]
      security: [{ bearerAuth: [] }]
      summary: Рекорды сервера — топ-1 по каждой категории.
      description: |
        Для каждого здания/исследования/корабля/обороны возвращает
        держателя рекорда (max level / max count) и значение игрока.
        Плюс top-1 по очкам. Используется origin-фронтом (план 72
        Ф.4 S-024).
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  records:
                    type: array
                    items: { $ref: "#/components/schemas/RecordEntry" }

  /api/buildings/catalog/{type}:
    get:
