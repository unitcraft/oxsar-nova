        - in: path
          name: fleet_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: флот переведён в returning
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Fleet" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "429":
          description: admin rate limit exceeded

  /api/admin/planets/{id}/rename:
