openapi: 3.1.0
info:
  title: oxsar-nova API
  version: 0.1.0
  description: |
    REST API for oxsar-nova. Источник истины для клиентских типов —
    TS-клиент генерируется из этого файла (см. CLAUDE.md).

servers:
  - url: http://localhost:8080
    description: local dev

tags:
  - name: auth
  - name: planets
  - name: buildings
  - name: research
  - name: shipyard
  - name: repair
  - name: artefacts
  - name: artmarket
  - name: galaxy
  - name: fleet
  - name: battle
  - name: messages
  - name: notepad
  - name: achievements
  - name: officers
  - name: market
  - name: rockets
  - name: score
  - name: alliances
  - name: admin
  - name: i18n
  - name: payment
  - name: alien
  - name: system

paths:
  /healthz:
    get:
      tags: [system]
      summary: Liveness probe
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Status" }

  /api/auth/register:
    post:
      tags: [auth]
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegisterRequest" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }
        "409": { $ref: "#/components/responses/Conflict" }
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/auth/login:
    post:
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/auth/refresh:
    post:
      tags: [auth]
      summary: Refresh tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh]
              properties:
                refresh: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }

  /api/planets:
    get:
      tags: [planets]
      security: [{ bearerAuth: [] }]
      summary: List my planets
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  planets:
                    type: array
                    items: { $ref: "#/components/schemas/Planet" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/planets/{id}:
    get:
      tags: [planets]
      security: [{ bearerAuth: [] }]
      summary: Get planet by id
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Planet" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [planets]
      security: [{ bearerAuth: [] }]
      summary: Rename planet
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, minLength: 1, maxLength: 50 }
      responses:
        "200":
          description: renamed
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [planets]
      security: [{ bearerAuth: [] }]
      summary: Abandon planet (soft-delete)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: abandoned
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/planets/{id}/set-home:
    post:
      tags: [planets]
      security: [{ bearerAuth: [] }]
      summary: Set planet as home planet
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: home set
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/planets/{id}/teleport:
    post:
      tags: [planets]
      security: [{ bearerAuth: [] }]
      summary: Teleport planet to new coordinates (premium, paid in oxsars)
      description: |
        План 65 Ф.6 (D-032+U-009). Премиум-фича: платный телепорт планеты на
        новые координаты в той же вселенной. Стоимость в оксарах списывается
        через billing-service. Cooldown по `users.last_planet_teleport_at`
        (24 часа по умолчанию). Координаты валидируются по CHECK-ограничениям
        `planets.coords_range` (galaxy 1..16, system 1..999, position 1..15).
        Артефактный гейтинг легаси (ARTEFACT_PLANET_TELEPORTER) в nova не
        реализован — только оплата.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
        - in: header
          name: Idempotency-Key
          required: true
          schema: { type: string, minLength: 8, maxLength: 128 }
          description: Уникальный ключ для дедупа повторов запроса (RFC Idempotency-Key, R9).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [target_galaxy, target_system, target_position]
              properties:
                target_galaxy:   { type: integer, minimum: 1, maximum: 16 }
                target_system:   { type: integer, minimum: 1, maximum: 999 }
                target_position: { type: integer, minimum: 1, maximum: 15 }
      responses:
        "200":
          description: Telepport scheduled
          content:
            application/json:
              schema:
                type: object
                required: [event_id, fire_at, cost_oxsars]
                properties:
                  event_id:    { type: string, format: uuid }
                  fire_at:     { type: string, format: date-time }
                  cost_oxsars: { type: integer, format: int64, minimum: 0 }
        "400":
          description: Invalid coordinates or cooldown still active
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "402":
          description: Insufficient oxsars to pay teleport cost
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Target slot occupied or Idempotency-Key conflict
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "503":
          description: Billing service unavailable
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /api/planets/{id}/resource-report:
    get:
      tags: [planets]
      security: [{ bearerAuth: [] }]
      summary: Get resource production report for a planet
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: resource report
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ResourceReport" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/planets/{id}/resource-update:
    post:
      tags: [planets]
      security: [{ bearerAuth: [] }]
      summary: Update building production factors
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [factors]
              properties:
                factors:
                  type: object
                  additionalProperties:
                    type: integer
                    minimum: 0
                    maximum: 100
                  description: Map of unit_id to production factor (0-100%)
      responses:
        "200":
          description: updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/planets/{id}/buildings:
    get:
      tags: [buildings]
      security: [{ bearerAuth: [] }]
      summary: Levels + next-level cost/time + unmet requirements per planet
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  levels:
                    type: object
                    additionalProperties: { type: integer }
                  build_seconds:
                    type: object
                    additionalProperties: { type: integer }
                  build_costs:
                    type: object
                    additionalProperties: { $ref: "#/components/schemas/ResCost" }
                  requirements_unmet:
                    type: object
                    additionalProperties:
                      type: array
                      items:
                        type: object
                        properties:
                          unit_id:        { type: integer }
                          required_level: { type: integer }
                          actual_level:   { type: integer }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [buildings]
      security: [{ bearerAuth: [] }]
      summary: Enqueue a building upgrade
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [unit_id]
              properties:
                unit_id: { type: integer, minimum: 1 }
      responses:
        "201":
          description: queued
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QueueItem" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }

  /api/planets/{id}/buildings/queue:
    get:
      tags: [buildings]
      security: [{ bearerAuth: [] }]
      summary: List building queue
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  queue:
                    type: array
                    items: { $ref: "#/components/schemas/QueueItem" }

  /api/planets/{id}/buildings/queue/{taskId}:
    delete:
      tags: [buildings]
      security: [{ bearerAuth: [] }]
      summary: Cancel queued building
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
        - in: path
          name: taskId
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: cancelled }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/planets/{id}/research:
    post:
      tags: [research]
      security: [{ bearerAuth: [] }]
      summary: Start a research on a planet
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [unit_id]
              properties:
                unit_id: { type: integer }
      responses:
        "201":
          description: queued
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QueueItem" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }

  /api/users/me/battles:
    get:
      tags: [battle]
      security: [{ bearerAuth: [] }]
      summary: |
        Список боёв текущего юзера (план 72.1 ч.20.8 — battle viewer).
        Cursor-paginated по полю `at` (timestamp последнего боя).
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
        - in: query
          name: cursor
          schema: { type: string, format: date-time, description: "RFC3339 timestamp последнего боя" }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  battles:
                    type: array
                    items:
                      type: object
                      properties:
                        id:                { type: string, format: uuid }
                        attacker_user_id:  { type: string, format: uuid, nullable: true }
                        defender_user_id:  { type: string, format: uuid, nullable: true }
                        winner:            { type: string, enum: [attackers, defenders, draw] }
                        rounds:            { type: integer }
                        debris_metal:      { type: integer, format: int64 }
                        debris_silicon:    { type: integer, format: int64 }
                        loot_metal:        { type: integer, format: int64 }
                        loot_silicon:      { type: integer, format: int64 }
                        loot_hydrogen:     { type: integer, format: int64 }
                        is_attacker:       { type: boolean }
                        at:                { type: string, format: date-time }
                  next_cursor: { type: string, format: date-time, nullable: true }

  /api/battle-reports/{id}:
    get:
      tags: [battle]
      security: []
      summary: |
        Публичный анонимный endpoint для просмотра отчёта по uuid
        (план 72.1 ч.20.11). Любой пользователь по ссылке может
        посмотреть результат боя или симуляции — permission check
        снят, отчёты идентифицируются непредсказуемым UUID v7.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  report: { type: object, description: "battle.Report JSON" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/simulator/run:
    post:
      tags: [simulator]
      security: [{ bearerAuth: [] }]
      summary: |
        Боевой симулятор (план 72.1 ч.20.7+20.11). Сохраняет результат
        в battle_reports (is_simulation=true) и возвращает {id, report}.
        Frontend перенаправляет на /battle-report/{id} (публичный URL,
        можно отправить кому угодно).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [attackers, defenders]
              properties:
                seed:      { type: integer, format: int64, description: "PRNG seed (0 = random)" }
                rounds:    { type: integer, description: "Max rounds (default 6)" }
                num_sim:   { type: integer, description: "Multi-run statistics (2..100)" }
                is_moon:   { type: boolean }
                attackers: { type: array, items: { type: object } }
                defenders: { type: array, items: { type: object } }
                rapidfire: { type: object }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:     { type: string, format: uuid, description: "UUID для /battle-report/{id}" }
                  report: { type: object, description: "battle.Report JSON" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/research:
    get:
      tags: [research]
      security: [{ bearerAuth: [] }]
      summary: List my research (queue + levels + next-level cost/time)
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  queue:
                    type: array
                    items: { $ref: "#/components/schemas/QueueItem" }
                  levels:
                    type: object
                    additionalProperties: { type: integer }
                  research_seconds:
                    type: object
                    description: Время следующего уровня каждой технологии (секунды)
                    additionalProperties: { type: integer }
                  research_costs:
                    type: object
                    description: Стоимость следующего уровня (металл/кремний/водород)
                    additionalProperties: { $ref: "#/components/schemas/ResCost" }

  /api/planets/{id}/shipyard:
    post:
      tags: [shipyard]
      security: [{ bearerAuth: [] }]
      summary: Build ships or defense
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [unit_id, count]
              properties:
                unit_id: { type: integer }
                count:   { type: integer, format: int64, minimum: 1 }
      responses:
        "201":
          description: queued
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ShipyardQueueItem" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/planets/{id}/shipyard/queue:
    get:
      tags: [shipyard]
      security: [{ bearerAuth: [] }]
      summary: Shipyard queue on a planet
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  queue:
                    type: array
                    items: { $ref: "#/components/schemas/ShipyardQueueItem" }

  /api/planets/{id}/shipyard/inventory:
    get:
      tags: [shipyard]
      security: [{ bearerAuth: [] }]
      summary: Ships & defense inventory + per-unit cost & build time
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  ships:   { type: object, additionalProperties: { type: integer, format: int64 } }
                  defense: { type: object, additionalProperties: { type: integer, format: int64 } }
                  ship_costs:
                    type: object
                    description: Per-unit стоимость кораблей (металл/кремний/водород)
                    additionalProperties: { $ref: "#/components/schemas/ResCost" }
                  defense_costs:
                    type: object
                    description: Per-unit стоимость обороны
                    additionalProperties: { $ref: "#/components/schemas/ResCost" }
                  ship_seconds:
                    type: object
                    description: Per-unit время постройки корабля (секунды)
                    additionalProperties: { type: integer }
                  defense_seconds:
                    type: object
                    description: Per-unit время постройки обороны
                    additionalProperties: { type: integer }

  /api/planets/{id}/repair/disassemble:
    post:
      tags: [repair]
      security: [{ bearerAuth: [] }]
      summary: |
        Enqueue a batch disassembly of healthy units. Charges required
        cost and subtracts units up-front; returns cost is credited when
        the event fires (see DisassembleHandler).
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [unit_id, count]
              properties:
                unit_id: { type: integer }
                count:   { type: integer, format: int64, minimum: 1 }
      responses:
        "201":
          description: queued
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RepairQueueItem" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/planets/{id}/repair/repair:
    post:
      tags: [repair]
      security: [{ bearerAuth: [] }]
      summary: |
        Enqueue repair of all damaged ships of one unit_id. Cost scales
        with remaining shell_percent (more damaged = cheaper to repair,
        less damaged = more expensive in legacy formula).
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [unit_id]
              properties:
                unit_id: { type: integer }
      responses:
        "201":
          description: queued
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RepairQueueItem" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/planets/{id}/repair/damaged:
    get:
      tags: [repair]
      security: [{ bearerAuth: [] }]
      summary: Damaged ships on a planet (ships.damaged_count > 0)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  damaged:
                    type: array
                    items:
                      type: object
                      properties:
                        unit_id:       { type: integer }
                        count:         { type: integer, format: int64 }
                        damaged:       { type: integer, format: int64 }
                        shell_percent: { type: number }

  /api/planets/{id}/repair/queue:
    get:
      tags: [repair]
      security: [{ bearerAuth: [] }]
      summary: Active repair/disassemble queue on a planet
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  queue:
                    type: array
                    items: { $ref: "#/components/schemas/RepairQueueItem" }

  /api/artefacts:
    get:
      tags: [artefacts]
      security: [{ bearerAuth: [] }]
      summary: List my artefacts
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  artefacts:
                    type: array
                    items: { $ref: "#/components/schemas/Artefact" }

  /api/artefacts/{id}/activate:
    post:
      tags: [artefacts]
      security: [{ bearerAuth: [] }]
      summary: Activate an artefact from inventory
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Artefact" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /api/artefacts/{id}/deactivate:
    post:
      tags: [artefacts]
      security: [{ bearerAuth: [] }]
      summary: Deactivate an active artefact (revert its effect)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: deactivated }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/galaxy/{g}/{s}:
    get:
      tags: [galaxy]
      security: [{ bearerAuth: [] }]
      summary: Read a system (15 positions, planets/moons/debris)
      parameters:
        - in: path
          name: g
          required: true
          schema: { type: integer, minimum: 1, maximum: 16 }
        - in: path
          name: s
          required: true
          schema: { type: integer, minimum: 1, maximum: 999 }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SystemView" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/fleet:
    get:
      tags: [fleet]
      security: [{ bearerAuth: [] }]
      summary: List active fleets of the current user
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  fleets:
                    type: array
                    items: { $ref: "#/components/schemas/Fleet" }
                  slots_used:
                    type: integer
                    description: |
                      Количество флотов, занимающих слот (state=outbound,
                      mission NOT IN expedition/artefact-delivery).
                  slots_max:
                    type: integer
                    description: |
                      Максимум слотов = 1 + floor(computer_tech / 6).
                      Legacy: NS.class.php:1871.
    post:
      tags: [fleet]
      security: [{ bearerAuth: [] }]
      summary: Dispatch a fleet (v1 = TRANSPORT only, mission=7)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/FleetDispatch" }
      responses:
        "201":
          description: dispatched
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Fleet" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: |
            Нет свободных слотов флота (план 20 Ф.2).
            Максимум = 1 + floor(computer_tech / 6).

  /api/fleet/{id}/recall:
    post:
      tags: [fleet]
      security: [{ bearerAuth: [] }]
      summary: |
        Recall a fleet while it is still outbound. Works only for
        state=outbound; any other state → 409 Conflict. Cargo stays
        on board and is refunded back to the source planet together
        with the ships by the return handler.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: returning
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Fleet" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /api/stargate:
    post:
      tags: [fleet]
      security: [{ bearerAuth: [] }]
      summary: |
        Stargate Jump (план 20 Ф.5) — мгновенный прыжок флота между
        лунами игрока (или союзника NAP/ALLY). Обе луны должны иметь
        здание star_gate >= 1. Cooldown на источнике: 3600 × 0.7^(level-1)
        секунд. Запрещены щиты и ракеты. Источник должен быть с
        position >= 3.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [src_planet_id, dst_planet_id, ships]
              properties:
                src_planet_id: { type: string, format: uuid }
                dst_planet_id: { type: string, format: uuid }
                ships:
                  type: object
                  additionalProperties: { type: integer }
      responses:
        "200":
          description: jumped
          content:
            application/json:
              schema:
                type: object
                properties:
                  jumped_at:    { type: string, format: date-time }
                  next_jump_at: { type: string, format: date-time }
                  cooldown_sec: { type: integer }
                  ships:
                    type: object
                    additionalProperties: { type: integer }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: cooldown active or not enough ships

  /api/phalanx:
    get:
      tags: [fleet]
      security: [{ bearerAuth: [] }]
      summary: |
        Сенсорная Фаланга (план 20 Ф.4) — скан системы. Источник —
        луна игрока с зданием star_surveillance (id=55).
        Списывает 5000 единиц водорода.
        Формула радиуса: round((level^2 - 1) * (1 + hyperspace_tech / 10))
        систем в той же галактике.
      parameters:
        - in: query
          name: source_planet_id
          required: true
          schema: { type: string, format: uuid }
        - in: query
          name: target_galaxy
          required: true
          schema: { type: integer }
        - in: query
          name: target_system
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  scans:
                    type: array
                    items:
                      type: object
                      properties:
                        fleet_id: { type: string, format: uuid }
                        owner_id: { type: string, format: uuid }
                        owner_name: { type: string }
                        mission: { type: integer }
                        state: { type: string, enum: [outbound, returning] }
                        src_galaxy: { type: integer }
                        src_system: { type: integer }
                        src_position: { type: integer }
                        dst_galaxy: { type: integer }
                        dst_system: { type: integer }
                        dst_position: { type: integer }
                        dst_is_moon: { type: boolean }
                        depart_at: { type: string, format: date-time }
                        arrive_at: { type: string, format: date-time }
                        return_at: { type: string, format: date-time }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "409":
          description: Not enough hydrogen (5000 required) or target out of scan range.

  /api/daily-quests:
    get:
      tags: [daily-quest]
      security: [{ bearerAuth: [] }]
      summary: |
        Список ежедневных заданий игрока на сегодня (план 17 D).
        При первом запросе в новый день quest'ы генерируются lazy
        (3 случайных из daily_quest_defs с учётом веса).
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  quests:
                    type: array
                    items:
                      type: object
                      properties:
                        def_id:          { type: integer }
                        key:             { type: string }
                        title:           { type: string }
                        condition_type:  { type: string }
                        target_progress: { type: integer }
                        progress:        { type: integer }
                        reward_credits:  { type: integer }
                        reward_metal:    { type: integer, format: int64 }
                        reward_silicon:  { type: integer, format: int64 }
                        reward_hydrogen: { type: integer, format: int64 }
                        date:            { type: string, format: date }
                        completed:       { type: boolean }
                        claimed:         { type: boolean }

  /api/daily-quests/{id}/claim:
    post:
      tags: [daily-quest]
      security: [{ bearerAuth: [] }]
      summary: Забрать награду за completed quest.
      parameters:
        - in: path
          name: id
          required: true
          description: def_id quest'а
          schema: { type: integer }
      responses:
        "200":
          description: награда выдана
          content:
            application/json:
              schema:
                type: object
                properties:
                  reward_credits:  { type: integer }
                  reward_metal:    { type: integer, format: int64 }
                  reward_silicon:  { type: integer, format: int64 }
                  reward_hydrogen: { type: integer, format: int64 }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: quest не выполнен или награда уже получена

  /api/galaxy-event:
    get:
      tags: [galaxy-event]
      security: [{ bearerAuth: [] }]
      summary: |
        Текущее активное галактическое событие (план 17 F). 204 No Content
        если активного события нет.
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:         { type: integer, format: int64 }
                  kind:       { type: string }
                  started_at: { type: string, format: date-time }
                  ends_at:    { type: string, format: date-time }
                  params:     { type: object }
        "204": { description: no active event }

  /api/admin/galaxy-events:
    post:
      tags: [admin]
      summary: Создать галактическое событие (план 17 F).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [kind, duration_hours]
              properties:
                kind:           { type: string, example: meteor_storm }
                duration_hours: { type: integer, minimum: 1, maximum: 168 }
                params:         { type: object, example: { metal_mult: 1.3 } }
      responses:
        "201":
          description: created
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/admin/galaxy-events/{id}:
    delete:
      tags: [admin]
      summary: Преждевременно завершить галактическое событие.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "204": { description: cancelled }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/wiki:
    get:
      tags: [wiki]
      summary: Список категорий вики (план 19).
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  categories:
                    type: array
                    items:
                      type: object
                      properties:
                        key:   { type: string }
                        title: { type: string }
                        order: { type: integer }

  /api/wiki/{category}:
    get:
      tags: [wiki]
      summary: Список страниц внутри категории.
      parameters:
        - in: path
          name: category
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
        "404": { $ref: "#/components/responses/NotFound" }

  /api/wiki/{category}/{slug}:
    get:
      tags: [wiki]
      summary: Содержимое статьи (markdown + frontmatter).
      parameters:
        - in: path
          name: category
          required: true
          schema: { type: string }
        - in: path
          name: slug
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  path:        { type: string }
                  frontmatter: { type: object, additionalProperties: { type: string } }
                  markdown:    { type: string }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/messages:
    get:
      tags: [messages]
      security: [{ bearerAuth: [] }]
      summary: Inbox — последние 100 сообщений, новые сверху.
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items: { $ref: "#/components/schemas/Message" }
    post:
      tags: [messages]
      security: [{ bearerAuth: [] }]
      summary: Отправить сообщение игроку.
      description: |
        Backend ожидает поле `to` (username получателя), не user_id.
        План 72 Ф.5 Spring 4 — корректирует прошлую документацию,
        в которой ошибочно стояло to_username.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to, subject, body]
              properties:
                to:      { type: string, description: username получателя }
                subject: { type: string, maxLength: 50 }
                body:    { type: string }
      responses:
        "204": { description: sent }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [messages]
      security: [{ bearerAuth: [] }]
      summary: Удалить все сообщения inbox.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "204": { description: deleted }

  /api/messages/sent:
    get:
      tags: [messages]
      security: [{ bearerAuth: [] }]
      summary: Отправленные сообщения (последние 100).
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items: { $ref: "#/components/schemas/Message" }

  /api/messages/unread-count:
    get:
      tags: [messages]
      security: [{ bearerAuth: [] }]
      summary: Число непрочитанных сообщений.
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  count: { type: integer }

  /api/messages/{id}:
    delete:
      tags: [messages]
      security: [{ bearerAuth: [] }]
      summary: Удалить сообщение.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: deleted }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/messages/{id}/read:
    post:
      tags: [messages]
      security: [{ bearerAuth: [] }]
      summary: Пометить сообщение прочитанным (идемпотентно).
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: marked (or already was) }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/notepad:
    get:
      tags: [notepad]
      security: [{ bearerAuth: [] }]
      summary: Получить личный блокнот игрока.
      description: |
        Возвращает текст и время последнего обновления. Если запись
        отсутствует — возвращает пустой блокнот (`content: ""`,
        `updated_at: ""`), 200 OK.
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Notepad" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    put:
      tags: [notepad]
      security: [{ bearerAuth: [] }]
      summary: Сохранить личный блокнот (идемпотентно).
      description: |
        Полная замена содержимого блокнота. Лимит: 50 000 символов
        UTF-8 (защита от заливки больших объёмов; ориентир — крупные
        списки координат и шаблоны атак). Превышение → 400.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NotepadSaveRequest" }
      responses:
        "204": { description: saved }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/battle-reports/{id}:
    get:
      tags: [messages]
      security: [{ bearerAuth: [] }]
      summary: Полный battle report. Доступен attacker'у и defender'у.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BattleReportFull" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/espionage-reports/{id}:
    get:
      tags: [messages]
      security: [{ bearerAuth: [] }]
      summary: Полный espionage report.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { type: object }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/expedition-reports/{id}:
    get:
      tags: [messages]
      security: [{ bearerAuth: [] }]
      summary: Полный expedition report.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { type: object }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/battle-sim:
    post:
      tags: [battle]
      summary: Offline battle simulation (pure function, no side effects)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BattleInput" }
      responses:
        "200":
          description: ok (BattleReport if num_sim<2, SimStats if num_sim>=2)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/BattleReport"
                  - $ref: "#/components/schemas/SimStats"

  /api/achievements:
    get:
      tags: [achievements]
      security: [{ bearerAuth: [] }]
      summary: Список всех достижений + статус unlock.
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  achievements:
                    type: array
                    items: { $ref: "#/components/schemas/AchievementEntry" }

  /api/officers:
    get:
      tags: [officers]
      security: [{ bearerAuth: [] }]
      summary: Список офицеров и их статусов.
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  officers:
                    type: array
                    items: { $ref: "#/components/schemas/Officer" }

  /api/officers/{key}/activate:
