      summary: Снять блокировку.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: unbanned }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/admin/users/{id}/credit:
    post:
      tags: [admin]
      security: [{ bearerAuth: [] }]
      summary: Изменить баланс кредитов игрока (delta может быть отрицательным).
      parameters:
        - in: path
