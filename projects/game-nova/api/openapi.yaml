      security: [{ bearerAuth: [] }]
      summary: Описание здания + pre-computed cost/build_time/production по уровням (план 72 Ф.4 S-018).
      description: |
        `type` — числовой `unit_id` ИЛИ строковый `key` из `buildings.yml`
        (`metal_mine`, `solar_plant`, ...). Возвращает params и
