        "404": { $ref: "#/components/responses/NotFound" }

  # План 67 Ф.2: расширения alliance-системы. OpenAPI первым (R2).

  /api/alliances/{id}/descriptions:
    get:
      tags: [alliances]
      summary: 3 описания альянса (план 67 Ф.2, U-015).
      description: |
        Возвращает description_external (видно всем), description_internal
        (только членам), description_apply (только подающим заявку),
        legacy description и контекст вьюера ("member"|"applicant"|"outsider").
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AllianceDescriptionView" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [alliances]
      security: [{ bearerAuth: [] }]
      summary: Обновить одно или несколько описаний альянса.
      description: |
        Право: can_change_description (или owner). Поддерживает
        Idempotency-Key. Каждое поле ограничено 4000 символов.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
        - in: header
          name: Idempotency-Key
          required: false
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                description_external: { type: string }
                description_internal: { type: string }
                description_apply:    { type: string }
      responses:
        "204": { description: updated }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/alliances/{id}/ranks:
    get:
      tags: [alliances]
      security: [{ bearerAuth: [] }]
      summary: Список кастомных рангов альянса (план 67 Ф.2, U-005).
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  ranks:
                    type: array
                    items: { $ref: "#/components/schemas/AllianceRank" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [alliances]
      security: [{ bearerAuth: [] }]
      summary: Создать ранг с гранулярными правами.
      description: |
        Право: can_manage_ranks (или owner). Permissions — карта
        ключ→bool с известными ключами (can_invite, can_kick,
        can_send_global_mail, can_manage_diplomacy,
        can_change_description, can_propose_relations,
        can_manage_ranks). Поддерживает Idempotency-Key.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
        - in: header
          name: Idempotency-Key
          required: false
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:        { type: string, minLength: 1, maxLength: 32 }
                position:    { type: integer, default: 100 }
                permissions: { $ref: "#/components/schemas/AlliancePermissions" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema:
                type: object
                properties:
                  rank: { $ref: "#/components/schemas/AllianceRank" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }

  /api/alliances/{id}/ranks/{rank_id}:
    patch:
      tags: [alliances]
