  /api/i18n:
    get:
      tags: [i18n]
      summary: Список доступных языков.
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  languages: { type: array, items: { type: string } }

  /api/admin/stats:
    get:
      tags: [admin]
      security: [{ bearerAuth: [] }]
      summary: Базовая статистика сервера (только admin/superadmin).
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_users:    { type: integer }
                  active_last24h: { type: integer }
                  total_planets:  { type: integer }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/admin/users:
    get:
      tags: [admin]
      security: [{ bearerAuth: [] }]
      summary: Список игроков (limit/offset).
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 50, maximum: 200 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items: { $ref: "#/components/schemas/AdminUserRow" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/admin/users/{id}/ban:
    post:
