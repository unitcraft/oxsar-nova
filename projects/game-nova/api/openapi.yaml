  /api/admin/users/{id}/role:
    post:
      tags: [admin]
      security: [{ bearerAuth: [] }]
      summary: Изменить роль игрока.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
