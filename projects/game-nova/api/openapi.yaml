      responses:
        "204": { description: updated }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/admin/users/{id}:
    get:
      tags: [admin]
      summary: Глубокая карточка игрока (план 14 Ф.2.1)
      description: |
        Агрегат: базовые поля, планеты, флот в полёте, лоты на рынке
        и арт-рынке, активные офицеры, артефакты, последние 20
        транзакций res_log, последние 20 credit_purchases, 20 inbox
        сообщений, 20 боевых/шпионских/экспедиционных отчётов.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminUserProfile" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [admin]
      summary: Soft-delete аккаунта (план 14 Ф.2.6). Отвязывает от альянса.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: deleted }
        "404": { $ref: "#/components/responses/NotFound" }
        "429":
          description: admin rate limit exceeded

  /api/admin/users/{id}/resources:
    post:
      tags: [admin]
      summary: Изменить ресурсы на планете игрока (план 14 Ф.2.2)
      description: |
        Дельты metal/silicon/hydrogen могут быть отрицательными (списание).
        Баланс никогда не уходит ниже 0 (GREATEST(0, …)). Пишет в res_log
        с reason='admin_grant' и в admin_audit_log через middleware.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [planet_id]
              properties:
                planet_id: { type: string, format: uuid }
                metal:     { type: integer, format: int64 }
                silicon:   { type: integer, format: int64 }
                hydrogen:  { type: integer, format: int64 }
      responses:
        "204": { description: updated }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/admin/users/{id}/artefacts/grant:
    post:
      tags: [admin]
      summary: Выдать артефакт игроку (план 14 Ф.2.3)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [unit_id]
              properties:
                unit_id: { type: integer, description: "ARTEFACT_* код из каталога" }
      responses:
        "200":
          description: созданный артефакт
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string, format: uuid }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/admin/users/{id}/artefacts/{aid}:
    delete:
      tags: [admin]
      summary: Отобрать артефакт у игрока (план 14 Ф.2.3)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
        - in: path
          name: aid
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: deleted }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/admin/events/dead:
    get:
      tags: [admin]
      summary: Dead-letter события (план 14 Ф.3.2)
      description: |
        События, которые после N неудачных попыток перенесены из events в
        events_dead отдельным cron'ом.
      parameters:
        - in: query
          name: kind
          schema: { type: integer }
        - in: query
          name: user_id
          schema: { type: string, format: uuid }
        - in: query
          name: limit
          schema: { type: integer, default: 100, maximum: 500 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    items:
                      type: object
                      properties:
                        id:         { type: string, format: uuid }
                        user_id:    { type: string, format: uuid, nullable: true }
                        planet_id:  { type: string, format: uuid, nullable: true }
                        kind:       { type: integer }
                        fire_at:    { type: string, format: date-time }
                        payload:    { type: object, additionalProperties: true }
                        created_at: { type: string, format: date-time }
                        processed_at: { type: string, format: date-time, nullable: true }
                        attempt:    { type: integer }
                        last_error: { type: string }
                        failed_at:  { type: string, format: date-time }
                  limit:  { type: integer }
                  offset: { type: integer }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/admin/events/dead/{id}/resurrect:
    post:
      tags: [admin]
      summary: Вернуть dead-letter событие в активные (план 14 Ф.3.3)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: resurrected }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/admin/audit:
    get:
      tags: [admin]
      summary: Журнал деструктивных админских действий
      description: |
        Write-запросы под /api/admin/* пишут запись в admin_audit_log через
        middleware (см. план 14 Ф.1.2). Здесь — чтение этого журнала
        с фильтрами.
      parameters:
        - in: query
          name: admin_id
          schema: { type: string, format: uuid }
        - in: query
          name: action
          description: "ключ действия (например: users.ban, users.credit, events.retry)"
          schema: { type: string }
        - in: query
          name: target_id
          schema: { type: string }
        - in: query
          name: from
          description: RFC3339 нижняя граница created_at
          schema: { type: string, format: date-time }
        - in: query
          name: to
          schema: { type: string, format: date-time }
        - in: query
          name: limit
          schema: { type: integer, default: 100, maximum: 500 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items: { $ref: "#/components/schemas/AdminAuditEntry" }
                  limit:  { type: integer }
                  offset: { type: integer }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/admin/fleets/{fleet_id}/recall:
    post:
      tags: [admin]
