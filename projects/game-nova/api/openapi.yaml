        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/units/catalog/{type}:
    get:
      tags: [catalog]
      security: [{ bearerAuth: [] }]
      summary: Описание корабля / обороны / исследования (план 72 Ф.4 S-019).
      description: |
        `type` — числовой `unit_id` ИЛИ строковый `key` из ships.yml /
        defense.yml / research.yml. Поле `kind` определяет тип:
        `ship` | `defense` | `research`. Для research возвращается
