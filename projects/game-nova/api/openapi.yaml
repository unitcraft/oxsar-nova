      responses:
        "200":
          description: activated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Officer" }
        "402": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/market/rates:
    get:
      tags: [market]
      security: [{ bearerAuth: [] }]
      summary: Текущие курсы обмена ресурсов.
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MarketRates" }

  /api/planets/{id}/market/exchange:
    post:
      tags: [market]
      security: [{ bearerAuth: [] }]
      summary: Обменять ресурсы на планете.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [from, to, amount]
              properties:
                from:   { type: string, enum: [metal, silicon, hydrogen] }
                to:     { type: string, enum: [metal, silicon, hydrogen] }
                amount: { type: integer, format: int64, minimum: 1 }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExchangeResult" }
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/planets/{id}/rockets:
    get:
      tags: [rockets]
      security: [{ bearerAuth: [] }]
      summary: Склад ракет на планете.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  interplanetary: { type: integer, format: int64 }

  /api/planets/{id}/rockets/launch:
    post:
      tags: [rockets]
      security: [{ bearerAuth: [] }]
      summary: Запустить межпланетную ракету.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [dst, count]
              properties:
                dst:   { $ref: "#/components/schemas/Coords" }
                count: { type: integer, minimum: 1 }
      responses:
        "201": { description: launched }
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/highscore:
    get:
      tags: [score]
      security: [{ bearerAuth: [] }]
      summary: Таблица лидеров (топ-50).
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items: { $ref: "#/components/schemas/HighscoreEntry" }

  /api/highscore/me:
    get:
      tags: [score]
      security: [{ bearerAuth: [] }]
      summary: Ранг и очки текущего игрока.
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HighscoreEntry" }

  /api/stats:
    get:
      tags: [system]
      summary: Публичная статистика игры (онлайн).
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
