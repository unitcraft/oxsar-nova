        Право: can_kick (или owner). Owner кикнуть нельзя; для
        самоудаления — POST /api/alliances/leave.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
        - in: path
          name: userID
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: kicked }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/alliances/{id}/members/{userID}/rank-id:
    patch:
      tags: [alliances]
      security: [{ bearerAuth: [] }]
      summary: Привязать кастомный ранг к участнику.
      description: |
        Право: can_manage_ranks (или owner). Body {"rank_id": null}
        отвязывает ранг (откат на builtin). Поддерживает Idempotency-Key.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
        - in: path
          name: userID
          required: true
          schema: { type: string, format: uuid }
        - in: header
          name: Idempotency-Key
          required: false
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                rank_id: { type: string, format: uuid, nullable: true }
      responses:
        "204": { description: updated }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/alliances/{id}/audit:
    get:
      tags: [alliances]
      security: [{ bearerAuth: [] }]
      summary: Журнал событий альянса (план 67 Ф.2, U-013).
      description: |
        Доступ — любой член альянса. Запись пишется на каждое
        значимое действие: создание, изменение описаний, изгнание,
        смена ранга, дипломатия и т.д.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
        - in: query
          name: action
          schema: { type: string }
        - in: query
          name: actor_id
          schema: { type: string, format: uuid }
        - in: query
          name: limit
          schema: { type: integer, default: 100, maximum: 200 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items: { $ref: "#/components/schemas/AllianceAuditEntry" }
                  limit:  { type: integer }
                  offset: { type: integer }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/alliances/{id}/transfer-leadership/code:
    post:
      tags: [alliances]
      security: [{ bearerAuth: [] }]
      summary: Запросить код подтверждения передачи лидерства (план 67 Ф.3).
      description: |
        Только текущий owner альянса. Генерирует 8-символьный
        одноразовый код, отправляет его текущему owner'у системным
        сообщением (folder=13). Код действует 10 минут, лимит
        попыток подтверждения — 5. Rate-limit на запросы кода —
        3 в час на альянс.

        Запрос идемпотентен через Idempotency-Key (R9): повторный
        запрос с тем же ключом вернёт сохранённый ответ без
        повторной отправки сообщения. Внутри БД код всегда UPSERT —
        последний запрос затирает предыдущий.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
        - in: header
          name: Idempotency-Key
          required: false
          schema: { type: string, maxLength: 255 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [new_owner_id]
              properties:
                new_owner_id:
                  type: string
                  format: uuid
                  description: |
                    Будущий лидер. Должен быть членом этого же
                    альянса, не равным текущему owner'у.
      responses:
        "202":
          description: code issued and sent
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AllianceTransferCodeIssued" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/alliances/{id}/transfer-leadership:
    post:
      tags: [alliances]
      security: [{ bearerAuth: [] }]
      summary: Подтвердить передачу лидерства кодом (план 67 Ф.3).
      description: |
        Только текущий owner альянса. Проверяет код, выпущенный
        предыдущим запросом /transfer-leadership/code. В одной
        транзакции:
          - alliances.owner_id = new_owner_id
          - alliances.leadership_transferred_at = now()
          - alliance_members.rank: прежний owner → 'member',
            новый → 'owner'
          - audit-запись (action=leadership_transferred)
          - удаление кода

        Idempotency-Key (R9): повторный confirm с тем же ключом
        вернёт сохранённый ответ без повторной передачи.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
        - in: header
          name: Idempotency-Key
          required: false
          schema: { type: string, maxLength: 255 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [new_owner_id, code]
              properties:
                new_owner_id: { type: string, format: uuid }
                code:         { type: string, minLength: 8, maxLength: 8 }
      responses:
        "204": { description: leadership transferred }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

