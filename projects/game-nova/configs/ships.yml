  # Interplanetary Missile (id=52 в legacy UNIT_INTERPLANETARY_ROCKET).
  # Не корабль и не участвует в обычном бою (attack=0) — используется
  # только для kind=16 (rocket attack). Летит прямо, без возврата,
  # наносит урон defense на цели.
  interplanetary_missile:
    id: 52
    attack: 0
    shield: 0
    shell: 1500
    cargo: 0
    speed: 12000
    fuel: 1
    cost: { metal: 12500, silicon: 2500, hydrogen: 10000 }

  # Lancer Ship (id=102). Premium-корабль с RF×3 vs DS.
  # ADR-0004: cost ×10 (закрыло BA-002).
  # ADR-0008 (27-J/W'):
  #   - attack 5500→4000→5000. Финальное значение 5000 — компромисс:
  #     Lancer боеспособен 1v1, не trap-юнит, сохраняет anti-DS-роль
  #     через RF×3 и силу в смешанном флоте.
  #   - fuel 100→400, speed 8000→6000 — ограничение рейдинг-возможностей.
  #   - front 8→6 (27-N) — Lancer прячется за тяжёлым флотом.
  #   - Защита от Lancer-spam — через RF Cruiser→Lancer ×45 (см. 27-W'
  #     в rapidfire.yml). Без game-механики max_per_planet.
  lancer_ship:
    id: 102
    attack: 5000
    shield: 200
    shell: 10000
    cargo: 200
    speed: 6000
    fuel: 400
    cost: { metal: 15000, silicon: 35000, hydrogen: 60000 }
    front: 6

  # Shadow Ship (id=325). Stealth-корабль с anti-DS-ролью.
  # ADR-0007 (27-B): attack 30→200, masking 5.
  # ADR-0008 (27-F): attack 200→520 (пробивает DS ignoreAttack=500 и
  # активирует RF×70 vs DS).
  # ADR-0008 (27-V): cost 5k → 15k (3k+9k+3k). Причина: при cost=5k
  # Shadow доминировал 1v1 при равной metal-eq (vs LF 90.91, vs Frigate
  # 104.68 — катастрофа для других юнитов). cost ×3 снижает «эффективную
  # массу» Shadow в 3× при тех же ресурсах, anti-DS-роль сохраняется
  # (нужно меньше юнитов, но они дороже).
  # 27-P: front 7→5 (усиливает stealth-эффект в смешанной атаке).
  shadow_ship:
    id: 325
    attack: 520
    shield: 30
    shell: 4000
    cargo: 75
    speed: 13000
    fuel: 35
    cost: { metal: 3000, silicon: 9000, hydrogen: 3000 }
    front: 5

