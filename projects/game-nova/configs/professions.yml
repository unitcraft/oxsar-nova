# Профессии игрока. bonus/malus — виртуальные уровни при расчёте производства и боя.
# Смена профессии: 1000 cr, мин. интервал 14 дней.
#
# План 72.1.58: добавлен Универсал (без бонусов) + sort_order для
# legacy-порядка (Универсал → Шахтёр → Атакёр → Защитник → Танк).

professions:
  universal:
    sort_order: 0
    label: "Универсал"
    description: "Универсал не имеет специализации, все постройки и исследования работают в нормальном режиме."
    bonus: {}
    malus: {}

  miner:
    sort_order: 1
    label: "Шахтёр"
    description: "Шахтер специализируется на добыче ресурсов."
    bonus:
      metalmine: 1
      silicon_lab: 1
      solar_plant: 2
    malus:
      shipyard: -2
      gun: -2
      shield_weapon: -2
      shell_weapon: -2

  attacker:
    sort_order: 2
    label: "Атакёр"
    description: "Атакёр специализируется на атаках."
    bonus:
      gun: 1
      shield_weapon: 1
      shell_weapon: 1
      ballistics: 1
      shipyard: 1
    malus:
      metalmine: -1
      silicon_lab: -1
      defense_factory: -3

  defender:
    sort_order: 3
    label: "Защитник"
    description: "Защитник специализируется на обороне."
    bonus:
      masking: 1
      shield_weapon: 1
      shell_weapon: 1
      defense_factory: 1
      rocket_station: 1
    malus:
      computer_tech: -1
      gun: -1
      shipyard: -3

  tank:
    sort_order: 4
    label: "Танк"
    description: "Танк специализируется на тяжёлых кораблях с большой огневой мощью и бронёй, но с медленной скоростью."
    bonus:
      gun: 2
      shield_weapon: 2
      shell_weapon: 2
    malus:
      gravi: -2
      combustion_drive: -2
      impulse_drive: -2
      hyperspace_drive: -2
