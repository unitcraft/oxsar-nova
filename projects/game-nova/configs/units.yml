  # обрабатываются как fleet — летят через event kind=16, в обычном бою
  # на планете не участвуют. Runtime читает их из ships.yml, не defense.yml.
  # Перенос в fleet-группу требует ломки import-datasheets CLI и публичного
  # контракта; оставляем здесь как совместимость с legacy. См. план 22 Ф.2.3.
