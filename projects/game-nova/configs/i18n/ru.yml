achievements:
  achievementBonus: Награда
  availAchievements: Невыполненные достижения
  doneAchievements: Полученные достижения
  firstComputerTech: Открыть второй фронт.
  firstComputerTechDesc: Чтобы вести войну на несколько фронтов сразу, нужны мощные вычислительные системы — они координируют действия одновременных флотов. Изучите компьютерную технологию и снимите ограничение на число параллельных миссий.
  firstDeffence: Крепим стены.
  firstDeffenceDesc: "Галактика недружелюбна: пока ваши корабли заняты дальними походами, дом остаётся открытой целью. Возведите первые оборонительные сооружения — пусть нападающие столкнутся с серьёзным сопротивлением."
  firstEnergy: Солнце - наш друг.
  firstEnergyDesc: Поток солнечной радиации — почти неисчерпаемый источник энергии, нужно лишь научиться его эффективно преобразовывать. Изучите энергетическую технологию, чтобы повысить КПД электростанций.
  firstEngine: Предполетная подготовка.
  firstEngineDesc: Без надёжного двигателя ни один корабль не сдвинется с места. Разработка первого реактивного двигателя открывает дорогу к освоению ближнего космоса и постройке полноценного флота.
  firstHydrogen: Синяя кровь.
  firstHydrogenDesc: Углеводородная эра давно закончилась — основным топливом стал водород. Им заправляются корабли, его расходует исследовательская техника. Постройте первый синтезатор и обеспечьте планету топливом.
  firstMetal: Металл — основа всего.
  firstMetalDesc: Любая постройка, корабль и часть оборонительных сооружений начинается с металла; ряд технологий тоже требует его в качестве материала. Возведите первый металлургический рудник, чтобы запустить экономику планеты.
  firstRessExchange: Рыночная экономика.
  firstRessExchangeDesc: Когда у одного ресурса избыток, а другого не хватает — на помощь приходит обменник. Найдите его в меню империи, обменяйте излишки на нужное и продолжайте развитие без лишних простоев.
  firstRobot: Роботы, на работу!
  firstRobotDesc: Автоматизация ускоряет любые строительные работы — будь то здания планеты или корабли на верфи. Постройте фабрику роботов и убедитесь в этом на практике.
  firstSilicon: Кремниевое вещество.
  firstSiliconDesc: Кремний — сырьё для микросхем, без которых не работает ни один прибор и не запускается ни одно исследование. Откройте первую кремниевую шахту и обеспечьте империю задел для высоких технологий.
  firstSolar: Берегите природу.
  firstSolarDesc: Местная звезда отдаёт энергии больше, чем способна потратить вся планета — нужны лишь панели, способные её собрать. Возведите солнечную электростанцию и закройте базовые потребности империи в энергии.
  fiveAttacker: Железные мускулы.
  fiveAttackerDesc: Соседи не торопятся уступать ваши территориальные претензии добровольно. Соберите ударное звено из нескольких боевых кораблей, чтобы начать кампанию по галактике.
  fiveRocket: Мы не одни, но мы защищены.
  fiveRocketDesc: Надежно защитите свои тылы - постройте ракетную оборону!
  login: Добро пожаловать.
  loginDesc: Нажмите «Получить бонус», чтобы забрать стартовый комплект ресурсов. Система достижений проведёт вас по основам игры и поможет освоить ключевые механики. Каждое достижение требует выполнения своих условий; скрытые из ленты записи всегда доступны на странице «Достижения».
  moonBonusOnly: Награду за это достижение можно получить только на луне.
  newAchievementsPrefix: Новых
  planetBonusOnly: Награду за это достижение нельзя получить на луне.
  recalcAchievements: Пересчитать
  simulateBattle: Тактический гений.
  simulateBattleDesc: Большая часть успеха в космических сражениях — расчёт ещё до выхода флота. Симулятор боя позволяет прогнать тактическую схему в виртуальной среде и оценить шансы заранее. Откройте симулятор в меню и проведите хотя бы одну тестовую битву.
  starter: Крепкий фундамент
  starterDesc: Перед тем как выйти в космос, обустройте свою планету.
  stateAssaultSimulation: Провести симуляцию боя.
  stateResUpdateExchange: Обменять ресурсы в обменнике
  tenTransport: Космический дальнобойщик.
  tenTransportDesc: "Транспорты — основа межпланетной логистики: ими доставляют грузы между планетами и собирают ресурсы из дальних точек. Дополнительные баки на борту увеличивают радиус полёта всего флота."
  tutorialEnd: Конец курса молодого бойца.
  tutorialEndDesc: Перед тем как закончить курс молодого бойца, закончите обустраивать свою империю.
