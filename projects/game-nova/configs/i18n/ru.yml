  artefactsTech: Изучение артефактов
  artefactsTechDesc: Технология позволяет активировать артефакты. Количество одновременно работающих артефактов на всех планетах увеличивается с каждым уровнем на 1.
  artefactsTechFullDesc: В исследовании инопланетных артефактов работают самые лучшие научные подразделения Вашей империи. Для изучения неизвестных технологий и механизмов работы артефактов используются лучшие эвристические методы анализа и супер компьютерные технологии. Данная технология позволяет использовать артефакты и поддерживать некоторые из них в рабочем состоянии некоторое время. Максимальное количество активированных артефактов на всех планетах ограничено уровнем этой технологии.
