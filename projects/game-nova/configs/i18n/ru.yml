  spaceEventsList: Текущие задания во вселенной
  startUpMessage: "Добро пожаловать в {config}pagetitle{/config}!\r\n\r\n{config}pagetitle{/config} - это многопользовательская космическая онлайн игра. Все игроки развиваются в единной вселенной. Здесь можно приглашать друзей и объединять свои усилия в нападении на врагов и обороне, использовать уникальную систему боя и собственный симулятор сражений. Биржа позволит вести торговлю ресурсами, кораблями и артефактами с другими игроками, научные исследования откроют новые технологии и более совершенные системы вооружения. Используя множество стратегий и тактик развития, ты сможешь расширять свою империю и усиливать влияние на другие галактики во имя главной цели – стать хозяином {config}pagetitle{/config}.\r\n\r\nЧтобы развитие империи шло полным ходом, строй шахты по добыче ресурсов. Когда заканчивается постройка или накапливается нужное количество ресурсов, строй новые здания в меню <i>Постройки</i>. Однако, не забывай про Энергию. Без Энергии ни одна шахта не сможет добывать ресурсы.\r\n\r\nСистема Достижений поможет тебе стать грозой {config}pagetitle{/config}. Следуй ее подсказкам и твое развитие пойдет по оптимальному пути.\r\n\r\nЛюбые вопросы по игре можно обсудить в <i>Чате</i>, не стесняйся, спрашивай, там всегда готовы прийти на помощь.\r\n\r\nС уважением,\r\nтвоя команда {config}pagetitle{/config}"
