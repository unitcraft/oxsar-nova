  deliveryUnitsReportSubject: Доставлен купленный флот
  espProbesDestroyed1: Шпионские зонды были сбиты.
  espioangeCommitted: "Чужой флот {{arg1}} с {{arg2}} {{arg3}} был замечен около {{arg4}} {{arg5}}.<br />Защита от шпионажа: {{num6}}&#37;<br />[b][color=#0f0]{{arg7}}[/color][/b]"
  espioangeCommittedSubject: Шпионаж
  expeditionArtefact: "Среди дрейфующих обломков ваша экспедиция обнаружила загадочный артефакт: {@art_name}"
  expeditionAsteroidDiscovery1: "Сенсоры экспедиции вывели флот к рою астероидных обломков: {@debrismetal} металла и {@debrissilicon} кремния. Переработчики собрали: {@metal} металла и {@silicon} кремния."
  expeditionAsteroidDiscovery2: "Экспедиция вышла к давно отгремевшему полю битвы. От разорванных корпусов осталась дрейфующая металлическая взвесь: {@debrismetal} металла и {@debrissilicon} кремния. Переработчики собрали: {@metal} металла и {@silicon} кремния."
  expeditionAsteroidDiscoveryNoCargo: "Сенсоры экспедиции вывели флот к рою астероидных обломков: {@debrismetal} металла и {@debrissilicon} кремния. К сожалению, в составе флота не было переработчиков — обломки остались дрейфовать в открытом космосе."
  expeditionBattlefieldDiscovery: "Экспедиция обнаружила следы давно отгремевшей битвы. Среди тонн покорёженного металла нашлись корпуса, ещё пригодные к ходу: {@new_ships}"
  expeditionCreditsDiscovery1: "Экспедиция вышла к полю давнего сражения. К сожалению, все корпуса разбиты и пусты — но в одном из уцелевших сейфов исследователи нашли {@credits} кредитов. Сумма уже переведена на ваш счёт. Флот возвращается на базу."
  expeditionCreditsDiscovery2: "Сенсоры экспедиции запеленговали странный сигнал. Это оказалась капитанская рубка неизвестного корабля с до сих пор работающим маяком — отрезанная от основного корпуса чем-то, чего исследователи никогда не видели: срез ровный, как у пучкового излучателя немыслимой мощности. В абсолютно целом сейфе нашлись {@credits} кредитов. Сумма переведена на ваш счёт. Флот возвращается на базу."
  expeditionCreditsDiscovery3: "Сенсоры экспедиции запеленговали странный объект. Это оказался одноместный повреждённый корабль с мёртвым существом неизвестной расы в кресле пилота. Под сиденьем нашлись {@credits} кредитов. Сумма переведена на ваш счёт. Флот возвращается на базу."
  expeditionCreditsDiscovery4: "Сенсоры экспедиции запеленговали странный объект — мёртвого инопланетного пилота в полной экипировке. Анализ показал: он умер в открытом космосе после {@anabios_years} лет анабиоза, когда системы жизнеобеспечения исчерпали последние ресурсы. Должно быть, его выбросило в пустоту в каком-то давнем сражении. В кармане скафандра нашёлся маяк и {@credits} кредитов. Сумма переведена на ваш счёт. Флот возвращается на базу."
  expeditionCreditsDiscovery5: "Сенсоры экспедиции запеленговали странный объект — небольшой повреждённый корабль чужой постройки. При внимательном осмотре исследователи нашли тайник: предыдущие хозяева спрятали в нём {@credits} кредитов. Сумма переведена на ваш счёт. Флот возвращается на базу."
  expeditionCreditsDiscovery6: "Экспедиция вышла к полю давнего сражения. К сожалению, все корпуса разбиты и пусты — но в потайном отсеке одного из них исследователи нашли {@credits} кредитов. Сумма переведена на ваш счёт. Флот возвращается на базу."
  expeditionDelayReturn: "Экспедиция ничего не нашла и вдобавок сбилась с курса. Поиск обратного пути займёт на {@percent}% больше времени."
  expeditionFastReturn1: "Экспедиция ничего не нашла. Зато по пути обнаружилась стабильная чёрная дыра — короткий проход через её горизонт сократит обратный путь на {@percent}%."
  expeditionFastReturn2: "Экспедиция ничего не нашла. Зато корона ближайшей звезды выбросила мощный поток солнечного ветра — он подхватит флот и сократит обратный путь на {@percent}%."
  expeditionFastReturn3: "Флот вашей экспедиции попал в зону действия огромного магнитного поля неизвестной природы. К удаче — оно ускорит обратный путь на {@percent}%."
  expeditionLost1: К сожалению, связь с экспедицией потеряна.
  expeditionLost2: Связь с вашими исследователями потеряна. Скорее всего, они уже не вернутся…
  expeditionNeutralPlanet: "Исследователи установили координаты планеты, где недавно отгремел бой: {@planet}.<br/>На её орбите ещё дрейфуют обломки: {@m_scraps} металла и {@s_scraps} кремния. Поспешите — планета нестабильна и скоро разрушится."
  expeditionNeutralPlanetSubj: Открытие неизвестной планеты
  expeditionNothing1: Ваш флот долго бороздил просторы вселенной, но сенсоры так и не зафиксировали ничего, заслуживающего внимания.
  expeditionNothing2: Экспедиция прошла мимо вспыхнувшей сверхновой и привезла впечатляющие снимки. Больше в этом секторе ничего не обнаружено.
  expeditionNothing3: Экспедиция полностью отработала отведённое на сектор время, но не обнаружила ничего значимого.
  expeditionNothing4: Сенсоры зацепились за невзрачную планету у самой кромки сектора. На её поверхности обнаружилась колония мелких неагрессивных существ — биологически любопытно, но стратегически бесполезно. Больше ничего не найдено.
  expeditionNothing5: На пути флота сенсоры зафиксировали колоссальное соединение чужой постройки. Командование решило не рисковать и повернуло на базу.
  expeditionNothing6: На пути флота вспыхнула нестабильная чёрная дыра — край горизонта пульсировал, поглощая свет неравномерно. Командование решило не рисковать и повернуло на базу.
  expeditionNothing7: Экспедиция прошла вдоль края огромной туманности антиматерии — её мерцание ловило все датчики, но приближаться никто не решился. Больше ничего обнаружено не было.
  expeditionResourceDiscovery1: "Экспедиция обнаружила группу старых нерабочих кораблей, дрейфующих в пустоте. Командование распорядилось забрать содержимое их трюмов: {@metal} металла, {@silicon} кремния и {@hydrogen} водорода."
  expeditionResourceDiscovery2: "Экспедиция вышла к необитаемой планете, богатой ресурсами: {@debrismetal} металла, {@debrissilicon} кремния и {@debrishydrogen} водорода. Флот вывез на борт: {@metal} металла, {@silicon} кремния и {@hydrogen} водорода."
  expeditionSensorClearReport: "Шпионские зонды просканировали шлейф эха тёмной материи: сектор {@exp_sector} никто не посещал в последние дни — отличный знак. Исследователи рекомендуют отправить сюда экспедицию ещё несколько раз для более тщательной разведки.<br/>Поисковая мощность: {@exp_power}. Время изучения сектора: {@exp_hours} ч. Вероятность такого результата: {@exp_percent}%."
  expeditionSensorPoorReport: "Шпионские зонды просканировали шлейф эха тёмной материи и обнаружили следы {@visits} чужих экспедиций в секторе {@exp_sector}. Исследователи рекомендуют дать сектору отдохнуть несколько дней и поискать менее истоптанные участки галактики.<br/>Поисковая мощность: {@exp_power}. Время изучения сектора: {@exp_hours} ч. Вероятность такого результата: {@exp_percent}%."
  expeditionSensorReport: "Шпионские зонды просканировали шлейф эха тёмной материи и обнаружили следы {@visits} чужих экспедиций в секторе {@exp_sector}.<br/>Поисковая мощность: {@exp_power}. Время изучения сектора: {@exp_hours} ч. Вероятность такого результата: {@exp_percent}%."
  expeditionSensorSubject: Данные с разведзонда
  expeditionShipsDiscovery: "Экспедиция обнаружила в открытом космосе дрейфующий флот в полной консервации — двигатели заглушены, реакторы спят, экипаж отсутствует. Командование распорядилось привести корабли на базу: {@new_ships}"
  expeditionSubject: Отчёт экспедиции
  expeditionXskirmish: "Во время экспедиции ваши корабли вышли на инопланетный флот, появившийся из ниоткуда. Чужие открыли огонь без предупреждения — завязался бой. Подробности — в разделе «Боевые отчёты»."
  fleetGrasped: "В сражение на планете {@coords_from} удалось захватить флот противника ({@fleet}). Командование уже отдало приказ восстановить поврежденные системы жизнеобеспечения и вооружения, захваченный флот прибудет совместно с Вашим флотом на планету {@planet} {@coords}."
  fleetGraspedSubject: Захват флота противника
  fleetReturned: "Ваш флот ({{arg1}}) вернулся с {{arg2}} на {{arg3}} {{arg4}}. <br /> Флот привез груз: {{arg5}} металла, {{arg6}} кремния и {{arg7}} водорода."
  fleetReturnedSubject: Возвращение флота
  lostArtefactsMsg: "В сражении на планете {@coords_planet} атакующий захватил Ваши артефакты: {@artefacts}."
  lostArtefactsSubject: Потеря артефактов
  memberReceipted: "Ваша заявка рассмотрена и принята. Добро пожаловать в альянс {{arg1}}"
  memberRefused: "К сожалению, Ваша заявка на участие в альянсе [{{arg1}}] отклонена. Вы можете пробовать снова или играть в одиночестве."
  moonDestroyedMsg: "Ваша Луна по координатам {@coords_planet} была уничтожена."
  moonDestroyedSubject: Уничтожение Вашей Луны
  msgActivateArtefact: "Включился артефакт {@name} на {@coords}"
  msgArtefact: Сообщение от системы артефактов.
  msgCaptureArtefact: "Артефакт {@name} ({@coords}) был захвачен врагом."
