  targetMoonDestroyed: Генераторы Звезд Смерти атакующего накапливают энергию для гравитационной атаки и делают выстрел по Луне. Всё более усиливающиеся толчки сотрясают спутник. Луна начинает деформироваться, по ее экватору несколько раз проходят гравитационные волны, затем взрыв ослепляет приборы атакующего. Мгновенье и приборы фиксируют пустоту, Луна уничтожена, ее больше нет.
  targetMoonNotDestroyed: Генераторы Звезд Смерти атакующего накапливают энергию для гравитационной атаки и делают выстрел по Луне. Толчки, один за одним, сотрясают спутник, но Луна остается на месте. Спутник стабилизируется высвобождая люшнюю энергию гравитационными импульсами. Мощности генераторов Звезд Смерти не хватило, чтобы уничтожить Луну.
