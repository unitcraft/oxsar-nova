  alienTech: Инопланетная технология
  alienTechDesc: Эта технология позволяет ремонтировать инопланетные корабли.
  alienTechFullDesc: Эта технология позволяет ремонтировать инопланетные корабли.
  annihilationEngine: Аннигиляционный модуль
  annihilationEngineDesc: При подключении к любому типу двигателей увеличивает скорость флота в полете на 10%.
  annihilationEngineFullDesc: Аннигиляция - взаимоуничтожение частицы и античастицы при их столкновении с высвобождением огромного количества энергии. Антиматерию крайне сложно синтезировать и хранить, поэтому создание эффективного двигателя, основанного на принципе аннигиляции, пока невозможно. Однако среди обломков крупных инопланетных кораблей были найдены модули двигателей, работающих именно по такому принципу. Некоторые из них находятся в рабочем состоянии и могут быть совмещены с известными типами двигателей, давая им прирост производительности в 10%.
