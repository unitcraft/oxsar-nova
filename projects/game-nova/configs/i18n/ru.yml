  unitACorvette: Корвет инопланетян
  unitACorvetteDesc: Очень быстрый и экономичный боевой корабль с хорошим вооружением.
  unitACorvetteFullDesc: Очень быстрый и экономичный боевой корабль с хорошим вооружением.
  unitAFrigate: Фрегат инопланетян
  unitAFrigateDesc: Огромная огневая мощь и большая вместимость. Способен наносить разрушающие удары противнику.
  unitAFrigateFullDesc: Огромная огневая мощь и большая вместимость. Способен наносить разрушающие удары противнику.
  unitAPaladin: Паладин инопланетян
  unitAPaladinDesc: Небольшой корабль огневой поддержки. Оснащен высокоточным оружием и системой маскировки.
  unitAPaladinFullDesc: Небольшой корабль огневой поддержки. Оснащен высокоточным оружием и системой маскировки.
  unitAScreen: Щитовой корабль инопланетян
  unitAScreenDesc: Уникальный щитовой корабль. Непревзойденная защищенность позволяет принимать на себе основной удар противника.
  unitAScreenFullDesc: Уникальный щитовой корабль. Непревзойденная защищенность позволяет принимать на себе основной удар противника.
  unitATorpedocarier: Торпедоносец инопланетян
  unitATorpedocarierDesc: Быстрый корабль для нанесения внезапного удара. Оснащен мощным оружием с системой автоматического наведения.
  unitATorpedocarierFullDesc: Быстрый корабль для нанесения внезапного удара. Оснащен мощным оружием с системой автоматического наведения.
  unitExchSupportRange: Межгалактический спутник
  unitExchSupportRangeDesc: Межгалактический спутник увеличивает радиус действия биржи. Продавцы могут добавлять лоты на продажу только в случае нахождения в радиусе действия.
  unitExchSupportRangeFullDesc: Межгалактический спутник - это огромный объект, вращающийся на орбите планеты. Он практически полностью состоит из высокотехнологичной аппаратуры для поддержания стабильной и бесперебойной связи с самыми далекими звездными системами во вселенной. При объединении таких спутников в группы, они способны улучшать качество связи многократно. Межгалактический спутник необходим для работы биржи. Каждый такой спутник увеличивает радиус действия межгалактической биржи на двойное количество уровней компьютерной технологии. Радиус действия измеряется в звездных системах. Каждые 300 систем увеличивают радиус действия на 1 галактику. Продавцы могут добавлять лоты на продажу только в случае нахождения в радиусе действия биржи.
  unitExchSupportSlot: Биржевая подстанция
  unitExchSupportSlotDesc: Биржевая подстанция увеличивает максимальное количество лотов, обслуживаемое биржей.
  unitExchSupportSlotFullDesc: Биржевая подстанция увеличивает максимальное количество лотов, обслуживаемое биржей.
