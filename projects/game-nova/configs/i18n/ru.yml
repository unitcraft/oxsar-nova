  assemblyModule3110: Модуль сборки
  assemblyModule3110Desc: Добавляет к флоту 10 легких истребителей.
  assemblyModule3110FullDesc: Развитие инопланетной техники позволяет создавать роботов, подобных известным в галактике нанитам. Однако вместо нанитов общего назначения инопланетяне предпочитают использовать специализированных нанитов, оптимизированных для выполнения единственной задачи. Модуль сборки состоит из микрокомпьютера, управляющего процессом сборки, и множества нанитов, предназначенных для создания кораблей конкретного типа. Этот модуль предназначен для сборки 10 легких истребителей.
  assemblyModule421: Модуль сборки
  assemblyModule421Desc: Добавляет к флоту 1 Звезду смерти.
  assemblyModule421FullDesc: Развитие инопланетной техники позволяет создавать роботов, подобных известным в галактике нанитам. Однако вместо нанитов общего назначения инопланетяне предпочитают использовать специализированных нанитов, оптимизированных для выполнения единственной задачи. Модуль сборки состоит из микрокомпьютера, управляющего процессом сборки, и множества нанитов, предназначенных для создания кораблей конкретного типа. Этот модуль предназначен для сборки 1 Звезды смерти.
  atomicDensifier: Атомный уплотнитель
  atomicDensifierDesc: Увеличивает емкость хранилищ на 10%.
  atomicDensifierFullDesc: Генерирует силовое поле, сжимающее вещество, что позволяет хранилищам вмещать больше ресурсов. В течение недели емкость хранилищ ресурсов на всех планетах увеличивается на 10%.
  ballisticsTech: Баллистическая технология
  ballisticsTechDesc: Баллистический анализатор управляет высокоточным наведением оружия, увеличивая точность прямых попаданий в юниты противника.
  ballisticsTechFullDesc: Технология баллистического анализа позволяет компьютерным системам просчитывать бой до его начала на основе пространственного расположения, технических характеристик юнитов и траекторий огневых путей и излучений. Это делает возможным вести прицельный и высокоточный огонь на всем протяжении боя. Технология уменьшает промахи и попадания в уже уничтоженные юниты.
  battleAttackPower: Единство атаки
  battleAttackPowerDesc: Увеличивает во время сражения силу атаки на 10% для всех юнитов всех игроков своей стороны.
  battleAttackPowerFullDesc: Увеличивает во время сражения силу атаки на 10% для всех юнитов всех игроков своей стороны.
  battleShellPower: Единство брони
  battleShellPowerDesc: Увеличивает во время сражения силу брони на 10% для всех юнитов всех игроков своей стороны.
  battleShellPowerFullDesc: Увеличивает во время сражения силу брони на 10% для всех юнитов всех игроков своей стороны.
  battleShieldPower: Единство щитов
  battleShieldPowerDesc: Увеличивает во время сражения силу щитов на 10% для всех юнитов всех игроков своей стороны.
  battleShieldPowerFullDesc: Увеличивает во время сражения силу щитов на 10% для всех юнитов всех игроков своей стороны.
  battleShip: Линкор
  battleShipDesc: Линкоры как правило составляют основу флота. Их тяжёлые орудия, высокая скорость и большой грузовой тоннаж делают их серьёзными противниками.
  battleShipFullDesc: Линкоры как правило составляют основу флота. Их тяжёлые орудия, высокая скорость и большой грузовой тоннаж делают их серьёзными противниками.
  bomber: Бомбардир
  bomberDesc: Бомбардировщик был разработан специально для того, чтобы уничтожать планетарную защиту.
  bomberFullDesc: "Бомбардировщик был разработан специально для того, чтобы уничтожать планетарную защиту. С помощью лазерного прицела он точно сбрасывает плазменные бомбы на поверхность планеты и таким образом наносит огромные повреждения оборонительным сооружениям.\r\nНедостатки: Сильно медленный корабль."
  catalyst: Катализатор
  catalystDesc: Увеличивает выработку ресурсов на 10%.
  catalystFullDesc: Универсальный катализатор ускоряет ход химических процессов при синтезе металла, кремния и водорода. В течение недели выработка ресурсов на всех планетах увеличивается на 10%.
  colonyShip: Колонизатор
  colonyShipDesc: При помощи этого корабля можно осваивать незаселённые планеты.
  colonyShipFullDesc: Колонизатор предназначен для освоения ранее не занятых планет. Он используется в новой колонии в качестве поставщика сырья - его разбирают и используют весь полезный материал для освоения нового света.
  combustionEngine: Реактивный двигатель
  combustionEngineDesc: Технология для развития двигателей небольших комсических кораблей, что позволяет летать с небольшим потреблением топлива на большие растояния.
  combustionEngineFullDesc: "Реактивный двигатель основывается на принципе отдачи. Материя, разогретая до высоких температур, выбрасывается в направлении, противоположном движению и даёт ускорение кораблю. Эффективность этих двигателей достаточно мала, но они достаточно надёжны, дёшевы в производстве и обслуживании. Кроме того они занимают гораздо меньше места на корабле по сравнению с остальными двигателями, поэтому их всё ещё достаточно часто можно встретить на маленьких кораблях. Так как реактивные двигатели являются основой любого полёта в космос, следует исследовать их как можно раньше. Дальнейшее развитие этих двигателей делает следующие корабли с каждым уровнем на 10% быстрее:<br /><br />\r\nмалые транспорты (до тех пор пока не будет исследован импульсный двигатель 5-го уровня) , большие транспорты, лёгкие истребители и шпионские зонды."
  computerTech: Компьютерная технология
  computerTechDesc: С увеличением мощности компьютеров можно командовать всё большим количеством флотов. Каждый уровень компьютерной технологии увеличивает максимальное количество флотов на один.
  computerTechFullDesc: Компьютерная технология предназначена для расширения имеющихся в наличии компьютерных мощностей. В результате на планете развиваются более продуктивные и эффективные компьютерные системы, возрастает вычислительная мощность и скорость протекания вычислительных процессов. С повышением мощности компьютеров можно одновременно командовать всё большим количеством флотов. Каждый уровень развития компьютерной технологии даёт возможность командовать +1 флотом. Чем больше рассылается флотов, тем больше можно совершать налётов и тем самым захватывать больше сырья. Естественно, что эта технология полезна и торговцам, так как она позволяет им одновременно рассылать больше торговых флотов. По этой причине следует постоянно развивать компьютерную технологию на протяжении всей игры.
  continue: Продолжить
  cruiser: Крейсер
  cruiserDesc: Крейсеры почти втрое сильней защищены, чем тяжёлые истребители, а по огневой мощи они превосходят тяжёлые истребители почти в два раза. К тому же они очень быстры.
  cruiserFullDesc: С развитием тяжёлых лазеров и ионных пушек тяжёлые истребители всё больше вытеснялись. Несмотря на многочисленные усовершенствования огневая мощь и бронирование не могли быть настолько изменены, чтобы действенно противостоять этим оборонительным орудиям. Поэтому было решено построить новый класс кораблей, который объединял бы в себе больше бронирования и огневой мощи. Так появился крейсер. Крейсеры почти втрое сильней защищены, чем тяжёлые истребители и обладают более чем удвоенной огневой мощью. К тому же они очень быстры. Нет лучшего оружия против средней защиты. Почти столетие крейсеры неограниченно господствовали во вселенной. С появлением орудий Гаусса и плазменных орудий их господство закончилось. Однако и сегодня их охотно применяют против групп истребителей.
  deathStar: Звезда смерти
  deathStarDesc: Звезда смерти оснащена гигантской гравитонной пушкой, которая может уничтожать корабли и даже луны.
  deathStarFullDesc: Звезда Смерти оснащена гравитонной пушкой, которая может уничтожать все типы кораблей и даже луны. Для производства достаточного количества энергии, звезда смерти практически полностью состоит из генераторов. Только огромные звёздные империи имеют достаточно ресурсов и работников для строительства этого огромного корабля.
  defenseFactory: Оборонный завод
  defenseFactoryFullDesc: В оборонном заводе производятся все виды оборонительных сооружений. Чем он больше, тем быстрее можно строить более сложные и более крупные оборонительные сооружения. Посредством строительства фабрики нанитов производятся миниатюрные роботы, которые помогают работникам работать быстрее.
  defenseFactoryRequired: Необходимо построить оборонный завод.
  demolish: "Уничтожение:"
  demolishNow: '&laquo; Снести &laquo;'
  done: Завершилось
  energyTech: Энергетическая технология
  energyTechDesc: Обладание различными видами энергии необходимо для многих новых технологий.
  energyTechFullDesc: Обладание различными видами энергии необходимо для многих новых технологий.
  espionageSensor: Шпионский зонд
  espionageSensorDesc: Шпионские зонды - это маленькие манёвренные корабли, которые доставляют с больших расстояний данные о флотах и планетах.
  espionageSensorFullDesc: Шпионские зонды - это маленькие манёвренные корабли, которые доставляют с больших расстояний данные о флотах и планетах. Их высокомощный двигатель позволяет им преодолевать большие расстояния за несколько секунд. Однажды попав на орбиту какой-нибудь планеты, они пребывают там некоторое время для сборки данных. В это время враг может их относительно легко обнаружить и атаковать. Для экономии места не было установлено ни брони, ни щитов, ни орудий, что делает зонды в случае обнаружения лёгкими целями.
  eventModeAllianceAttack: Атака альянса
  eventModeAttack: Атака
  eventModeColonize: Колонизация
  eventModeConstruction: Строительство
  eventModeDefense: Оборона
  eventModeDemolish: Снос постройки
  eventModeExpedition: Экспедиция
