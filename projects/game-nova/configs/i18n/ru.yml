  eventModeFleetReturned: Возвращение флота
  eventModeHalt: Остановка
  eventModeHolding: Заморозка
  eventModeMoonDestruction: Уничтожение луны
  eventModePosition: Перемещение флота
  eventModeRecycling: Переработка
  eventModeResearch: Исследование
  eventModeRocketAttack: Атака
  eventModeSpy: Шпионаж
  eventModeTransport: Перемещение транспорта
  exchOffice: Торговое представительство
  exchOfficeDesc: Торговое представительство необходимо для возможности продавать на Межгалактической бирже.
  exchOfficeFullDesc: Торговое представительство необходимо для возможности продавать на Межгалактической бирже. Каждый уровень представительства увеличивает максимальное количество Ваших лотов на 2.
  exchange: Межгалактическая биржа
  exchangeDesc: На межгалактической бирже игроки подают заявки на продажу товаров.
  exchangeFullDesc: Межгалактическая биржа необходима для осуществления торговых сделок в галактиках. Для нормального ее функционирования, необходимо создать и поддерживать в рабочем состоянии инфраструктуру из Межгалактических спутников и Биржевых подстанций.
  expoTech: Экспедиционная технология
  expoTechDesc: Теперь корабли можно оснащать исследовательским модулем, обеспечивающим обработку собранных данных в условиях длительных полётов.
  expoTechFullDesc: Экспедиционная технология охватывает различные технологии сканирования и даёт возможность оснащать корабли различных классов исследовательским модулем. Он содержит базу данных, маленькую передвижную лабораторию, а также различные биоклетки и сосуды для проб. Для безопасности корабля при исследовании опасных объектов исследовательский модуль оснащён автономным энергообеспечением и генератором энергетического поля, который в экстремальных ситуациях может окружать исследовательский модуль мощным энергетическим полем.
  frigate: Линейный крейсер
  frigateDesc: Линейный крейсер специализируется на перехвате вражеских флотов.
  frigateFullDesc: Этот высокотехнологичный корабль несёт смерть атакующим флотам. Его усовершенствованные лазерные орудия удерживают тяжёлые корабли противника на расстоянии и могут уничтожать несколько единиц одним залпом. За счёт его малых размеров и невероятно мощного вооружения, грузоподъёмность линейного крейсера очень мала, но за счёт гиперпространственного двигателя также мало потребление топлива.
  gaussGun: Пушка Гаусса
  gaussGunDesc: Пушка Гаусса ускоряет многотонные заряды с гигантскими затратами энергии.
  gaussGunFullDesc: Долгое время артиллерийские орудия считались устаревшими на фоне развития современной лазерной и ионной техники и постоянно улучшающейся защиты, пока новые исследования в области энергетической технологии не позволили поднять артиллерию на качественно новый уровень. Вообще-то принципы электромагнитных ускорителей масс были известны на Земле уже с 20-го столетия. Один из них - пушка Гаусса. С решением технических трудностей использование ее в качестве оружия стало реальностью. Многотонные снаряды ускоряются магнитным полем при огромных затратах энергии и имеют такую выходную скорость, что частички пыли в воздухе вокруг снаряда сгорают, а звуковая волна сотрясает землю. Даже современная броня и щиты с трудом могут противостоять пробивной силе пушки Гаусса, и нередко случается так, что цель просто простреливается насквозь. Оборонительные сооружения деактивируются сами по себе, как только они сильно повреждаются.
  gravi: Гравитационная технология
  graviDesc: Гравитон - это частица, которая не обладает ни массой ни зарядом и определяет силу притяжения. Путём запуска концентрированного заряда гравитонов можно создавать искусственное гравитационное поле, которое, подобно чёрной дыре, втягивает в себя массу, благодаря чему можно уничтожать корабли или даже луны.
  graviFullDesc: Гравитон - это частица, которая не обладает ни массой ни зарядом и определяет силу притяжения. Путём запуска концентрированного заряда гравитонов можно создавать искусственное гравитационное поле, которое, подобно чёрной дыре, втягивает в себя массу, благодаря чему можно уничтожать корабли или даже луны. Чтобы произвести достаточное количество гравитонов, требуются огромные количества энергии.
  gunTech: Оружейная технология
  gunTechDesc: Оружейная технология делает системы вооружения эффективней. Каждый уровень увеличивает мощность вооружения войсковых частей на 10% от основной мощности.
  gunTechFullDesc: Оружейная технология занимается прежде всего дальнейшим развитием имеющихся в наличии систем вооружения. При этом особое значение придаётся тому, чтобы снабжать имеющиеся в наличии системы большей энергией и более точно эту энергию направлять. Благодаря этому системы вооружения становятся эффективней, а оружие вызывает больше разрушений. Каждый уровень оружейной технологии увеличивает мощность вооружения войсковых частей на 10%. Оружейная технология важна для конкурентоспособного содержания частей. Поэтому следовало бы её постоянно развивать в течение всей игры.
  history: История
  homePlanetRequired: Ваши колонисты уже ищут во вселенной подходящую планету для колонизации. Вы пока можете осмотреться, загляните в чат. При желании ник можно сменить в меню (оно слева) в Настройках (в самом низу).
  hydrogenLab: Синтезатор водорода
  hydrogenLabFullDesc: Совершенствование синтезатора способствует увеличению его эффективности по обработке воды океана планеты и, как следствие, большей выработке водорода. Водород необходим в качестве топлива для кораблей, почти для всех исследований, просмотра галактик, а также для использования сенсорной фаланги.
  hydrogenPlant: Термоядерная электростанция
  hydrogenPlantFullDesc: На термоядерных электростанциях при помощи термоядерного синтеза под огромным давлением и при высокой температуре 2 атома тяжёлого водорода объединяются в один атом гелия. При этом, при образовании ядра гелия, вырабатывается энергия в 41,32*10^-13 Дж в виде излучения (т.о. при сгорании 1 г водорода вырабатывается 172 МВт*ч энергии). Чем больше термоядерный реактор, тем сложнее процессы синтезирования, реактор производит больше энергии. Добыча энергии также может быть повышена за счёт развития энергетической технологии.
  hydrogenStorage: Емкость для водорода
  hydrogenStorageFullDesc: Огромные ёмкости для хранения добытого водорода. Они обычно находятся вблизи космических портов. Чем они больше, тем больше водорода в них может сберегаться. Если они заполнены, то добыча водорода прекращается.
  hyperspaceEngine: Гиперпространственный двигатель
  hyperspaceEngineDesc: Выгибает пространство вокруг корабля. Дальнейшее развитие этих двигателей делает некоторые корабли быстрее.
  hyperspaceEngineFullDesc: Благодаря пространственно-временному изгибу в непосредственном окружении корабля пространство сжимается, чем быстрее преодолеваются далёкие расстояния. Чем выше развит гиперпространственный привод, тем выше сжатие пространства, благодаря чему с каждым уровнем скорость кораблей повышается на 30%.
  hyperspaceTech: Гиперпространственная технология
  hyperspaceTechDesc: Путём сплетения 4-го и 5-го измерения стало возможным исследовать новый более экономный и эффективный двигатель. Кроме этого ученные обнаружили, что искривленное пространство увеличивает радиус действия сенсорной фаланги.
  hyperspaceTechFullDesc: Путём сплетения 4-го и 5-го измерения стало возможным исследовать новый более экономный и эффективный двигатель. Кроме этого ученные обнаружили, что искривленное пространство увеличивает радиус действия сенсорной фаланги на 10% за каждый уровень технологии.
  igrTech: Межгалактическая исследовательская сеть
  ign: Межгалактическая исследовательская сеть
  ignDesc: Эта сеть делает возможным общение учёных, работающих в исследовательских лабораториях разных планет. Каждый новый уровень позволяет присоединить к сети дополнительную лабораторию.
  ignFullDesc: Эта сеть делает возможным общение учёных, работающих в исследовательских лабораториях разных планет. Каждый новый уровень позволяет присоединить к сети дополнительную лабораторию (в первую очередь присоединяются лаборатории старших уровней). Из всех объединённых в сеть лабораторий, в каждом исследовании принимают участие только те, которые имеют достаточный для проведения данного исследования уровень. Скорость исследования соответствует сумме уровней участвующих в нём лабораторий.
  impulseEngine: Импульсный двигатель
  impulseEngineDesc: Импульсный двигатель основывается на принципе отдачи. Дальнейшее развитие этих двигателей делает некоторые корабли быстрее,
  impulseEngineFullDesc: "Импульсный двигатель основывается на принципе отдачи, причём разогрев материи осуществляется в ходе ядерной реакции. Также можно впрыснуть дополнительную массу. Дальнейшее развитие этих двигателей делает следующие корабли с каждым уровнем на 20% быстрее: бомбардировщики, крейсеры, тяжёлые истребители и колонизаторы. Каждый уровень развития увеличивает радиус действия межпланетных ракет."
  inFlight: в полете
  interceptorRocket: Ракета-перехватчик
  interceptorRocketDesc: Ракеты-перехватчики уничтожают атакующие межпланетные ракеты.
  interceptorRocketFullDesc: Ракеты-перехватчики уничтожают атакующие межпланетные ракеты. Одна ракета-перехватчик уничтожает одну межпланетную ракету.
  interplanetaryRocket: Межпланетная ракета
  interplanetaryRocketDesc: Межпланетные ракеты уничтожают вражескую оборону.
  interplanetaryRocketFullDesc: Межпланетные ракеты уничтожают защиту противника. Уничтоженные межпланетными ракетами оборонительные сооружения больше не восстанавливаются.
  ionGun: Ионное орудие
  ionGunDesc: Ионное орудие направляет на цель волну ионов, которая дестабилизирует щиты и повреждает электронику.
  ionGunFullDesc: В 21-м столетии на Земле уже существовало то, что общеизвестно как ЭМИ. ЭМИ означает электромагнитный импульс, который обладает способностью индуцировать дополнительные напряжения в схемы и тем самым причинять массовые помехи, которые могут уничтожить все чувствительные приборы. Тогда ЭМИ-орудия были в основном на базе ракет и бомб, также в комбинации с ядерными орудиями. Между тем ЭМИ-орудия постоянно развивались, так как в них видели большой потенциал не уничтожать цели, а делать их неспособными к бою и манёвренности и, тем самым, упрощать их захват. Пока что наивысшая форма ЭМИ-орудий представлена ионным орудием. Оно направляет на цель волну ионов (электрически заряженных частиц), которая дестабилизирует щиты и повреждает электронику, только если она не очень хорошо защищена, что иногда подобно полному уничтожению. Кинетической пробивной силой можно пренебречь. Ионная техника используется только на крейсерах, так как потребление энергии ионными орудиями огромно, и в бою часто приходится уничтожать, а не парализовать цель. Оборонительные сооружения деактивируются сами по себе, как только они сильно повреждаются.
  ionTech: Ионная технология
  ionTechDesc: Поистине смертоносный наводимый луч из ускоренных ионов. При попадании на какой-либо объект они наносят огромный ущерб.
  ionTechFullDesc: Поистине смертоносный наводимый луч из ускоренных ионов. При попадании на какой-либо объект они наносят огромный ущерб.
  lancerShip: Лансер
  lancerShipDesc: Быстрый и эффективный военный корабль, построенный на самых современных технологиях. Оснащен мощнейшим вооружением, но для перезарядки оружие требует некоторого времени, что исключает скорострельность.
  lancerShipFullDesc: Быстрый и эффективный военный корабль, построенный на самых современных технологиях. Оснащен мощнейшим вооружением, которое способно наносить катастрофические разрушения противнику. Для перезарядки энергетической пушки корабля требуется время, поэтому корабль не обладает скорострельностью. Корабль спроектирован учеными, как вспомогательное оружие при нанесении масштабного удара врагу, поэтому наиболее эффективен в сочетании с остальным флотом.
  largeShield: Большой щитовой купол
  largeShieldDesc: Дальнейшее развитие малого щитового купола. Он может сдерживать ещё более сильные атаки на планету, поглощая значительно большее количество энергии.
  largeShieldFullDesc: Дальнейшее развитие малого щитового купола. Он может сдерживать ещё более сильные атаки на планету, поглощая значительно большее количество энергии. Возможное количество щитовых куполов зависит от уровня щитовой технологии. С каждым повышением уровня щитовой технологии можно строить на 1 большой щитовой купол больше.
  largeTransporter: Большой транспорт
  largeTransporterDesc: Дальнейшее развитие малых транспортов позволило создать корабли, обладающие большей вместительностью и, благодаря более развитому двигателю, способными передвигаться быстрее, чем малый транспорт.
  largeTransporterFullDesc: На борту этого корабля есть лишь слабое вооружение и нет серьёзных технологий... По этой причине их никогда не следует запускать без сопровождения. Благодаря своему высокоразвитому реактивному двигателю большой транспорт служит в качестве быстрого межпланетного доставщика ресурсов, также он сопровождает флоты при нападениях на вражеские планеты, чтобы захватить как можно больше ресурсов.
  laserTech: Лазерная технология
  laserTechDesc: Благодаря фокусированию света возникает луч, который при попадании на объект наносит ему повреждения.
  laserTechFullDesc: Лазеры (усиление света при помощи индуцированного выброса излучения) производят насыщенный энергетический луч когерентного света. Эти приборы находят применение во всевозможных областях, от оптических компьютеров до тяжёлых лазеров, которые свободно режут броню космических кораблей. Лазерная технология является важным элементом для исследования дальнейших оружейных технологий.
  leave: ПОКИНУТЬ
  lightFighter: Легкий истребитель
  lightFighterDesc: Лёгкий истребитель - это манёвренный корабль, который можно найти почти на каждой планете. Затраты на него не особо велики, главное предназначение - поддержка в сражении для крупных кораблей.
  lightFighterFullDesc: Лёгкий истребитель - это манёвренный корабль, который можно найти почти на каждой планете. Он имеет слабую защиту и простые системы вооружения и служит в качестве атакующего корабля поддержки. Его скорость в сочетании с большим количеством, могут обеспечить превосходную буферную зону и защиту для более крупных кораблей.
  lightLaser: Легкий лазер
  lightLaserDesc: При помощи концентрированного обстрела цели фотонами можно достичь значительно бoльших разрушений, чем при применении обычного баллистического вооружения.
  lightLaserFullDesc: Для компенсации чрезмерных успехов в области технологии космических кораблей, учёные должны были создать оборонительное сооружение, справляющееся с более крупными и лучше вооружёнными флотами. Это привело к появлению лёгкого лазера. При помощи концентрированного обстрела цели фотонами можно достичь значительно больших разрушений, чем при применении обычного баллистического вооружения. Для противостояния более сильной огневой мощи новых типов кораблей он также оснащён усовершенствованными щитами. Однако, чтобы стоимость производства оставалась низкой, структура дальше не усиливалась. Лёгкий лазер обладает наилучшим соотношением цены и качества, поэтому он также интересен и для более развитых цивилизаций. Оборонительные сооружения деактивируются сами по себе, как только они сильно повреждаются.
  located: Находится
  maskingTech: Маскировочная технология
  maskingTechDesc: Технология радио-локационной маскировки создает помехи в работе баллистического анализатора и систем наведения огня противника.
  maskingTechFullDesc: Технология радио-локационной маскировки создает помехи в работе баллистического анализатора и систем наведения огня противника. Эта технология увеличивает живучесть своих юнитов за счет уменьшения точности стрельбы огневых орудий противника.
  memoryModule1101: Модуль памяти
  memoryModule1101Desc: Дает возможность изучить инопланетную технологию.
  memoryModule1101FullDesc: Иногда в экспедициях удается найти инопланетные модули памяти и расшифровать хранящиеся в них данные. Этот модуль содержит информацию об инопланетной технологии 1 уровня.
  memoryModule1515: Модуль памяти
  memoryModule1515Desc: "Повышает уровень оружейной технологии до 15.<br /><i>Требования: Оружейная технология (Уровень 14)</i>"
  memoryModule1515FullDesc: Иногда в экспедициях удается найти инопланетные модули памяти и расшифровать хранящиеся в них данные. Этот модуль содержит информацию об оружейной технологии 15 уровня.
  memoryModule1615: Модуль памяти
  memoryModule1615Desc: "Повышает уровень щитовой технологии до 15.<br /><i>Требования: Щитовая технология (Уровень 14)</i>"
  memoryModule1615FullDesc: Иногда в экспедициях удается найти инопланетные модули памяти и расшифровать хранящиеся в них данные. Этот модуль содержит информацию о щитовой технологии 15 уровня.
  memoryModule1715: Модуль памяти
  memoryModule1715Desc: "Повышает уровень броневой технологии до 15.<br /><i>Требования: Броневая технология (Уровень 14)</i>"
  memoryModule1715FullDesc: Иногда в экспедициях удается найти инопланетные модули памяти и расшифровать хранящиеся в них данные. Этот модуль содержит информацию о броневой технологии 15 уровня.
  memoryModule2312: Модуль памяти
  memoryModule2312Desc: "Повышает уровень лазерной технологии до 12.<br /><i>Требования: Лазерная технология (Уровень 11)</i>"
  memoryModule2312FullDesc: Иногда в экспедициях удается найти инопланетные модули памяти и расшифровать хранящиеся в них данные. Этот модуль содержит информацию о лазерной технологии 12 уровня.
  memoryModule281: Модуль памяти
  memoryModule281Desc: Дает возможность изучить гравитационную технологию.
  memoryModule281FullDesc: Иногда в экспедициях удается найти инопланетные модули памяти и расшифровать хранящиеся в них данные. Этот модуль содержит информацию о гравитационной технологии 1 уровня.
  merchantsMark: Знак торговца
  merchantsMarkDesc: Уменьшает комиссию при обмене ресурсов до 3%.
  merchantsMarkFullDesc: Дает возможность совершать обмен ресурсов со сниженной до 3% комиссией.
  metalStorage: Хранилище металла
  metalStorageFullDesc: Огромное хранилище для добытых руд. Чем оно больше, тем больше металла можно в нём хранить. Если оно заполнено, то добыча металла прекращается.
  metalmine: Рудник по добыче металла
  metalmineFullDesc: Основной поставщик сырья для строительства несущих структур построек и кораблей. Металл - самое дешёвое сырьё, но зато его требуется больше, чем всего остального. Для производства металла требуется меньше всего энергии. Чем рудники больше, тем они глубже. На большинстве планет металл находится на больших глубинах, при помощи этих более глубоких рудников можно добывать больше металлов, производство растёт. В то же время более крупные рудники требуют больше энергии.
  moonBase: Лунная база
  moonBaseDesc: Луна не располагает атмосферой, поэтому перед заселением требуется соорудить лунную базу.
  moonBaseFullDesc: Луна не располагает атмосферой, поэтому перед заселением требуется соорудить лунную базу. Она обеспечивает необходимые воздух, гравитацию и тепло. Чем выше уровень развития лунной базы, тем больше обеспеченная биосферой площадь. Каждый уровень лунной базы может застроить 3 поля, максимум до площади всей луны. Она составляет 2 (диаметр луны/1000)^2, причём каждый уровень лунной базы сам занимает одно поле.
  moonCreator: Лунный творец
  moonCreatorDesc: Позволяет создать луну на орбите планеты.
  moonCreatorFullDesc: Позволяет создать луну на орбите планеты.
  moonHydrogenLab: Лунный синтезатор водорода
  moonHydrogenLabFullDesc: Лунный синтезатор добывает водород изо льда с кратеров, расположенных на полюсах луны. Это самые темные и неизведанные места на луне, туда никогда не попадает свет со звезды. Ученные активно работают над изучением скрытых возможностей по добыче водорода на луне. Энергию для синтезатора могут дать захваченные в бою солнечные спутники.
  moonRoboticFactory: Лунная фабрика роботов
  moonRoboticFactoryFullDesc: Предоставляет простую рабочую силу, которую можно применять при строительстве планетарной инфраструктуры. Каждый уровень развития фабрики повышает скорость строительства зданий.
  nanoFactory: Фабрика нанитов
  nanoFactoryFullDesc: Фабрика нанитов представляет собой венец робототехники. Наниты - это роботы размером в нанометр, которые путём объединения в сеть в состоянии выполнять экстраординарные задания. Сразу же после исследования они увеличивают производительность почти во всех областях. С каждым уровнем фабрика нанитов сокращает время строительства зданий, кораблей и оборонительных сооружений вдвое.
  noArtefacts: Нет артефактов
  noExchangeSlots: Недостаточно уровней Межгалактической биржи
  onPlanet: на планете
  options: Установки
  packBuildingNow: Запаковать текущий уровень в артефакт
  packResearchNow: Запаковать исследование
  planetCreator: Планетарный творец
  planetCreatorDesc: Позволяет создать дополнительную планету. Необходимо отправить в составе флота с колонизатором на свободные координаты.
  planetCreatorFullDesc: Позволяет создать дополнительную планету. Необходимо отправить в составе флота с колонизатором на свободные координаты.
  plasmaGun: Плазменное орудие
  plasmaGunDesc: Лазерная технология была доведена до совершенства, ионная техника достигла конечной стадии.
  plasmaGunFullDesc: Лазерная технология была доведена до совершенства, ионная техника достигла конечной стадии и считалось, что практически невозможно, даже с качественной точки зрения орудийной системы, достичь ещё большей эффективности. Но всё должно было измениться, когда появилась идея объединить обе системы. Используя технологии термоядерного синтеза, лазерами нагревают вещество (обычно водород) до сверхвысоких температур, достигающих миллионов градусов. Ионная техника обеспечивает обогащение плазмы электрическим зарядом, её стабилизацию и ускорение. Как только заряд достаточно нагрет, ионизирован и находится под давлением, то его выпускают при помощи ускорителей в направлении цели. Светящийся голубоватым цветом плазменный шар выглядит внушительно, только спрашивается, долго ли им будет наслаждаться команда корабля-цели, если через несколько секунд броня разорвётся на куски, а электроника сгорит... Плазменное орудие считается вообще самым страшным оружием, и у этой техники есть своя цена. Оборонительные сооружения деактивируются сами по себе, как только они сильно повреждаются.
  plasmaTech: Плазменная технология
  plasmaTechDesc: Дальнейшее развитие ионной технологии, которая ускоряет не ионы, а высокоэнергетическую плазму. Она оказывает опустошительное действие при попадании на какой-либо объект.
  plasmaTechFullDesc: Дальнейшее развитие ионной технологии, которая ускоряет не ионы, а высокоэнергетическую плазму. Она оказывает опустошительное действие при попадании на какой-либо объект.
  powerGenerator: Энерготранс
  powerGeneratorDesc: Увеличивает выработку энергии на 10%.
  powerGeneratorFullDesc: Дает прирост производительности всех электростанций и спутников на 10%.
  productionTime: "Нужно времени:"
  queueDisassemblePrefix: Утилизация
  queueRepairPrefix: Ремонт
  recycler: Переработчик
  recyclerDesc: С помощью переработчика добывается сырьё из обломков.
  recyclerFullDesc: Космические бои принимали всё большие масштабы. Уничтожались тысячи кораблей и возникавшие при этом обломки казались навсегда потерянными. Нормальные транспорты не могли близко к ним приблизиться, не будучи сильно повреждёнными маленькими обломками. С новым открытием в области щитовой технологии стало возможно эффективно устранять эту проблему, возник новый класс корабля, подобный большому транспорту - переработчик. С его помощью можно было заново использовать казавшиеся потерянными ресурсы. Из-за новых щитов маленькие обломки больше не представляли собой опасности. К сожалению, эти устройства требуют пространства, поэтому его грузовой тоннаж ограничен до 20 000.
  regAgree: Прочел и согласен.
  regAgreement: Ознакомтесь с пользовательским соглашением.
  regNoAgreement: Вы не согласились с пользовательским соглашением.
  repairBot: Ремонтный робот
  repairBotDesc: Ремонтирует все корабли на планете.
  repairBotFullDesc: Ремонтный робот способен анализировать структуру любых кораблей и восстанавливать их броню. За один запуск он способен отремонтировать весь флот на планете. Однако робот имеет ограниченный запас энергии, поэтому после трех запусков он становится бесполезным.
  repairFactory: Ремонтный ангар
  repairFactoryDesc: Ремонтный ангар необходим для ремонта поврежденных и утилизации ненужных юнитов.
  repairFactoryFullDesc: "Ремонтный ангар необходим для выполнения двух операций: 1 - ремонт поврежденных кораблей и оборонительных сооружений, 2 - утилизация ненужных кораблей и обороны для получения ресурсов."
  repairRequired: Необходимо построить ангар.
  requireTime: Время
  requireTimeExt: Время строительства
  requires: Требуется
  researchLab: Исследовательская лаборатория
  researchLabFullDesc: Для исследования новых технологий необходима работа исследовательской станции. Уровень развития исследовательской станции является решающим фактором того, как быстро могут быть освоены новые технологии. Чем выше уровень развития исследовательской лаборатории, тем больше может быть исследовано новых технологий. Для того, чтобы как можно быстрее завершить исследовательские работы на одной планете, на неё посылаются все имеющиеся в наличии учёные и, таким образом, покидают свои планеты. Как только технология исследована, учёные возвращаются на свои родные планеты и переносят с собой знания о ней. Так новые технологии можно применять и на других планетах.
  researchLabRequired: Необходимо построить исследовательскую лабораторию.
  robotControlSystem: Система управления роботами
  robotControlSystemDesc: 'Система управления роботами (СУР) повышает в 2 раза скорость строительства зданий, флота и обороны. Срабатывает для заданий запущенных после активации СУР. После деактивации, ускоренные задания не замедляются! '
  robotControlSystemFullDesc: Система управления роботами (СУР) позволяет эффективнее распределять задачи для роботов при строительстве на планете зданий, флота и обороны. Скорость строительства увеличивается в 2 раза. Срабатывает для заданий запущенных после активации СУР. После деактивации, ускоренные задания не замедляются! Два СУР увеличат скорость строительства в 4-е раза!
  roboticFactory: Фабрика роботов
  roboticFactoryFullDesc: Предоставляет простую рабочую силу, которую можно применять при строительстве планетарной инфраструктуры. Каждый уровень развития фабрики повышает скорость строительства зданий.
  rocketLauncher: Ракетная установка
  rocketLauncherDesc: Ракетная установка - простое и дешёвое средство обороны.
  rocketLauncherFullDesc: Ракетная установка - простое и дешёвое средство обороны. Так как это развитие обычных баллистических орудий, то ему не требуется дальнейшей модернизации. Малые затраты на его производство оправдывают его применение против более маленьких флотов, но со временем он теряет значение. Позднее его используют лишь для отвода вражеских выстрелов. Оборонительные сооружения деактивируются сами по себе, как только они сильно повреждаются.
  rocketStation: Ракетная шахта
  rocketStationDesc: Служит для хранения ракет.
  rocketStationFullDesc: Ракетные шахты служат для хранения ракет. С каждым уровнем можно хранить на пять межпланетных или десять ракет-перехватчиков больше. Одна межпланетная ракета требует места в два раза больше, чем ракета-перехватчик. Возможно любое комбинирование различных типов ракет.
  sampleArtefact: Артефакт
  sampleArtefactDesc: Это какой-то артефакт
  sampleArtefactFullDesc: Это какой-то артефакт
  shadowShip: Тень
  shadowShipDesc: Быстрый и неуловимый корабль для эффективного обстрела противника с большого расстояния.
  shadowShipFullDesc: Быстрый и неуловимый корабль для эффективного обстрела противника.  Корабль Тень - это секретная военная разработка лучших ученых империи. Он появился при переработке и модернизации Легкого истребителя. Специально разработанное для Тени многозарядное орудие идеально приспособлено для стрельбы по большим кораблям противника. Тень обладает совершено новой системой вооружения, способной вести прицельный огонь с огромных расстояний, новым генератором щитового поля, высокой маневренностью и генератором помех для улучшения маскировки.
  shellTech: Броневая технология
  shellTechDesc: Специальные сплавы улучшают броню космических кораблей. Так, устойчивость брони может увеличиваться с каждым уровнем на 10%.
  shellTechFullDesc: Специальные сплавы улучшают броню космических кораблей. Как только найден очень стойкий сплав, специальные лучи изменяют молекулярную структуру космического корабля, и доводит её до состояния изученного сплава. Так, устойчивость брони может увеличиваться с каждым уровнем на 10%.
  shieldTech: Щитовая технология
  shieldTechDesc: Эта технология делает щиты кораблей и оборонительных сооружений эффективней. Каждый уровень повышает эффективность щитов на 10% от основной мощности. С каждым уровнем можно строить больше защитных куполов.
  shieldTechFullDesc: Развитие этой технологии позволяет увеличивать снабжение энергией щитов и защитных экранов, что в свою очередь повышает их устойчивость и способность поглощать или отражать энергию атак противника. Благодаря этому с каждым изученным уровнем эффективность корабельных щитов и стационарных генераторов энергополей повышается на 10% от номинальной мощности. Кроме этого, с каждым уровнем можно строить в обороне больше защитных куполов. Каждый уровень позволяет построить один большой щитовой купол или два малых. Возможно любое комбинирование щитовых куполов.
  shipyard: Верфь
  shipyardFullDesc: В строительной верфи производятся все виды кораблей. Чем она больше, тем быстрее можно строить более сложные и более крупные корабли. Посредством строительства фабрики нанитов производятся миниатюрные роботы, которые помогают работникам работать быстрее.
  shipyardRequired: Необходимо построить верфь.
  siliconLab: Рудник по добыче кремния
  siliconLabFullDesc: Основной поставщик сырья для электронных строительных элементов и сплавов. Для добычи кремния требуется примерно вдвое больше энергии, чем для добычи металла, поэтому он, соответственно, ценится больше. Кремний требуется для всех кораблей и зданий. К сожалению, так необходимые для строительства и исследований, месторождения кремния обычно очень редки и, как и большинство металлов, залегают на больших глубинах. Поэтому при усовершенствовании рудника также повышается производство, так как осваиваются более крупные и чистые залежи кремния.
  siliconStorage: Хранилище кремния
  siliconStorageFullDesc: В этом огромном хранилище складируется ещё не обработанный кремний. Чем больше хранилище, тем больше кремния туда помещается. Если оно заполнено, то добыча данного ресурса прекращается.
  simTechList: Технологии
  simulate: Симулировать
  smallShield: Малый щитовой купол
  smallShieldDesc: Малый щитовой защищает планету и поглощает удары атаки.
  smallShieldFullDesc: Задолго до того, как щитовые генераторы стали достаточно малы для того, чтобы найти применение на кораблях, уже существовали огромные генераторы на поверхности планет. Они обволакивали целую планету силовым полем, которое могло поглощать удары атаки. Малые атакующие флоты постоянно разбиваются об эти щитовые купола. Благодаря растущему технологическому развитию эти щиты можно ещё усилить. Возможное количество щитовых куполов зависит от уровня щитовой технологии. С каждым повышением уровня щитовой технологии можно строить на 2 малых щитовых купола больше.
  smallTransporter: Малый транспорт
  smallTransporterDesc: Малый транспорт - это манёвренный корабль, который может быстро транспортировать сырьё на другие планеты.
  smallTransporterFullDesc: Транспорты имеют примерно такой же размер, что и истребители, но они не обладают мощными двигателями и бортовым вооружением ради экономии места. Малый транспорт вмещает 5000 единиц сырья. По причине малой огневой мощи малые транспорты часто сопровождаются другими кораблями.Когда импульсный двигатель исследован до 5-й ступени, у малого транспорта повышается базовая скорость и он оснащается этим типом двигателя.
  solarPlant: Солнечная электростанция
  solarPlantFullDesc: Для обеспечения энергией рудников и синтезаторов необходимы огромные солнечные электростанции. Чем больше построено станций, тем больше поверхности покрыто кварцевыми пластинами, которые перерабатывают световую энергию в электроэнергию. Солнечные электростанции представляют собой основу энергообеспечения планеты.
  solarSatellite: Солнечный спутник
  solarSatelliteDesc: Солнечные спутники - это простые платформы из солнечных батарей, которые находятся на высокой орбите. Они собирают солнечный свет и передают его с помощью лазера на наземную станцию.
  solarSatelliteFullDesc: "Солнечные спутники запускаются на орбиту планеты. Они собирают солнечную энергию и передают её на наземную станцию. Эффективность солнечных спутников зависит от мощи солнечного излучения. В принципе, добыча энергии на орбитах, более приближённых к солнцу, выше, чем на планетах, удалённых от солнца. Из-за своего соотношения цены и качества солнечные спутники решают энергетические проблемы многих миров. Но внимание: солнечные спутники могут быть уничтожены в бою."
  spyware: Шпионаж
  spywareDesc: С помощью этой технологии добываются данные о других планетах.
  spywareFullDesc: Шпионаж предназначен для исследования новых и более эффективных сенсоров. Чем выше развита эта технология, тем больше информации имеет игрок о событиях в своём окружении. Разница в уровнях шпионажа с противником играет решающую роль - чем больше исследована собственная шпионская технология, тем больше информации содержится в разведданных и тем меньше шанс быть обнаруженным. Чем больше послано зондов, тем больше собирается подробностей о противнике, но при этом растёт опасность быть обнаруженным. Также шпионаж совершенствует определение местонахождения чужих флотов. При этом также важен уровень развития собственного шпионажа. Начиная со второго уровня его развития при атаке на Вас кроме сообщения о нападении показывается также и общая численность нападающих кораблей. С четвёртого уровня распознаётся вид нападающих кораблей, равно как и их общая численность, а с восьмого - точная численность каждого типа кораблей. Для налётчиков эта технология очень важна, так как она предоставляет информацию о том, выставила ли жертва флот и/или защиту или нет, поэтому следует исследовать её как можно раньше. Лучше всего - сразу же после исследования малых транспортов.
  starDestroyer: Уничтожитель
  starDestroyerDesc: Уничтожитель - король среди военных кораблей.
  starDestroyerFullDesc: Уничтожитель - король среди военных кораблей. Его мультифланговые ионные, плазменные и гауссовые орудийные башни могут благодаря своим усовершенствованным пеленгационным сенсорам поражать с точностью до 99% даже скоростные манёвренные истребители. Так как уничтожители очень велики, их манёвренность очень ограничена, и в бою они подобны скорее боевой станции, чем боевому кораблю. Потребление водорода у них так же высоко, как и их боевая мощь.
  starGate: Межгалактические врата
  starGateDesc: Ворота - это огромные телепортеры, которые могут пересылать между собой флоты любых размеров без временных затрат.
  starGateFullDesc: Ворота - это огромные телепортеры, которые могут пересылать между собой флоты любых размеров без временных затрат. Эти телепортеры не требуют водорода, однако между двумя прыжками должен пройти один час, иначе ворота перегреются. Невозможна также пересылка ресурсов. Весь процесс требует крайне высоко развитой технологии.
  starSurveillance: Сенсорная фаланга
  starSurveillanceDesc: Высокочастотные сенсоры полностью просматривают спектр частот всех попадающих на фалангу излучений.
  starSurveillanceFullDesc: Высокочастотные сенсоры полностью просматривают спектр частот всех попадающих на фалангу излучений. Мощные компьютеры комбинируют мельчайшие колебания энергии и таким образом получают информацию о передвижениях кораблей на отдалённых планетах. Для просмотра на луне должна быть предоставлена энергия в форме водорода (5 000 за просмотр). Просмотр осуществляется переходом с луны в меню Галактика и нажатием на соответствующую иконку в меню Действие планеты, находящейся в радиусе действия сенсоров.
  staticArtefact: Неприкрепляемый артефакт
  staticArtefactDesc: Это артефакт без возможности прикрепления к флоту
  staticArtefactFullDesc: Это артефакт без возможности прикрепления к флоту
  storageCapicity: Вместимость
  strongFighter: Тяжелый истребитель
  strongFighterDesc: Дальнейшее развитие лёгкого истребителя, он лучше защищён и обладает большей силой атаки.
  strongFighterFullDesc: При дальнейшем развитии лёгкого истребителя учёные дошли до момента, когда стало ясно, что обыкновенный двигатель не обладает необходимой мощью. Для того, чтобы оптимально передвигать корабль, был впервые использован импульсный двигатель. Хоть он и повысил стоимость, однако он также открыл новые возможности. Благодаря применению этого двигателя осталось больше энергии для вооружения и щитов, кроме того, для этого вида истребителей также использовались ценные материалы. Это привело к улучшенной структурной целостности и более сильной огневой мощи, благодаря чему в бою он представляет большую угрозу, чем его предшественник. После этих изменений тяжёлый истребитель представляет собой новую эру технологии кораблестроения, основу технологии крейсеростроения.
  strongLaser: Тяжелый лазер
  strongLaserDesc: Тяжёлый лазер представляет собой дальнейшее развитие лёгкого лазера.
  strongLaserFullDesc: Тяжёлый лазер представляет собой дальнейшее развитие лёгкого лазера. Структура была усилена и усовершенствована новыми материалами. Оболочку смогли сделать значительно более стойкой. Одновременно была улучшена и энергетическая система и целевой компьютер, так что тяжёлый лазер может концентрировать значительно больше энергии на цели. Оборонительные сооружения деактивируются сами по себе, как только они сильно повреждаются.
  supercomputer: Суперкомпьютер
  supercomputerDesc: Повышает уровень компьютерной технологии на 1 и увеличивает скорость исследований в два раза. Срабатывает для исследований запущенных после активации Суперкомпьютера.
  supercomputerFullDesc: В одной из экспедиций удалось захватить уникальное инопланетное устройство, которое при подробном изучении оказалось суперкомпьютером инопланетян. Суперкомпьютер удалось привести в действие и включить в исследовательскую сеть. Он обладает огромной вычислительной мощностью и способен контролировать действия дополнительного флота. Одновременно с этим Суперкомпьютер занимается решением наиболее сложных исследовательских задач, уменьшая время исследований в 2 раза. Срабатывает для исследований запущенных после активации Суперкомпьютера. После деактивации, ускоренные исследования не замедляются! Два Суперкомпьютера увеличат скорость исследований в 4-е раза!
  terraFormer: Терраформер
  terraFormerDesc: Терраформер может преобразовывать огромные территории делая их пригодными для застройки.
  terraFormerFullDesc: По мере застройки планет всё более важным становился вопрос об ограниченности пригодных для использования площадей. Такие традиционные методы, как строительство ввысь и вглубь, оказались недостаточными. Маленькая группа физиков и нанотехников нашла решение - терраформер. Затрачивая огромное количество энергии терраформер может преобразовывать огромные территории и даже целые континенты, делая их пригодными для застройки. В этом строении беспрерывно производятся специальные наниты, отвечающие за постоянное качество почвы.
  twSimulator: Идут технические работы, симуляция боя недоступна.
  uniqueArtefact: Уникальный артефакт
