  msgCreditExchangeFromReserve: "На Вашей бирже был выставлен лот, заработанная комиссия составила {@credits} кредитов."
  msgCreditExchangeProfit: "На Вашей бирже произошла покупка, заработанная комиссия составила {@credits} кредитов."
