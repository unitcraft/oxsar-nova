  msgCreditForMiner: "За повышение шахтерского уровня Вам был начислен бонус {@credits} кредитов."
  msgCreditForVip: "Вы запустили задание вне очереди за {@credits} кредитов."
  msgCreditMarket: "Вы купили на рынке ресурсы за {@credits} кредитов."
  msgDeactivateArtefact: "Выключился артефакт {@name} на {@coords}"
  msgDelayArtefact: "Перезарядился артефакт {@name} на {@coords}"
  msgDisapearArtefact: "Истек срок годности артефакта {@name} на {@coords}"
  msgDisapearArtefactUsed: "Полностью израсходован артефакт {@name} на {@coords}"
  msgExpireArtefact: "Выключился артефакт {@name} на {@coords}"
  neutralPlanetDie: "Оказывается не зря инопланетный флот так бился за эту планету. В её коре стали проявляться невиданные по силе гравитационные аномалии и, прежде чем ученые успели исследовать их, планета {@planet} развалилась на субматерию."
  neutralPlanetFound: "После длительных блужданий по просторам вселенной, сенсоры экспедиции засекли странную активность в районе {@planet}.<br/>Подлетев поближе, ученые обнаружили, что это неизвестная ранее планета инопланетян с обломками от сражения. Видимо кто-то недавно разбил тут большой флот. На орбите планеты обнаружены обломки: {@metal} металла и {@silicon} кремния. Поспешите, чтобы забрать их, т.к. планета не стабильна и скоро разрушится, кроме этого о планете известно кому-то еще!"
  planetColonized: "Колонисты обнаружили планету на координатах {{arg1}} с условиями, пригодными для жизни и начинают осваивать колонию."
  planetOccupied: "Ваш флот достиг координат {{arg1}}, но эта планета уже занята. Колонисты возвращаются на базу."
  positionReport: "Ваш флот ({{arg1}}) достиг планеты {{arg2}} {{arg3}}. <br /> Флот оставил груз: {{arg4}} металла, {{arg5}} кремния и {{arg6}} водорода."
  positionReportSubject: Быстрое размещение
  recylcingReport: "Ваши {{arg1}} переработчиков добыли {{arg2}} ресурсов. На координатах было {{arg3}} металла и {{arg4}} кремния. Вы добыли {{arg5}} металла и {{arg6}} кремния."
  recylcingReportSubject: "Поле обломков: {{arg1}}"
  retreatOther: "{@username} отменил Удержание на {@planet_from} {@coords_from}. Ваш флот ({@fleet}) возвращается на {@planet} {@coords}."
  retreatOtherSubject: Отмена удержания
  rocketAttackMsgAttacker: "Ракетная атака на планету {@planet} {@coords} завершилось успешно. Игрок {@defender} лишился {@lostunits} очков после атаки {@rockets} межпланетыми ракетами."
  rocketAttackMsgDefender: "Ваша планета {@planet} {@coords} была подвержена ракетной атаке. Игрок {@attacker} атаковал {@rockets} ракетами. Потери составляют {@lostunits} очков."
  rocketAttackReportHeadline: "Ракетная атака на {@planet} {@coords}"
  rocketAttackSubject: Ракетная атака
  tooManyPlanets: "Ваш флот достиг координат {{arg1}}, но при попытке колонизировать планету в соседних империях возникли недовольства по поводу количества Ваших колоний. Флот возвращается назад."
  tranportSubject: Поставка ресурсов
  transportAccomplished: "Ваш флот достиг {{arg1}} {{arg2}}. <br /> Флот доставил груз: {{arg3}} металла, {{arg4}} кремния и {{arg5}} водорода."
  transportAccomplishedArtefact: "Флот с биржи доставил артефакт:<br /> {{arg1}}."
  transportAccomplishedOther: "Чужой флот с {{arg1}} {{arg2}} от {{arg3}} достиг {{arg4}} {{arg5}}. <br /> Флот доставил груз: {{arg6}} металла, {{arg7}} кремния и {{arg8}} водорода."
  transportAccomplishedToOther: "Ваш флот с {{arg1}} {{arg2}} достиг {{arg3}} {{arg4}}. <br /> Флот доставил груз: {{arg5}} металла, {{arg6}} кремния и {{arg7}} водорода."
  welcome.title: Добро пожаловать в oxsar-nova
  welcome.body: "Приветствую, {{username}}! Ваше приключение начинается на планете {{planet_name}} в координатах {{coords}}. Загляните во вкладку Постройки — metal_mine и silicon_lab начнут добычу сразу, solar_plant даст им энергию. Удачи в галактике."
  starterGuide.title: Краткая инструкция
  "starterGuide.body": "Основные вкладки:\n- Постройки: шахты, верфь, ремонтная фабрика.\n- Исследования: открывают новые корабли и улучшают бой.\n- Верфь: стройте корабли и оборону.\n- Галактика: разведка пустых и чужих систем.\n- Флот: отправка транспортов, атак, шпионов, колоний.\n- Ракеты: удары по обороне противника.\n- Рынок: обмен ресурсов. Рынок артефактов: артефакты за credit.\n- Офицеры: временные бонусы к факторам.\n- Сообщения: боевые отчёты и шпионаж.\n- Достижения: прогресс игрока."
  firstAttackReceived.title: Вас атакуют!
  firstAttackReceived.body: "Игрок {{attacker}} направил флот на вашу планету {{planet_name}}. Прибытие: {{arrive_at}}. Рекомендуется укрепить оборону или отправить транспортом ресурсы в безопасное место."
  inactivityReminder.title: "Давно не виделись, {{username}}!"
  inactivityReminder.body: "Прошло несколько дней с вашего последнего визита. Не забывайте — ваши шахты продолжают добычу, хранилища могут переполниться. Возвращайтесь и проверьте статус ваших планет."
  # План 72.1.15: уведомление при списании кредитов за смену профессии
  # (legacy MSG_CREDIT_PROFESSION_CHANGED, папка MSG_FOLDER_CREDIT=8).
