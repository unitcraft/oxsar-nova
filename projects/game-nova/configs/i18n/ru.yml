  creditProfessionChanged.body: "Списано {{credits}} кредитов за смену профессии на «{{profession}}»."
  creditProfessionChanged.noneLabel: "без профессии"
  # План 72.1.20: surveillance detected (legacy MSG_SURVEILLANCE_DETECTED, folder=11).
  surveillanceDetected.title: "Обнаружено сканирование"
  surveillanceDetected.body: "Ваша планета «{{planet}}» [{{galaxy}}:{{system}}:{{position}}] была отсканирована чужой сенсорной фалангой. Уровень ваших шпионских технологий позволил детектировать попытку."
  # План 72.1.21: legacy `MSG_CREDIT_MARKET` — покупка ресурсов на банке.
