  # TODO: en
  welcome.title: Добро пожаловать в oxsar-nova
  welcome.body: "Приветствую, {{username}}! Ваше приключение начинается на планете {{planet_name}} в координатах {{coords}}. Загляните во вкладку Постройки — metal_mine и silicon_lab начнут добычу сразу, solar_plant даст им энергию. Удачи в галактике."
  starterGuide.title: Краткая инструкция
  "starterGuide.body": "Основные вкладки:\n- Постройки: шахты, верфь, ремонтная фабрика.\n- Исследования: открывают новые корабли и улучшают бой.\n- Верфь: стройте корабли и оборону.\n- Галактика: разведка пустых и чужих систем.\n- Флот: отправка транспортов, атак, шпионов, колоний.\n- Ракеты: удары по обороне противника.\n- Рынок: обмен ресурсов. Рынок артефактов: артефакты за credit.\n- Офицеры: временные бонусы к факторам.\n- Сообщения: боевые отчёты и шпионаж.\n- Достижения: прогресс игрока."
  firstAttackReceived.title: Вас атакуют!
  firstAttackReceived.body: "Игрок {{attacker}} направил флот на вашу планету {{planet_name}}. Прибытие: {{arrive_at}}. Рекомендуется укрепить оборону или отправить транспортом ресурсы в безопасное место."
  inactivityReminder.title: "Давно не виделись, {{username}}!"
  inactivityReminder.body: "Прошло несколько дней с вашего последнего визита. Не забывайте — ваши шахты продолжают добычу, хранилища могут переполниться. Возвращайтесь и проверьте статус ваших планет."
