# Feature flags. План 31 Ф.2.
#
# Используется для безопасной выкатки рефакторингов: новый код за
# `if features.Enabled(flags, "key") { ... }`. По умолчанию все флаги
# disabled — новый код мёртв, пока явно не включён.
#
# Изменение требует restart процесса (graceful shutdown через план 31 Ф.1
# делает restart дешёвым: SetDraining → 10s → Shutdown).
#
# Для UI флаги доступны через GET /api/features (без auth) — фронтенд
# рисует UI conditionally.
#
# При добавлении нового флага:
#   1. Добавить запись здесь с enabled: false и описанием.
#   2. В коде обернуть новый функционал в `if features.Enabled(flags, "...")`.
#   3. После проверки в проде — переключить enabled: true и redeploy.
#   4. Когда фича стабильна — удалить флаг + старую ветку кода.

features:
  # План 30 Goal Engine — единый движок целей вместо achievement+dailyquest.
  # Сейчас Ф.1 готова (engine + YAML-каталог + миграция БД), но в HTTP/UI
  # ещё не подключена. Включится в Ф.5 после миграции данных.
  goal_engine:
    enabled: false
    description: "Goal Engine: единый движок целей (план 30)"
