# Реестр вселенных oxsar-nova.
# Каждая вселенная — отдельный игровой сервер со своими настройками.
# Добавление новой вселенной: вписать запись + поднять docker-compose.uni0N.yml

universes:
  - id: uni01
    name: "Nova"
    description: "Основная вселенная. Скорость ×1, без дефматча."
    subdomain: "uni01"            # uni01.oxsar-nova.ru
    dev_url: "http://localhost:5173"  # dev frontend port (план 36 Ф.8)
    status: "active"              # active | maintenance | upcoming | retired
    speed: 0.75
    deathmatch: false
    max_planets: 0                # 0 = computer_tech+1
    bashing_period: 18000         # 5 часов
    bashing_max_attacks: 4
    protection_period: 86400      # 24 часа
    num_galaxies: 8
    num_systems: 600
    # uni01 — fallback-эталон для остальных вселенных. 6 полей ниже
    # обязательны здесь; uni02/uni03 при отсутствии берут эти значения.
    storage_factor: 5.0
    research_speed_factor: 2.0
    energy_production_factor: 0.8
    teleport_cost_oxsars: 50000
    teleport_cooldown_hours: 24
    teleport_duration_minutes: 0
    launched_at: "2026-01-01T00:00:00Z"

  - id: uni02
    name: "Speed"
    description: "Быстрая вселенная. Скорость ×4, ускоренные исследования."
    subdomain: "uni02"            # uni02.oxsar-nova.ru
    dev_url: "http://localhost:5175"  # dev frontend port (план 36 Ф.8)
    status: "active"
    speed: 4.0
    deathmatch: false
    max_planets: 0
    bashing_period: 18000
    bashing_max_attacks: 4
    protection_period: 43200      # 12 часов
    num_galaxies: 4
    num_systems: 300
    launched_at: "2026-06-01T00:00:00Z"

  - id: uni03
    name: "Classic"
    description: "Классический баланс из legacy oxsar2 (override origin.yaml)."
    subdomain: "uni03"            # uni03.oxsar-nova.ru
    dev_url: "http://localhost:5176"
    status: "active"
    speed: 0.75                   # как у Nova
    deathmatch: false
    max_planets: 0
    bashing_period: 18000
    bashing_max_attacks: 4
    protection_period: 86400
    num_galaxies: 8
    num_systems: 600
    launched_at: "2026-04-29T00:00:00Z"
