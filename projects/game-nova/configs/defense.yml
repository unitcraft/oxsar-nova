# Баланс обороны.
#
# ADR-0013 (план 27-K): shell ×1.5 для всей обороны (defense buff).
# Причина: planet-defense пропускала атакующий флот при паритете 3:1
# с потерями атакующего всего ~3%. Усиление shell делает defense барьером,
# а не налогом. Стоимость не меняется (это buff в пользу защитника).

defense:
  rocket_launcher:
    id: 43
    cost: { metal: 2000, silicon: 0, hydrogen: 0 }
    attack: 80
    shield: 20
    shell: 3000        # 27-K: 2000 → 3000

  light_laser:
    id: 44
    cost: { metal: 1500, silicon: 500, hydrogen: 0 }
    attack: 100
    shield: 25
    shell: 3000        # 27-K: 2000 → 3000

  strong_laser:
    id: 45
    cost: { metal: 6000, silicon: 2000, hydrogen: 0 }
    attack: 250
    shield: 100
    shell: 12000       # 27-K: 8000 → 12000

  ion_gun:
    id: 46
    cost: { metal: 8000, silicon: 2000, hydrogen: 500 }
    attack: 150
    shield: 500
    shell: 12000       # 27-K: 8000 → 12000

  gauss_gun:
    id: 47
    cost: { metal: 20000, silicon: 15000, hydrogen: 2000 }
    attack: 1100
    shield: 200
    shell: 52000       # 27-K: 35000 → 52000

  plasma_gun:
    id: 48
    cost: { metal: 50000, silicon: 50000, hydrogen: 30000 }
    attack: 3000
    shield: 300
    shell: 150000      # 27-K: 100000 → 150000

  small_shield:
    id: 49
    cost: { metal: 10000, silicon: 10000, hydrogen: 0 }
    attack: 1
    shield: 2000
    shell: 30000       # 27-K: 20000 → 30000
    # 27-S: front 16 → 13 (менее агрессивный приоритет; shield-юнит
    # перестаёт «сгорать» в первый раунд).
    front: 13

  large_shield:
    id: 50
    cost: { metal: 50000, silicon: 50000, hydrogen: 0 }
    attack: 1
    shield: 10000
    shell: 150000      # 27-K: 100000 → 150000
    # 27-S: front 17 → 14
    front: 14

  # План 72.1.41: legacy ID 51-52 (defense missiles) + 354-355
  # (planet shields). Все 4 ранее отсутствовали — ErrUnknownUnit
  # при попытке построить. Stats 1:1 из legacy/Java balance.
  interceptor_rocket:
    id: 51
    cost: { metal: 8000, silicon: 0, hydrogen: 0 }
    attack: 1
    shield: 1
    shell: 24000       # 27-K: 16000 → 24000

  interplanetary_rocket:
    id: 52
    cost: { metal: 12500, silicon: 2500, hydrogen: 10000 }
    attack: 12000
    shield: 1
    shell: 1500

  small_planet_shield:
    id: 354
    cost: { metal: 200000, silicon: 200000, hydrogen: 0 }
    attack: 1
    shield: 50000
    shell: 1500000     # 27-K: 1000000 → 1500000
    front: 13

  large_planet_shield:
    id: 355
    cost: { metal: 1000000, silicon: 1000000, hydrogen: 0 }
    attack: 1
    shield: 200000
    shell: 7500000     # 27-K: 5000000 → 7500000
    front: 14
