# План 46: blacklist для UGC (никнеймы, названия альянсов, чат).
#
# Корни/подстроки запрещённых слов. Сравнение case-insensitive,
# unicode-NFKC, после удаления пробелов и пунктуации; ищется как
# подстрока в нормализованном тексте (см. internal/moderation/IsForbidden).
#
# Стартовый минимальный набор для запуска. Расширяется по мере роста
# community и жалоб пользователей. Источники для пополнения:
# - открытые open-source bad-words лексиконы для русского/английского;
# - реестр запрещённых ресурсов Минцифры (eais.rkn.gov.ru);
# - модерационные жалобы (план 46 Ф.3).
#
# Группы носят информационный характер; код объединяет все в один
# плоский список.
profanity_ru:
  - блядь
  - сука
  - хуй
  - пизд
  - ебал
  - ебан
  - ебат
  - залуп
  - мудак
  - мудил
  - гондон
  - пидор
  - пидар
  - пидр
  - долбоёб
  - долбоеб

