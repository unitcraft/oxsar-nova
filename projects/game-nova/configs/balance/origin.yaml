# configs/balance/origin.yaml
# Override-файл для вселенной origin (oxsar2-classic balance).
# Применяется поверх дефолтных configs/{buildings,units,rapidfire,...}.yml.
# Источник: импорт из docker-mysql-1 (origin-стенд) таблиц
# na_construction, na_ship_datasheet, na_rapidfire.
# Сгенерировано cmd/tools/import-legacy-balance/main.go (план 64 Ф.2).
# Дата импорта: 2026-04-28 09:54:45 UTC
#
# R0: дефолтный configs/buildings.yml не модифицируется. Этот файл —
# единственный источник чисел origin, отличающихся от nova-defaults.
# Для динамических формул (prod_*, cons_* с {temp}/{tech=N}) числа НЕ
# предвычисляются — реализация остаётся в Go (internal/economy/
# formulas.go и internal/origin/economy/), а коэффициенты — в Globals
# bundle (internal/balance.Globals).

version: 1
universe: origin

# globals: --- secret weapon. Origin-формулы prod_* совпадают с nova
# (verify 2026-04-28 против live origin docker-mysql-1). Поэтому
# Globals по умолчанию == ModernGlobals(); ничего перекрывать не нужно.

